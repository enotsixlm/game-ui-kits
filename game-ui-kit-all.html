.doc-head .eb{display:inline-block; margin-bottom:14px; font-family:var(--sc-disp); font-weight:400; font-size:12px;
  letter-spacing:.14em; color:#fff; background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue) 55%);
  padding:7px 18px; border-radius:999px; border:3px solid var(--sc-ink); box-shadow:0 3px 0 var(--sc-blue-dk), 0 5px 0 var(--sc-ink);
  text-shadow:0 2px 0 rgba(0,0,0,.3);}
.doc-head h1{font-family:var(--sc-disp); font-weight:400; font-size:clamp(30px,5vw,50px); color:var(--sc-gold);
  paint-order:stroke fill; -webkit-text-stroke:6px var(--sc-ink); text-shadow:0 4px 0 var(--sc-ink), 0 9px 16px rgba(0,0,0,.45); letter-spacing:.02em;}
.doc-head p{margin-top:12px; color:#cfe3ff; font-weight:800; text-shadow:0 2px 4px rgba(0,20,50,.6);}

.tokens{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px;}
.tok{display:flex; align-items:center; gap:7px; font-family:var(--sc-num); font-weight:800; font-size:11px; color:#dce9fb;
  background:rgba(13,30,54,.8); border:2px solid #0b1c33; padding:5px 11px; border-radius:999px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4);}
.tok i{width:14px;height:14px; border-radius:4px; border:2px solid var(--sc-ink);}

.comp{margin-top:38px; position:relative; z-index:1;}
.comp-title{font-family:var(--sc-disp); font-weight:400; font-size:20px; color:#fff; display:flex; align-items:center; gap:10px;
  margin-bottom:4px; paint-order:stroke fill; -webkit-text-stroke:3px var(--sc-ink); text-shadow:0 2px 0 var(--sc-ink);}
.comp-title::before{content:&quot;⚔&quot;; color:var(--sc-gold); -webkit-text-stroke:2px var(--sc-ink); font-size:16px;}
.comp-desc{color:#a9c6ec; font-weight:800; font-size:13px; margin-bottom:16px; text-shadow:0 1px 3px rgba(0,20,50,.5);}
.showcase{display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:24px;
  background:rgba(10,26,48,.5); border:3px solid #0d2038; border-radius:18px;
  box-shadow:inset 0 3px 10px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.08);}
.classline{margin-top:10px; font-family:ui-monospace,monospace; font-size:12px; color:#8fd0ff;
  background:#0d2038; border:2px solid #081627; border-radius:10px; padding:8px 12px; overflow-x:auto; font-weight:600;}
.classline b{color:var(--sc-gold);}

/* ============================================================================
   ============  COMPONENTS  ============
   ============================================================================ */

/* ----- 1. 按钮 sc-btn ----- */
.sc-btn{font-family:var(--sc-disp); font-weight:400; font-size:15px; color:#fff; cursor:pointer; user-select:none;
  display:inline-flex; align-items:center; gap:8px; padding:12px 26px 14px; border:3px solid var(--sc-ink);
  border-radius:12px; text-align:center; letter-spacing:.03em; text-shadow:0 2px 0 rgba(0,0,0,.35); transition:.07s;
  background:linear-gradient(180deg,var(--b-lt) 0%,var(--b-lt) 42%,var(--b) 46%,var(--b) 100%);
  box-shadow:0 5px 0 var(--b-dk), 0 7px 0 var(--sc-ink), inset 0 2px 0 rgba(255,255,255,.45);
  --b-lt:var(--sc-green-lt); --b:var(--sc-green); --b-dk:var(--sc-green-dk);}
.sc-btn:active{transform:translateY(5px); box-shadow:0 0 0 var(--b-dk), 0 2px 0 var(--sc-ink), inset 0 2px 0 rgba(255,255,255,.35);}
.sc-btn--green{--b-lt:var(--sc-green-lt);--b:var(--sc-green);--b-dk:var(--sc-green-dk);}
.sc-btn--blue{--b-lt:var(--sc-blue-lt);--b:var(--sc-blue);--b-dk:var(--sc-blue-dk);}
.sc-btn--red{--b-lt:var(--sc-red-lt);--b:var(--sc-red);--b-dk:var(--sc-red-dk);}
.sc-btn--gold{--b-lt:var(--sc-gold-lt);--b:var(--sc-gold);--b-dk:var(--sc-gold-dk); color:#5c3c00; text-shadow:0 1px 0 rgba(255,255,255,.55);}
.sc-btn--sm{font-size:13px; padding:9px 18px 11px; border-radius:10px;}
.sc-btn--lg{font-size:19px; padding:16px 36px 18px; border-radius:14px;}
.sc-btn--block{width:100%; justify-content:center;}
.sc-btn--round{width:56px; height:56px; padding:0; border-radius:50%; font-size:24px; justify-content:center;}
.sc-btn[disabled],.sc-btn--disabled{cursor:not-allowed; filter:grayscale(.75) brightness(.9); opacity:.85;}
.sc-btn[disabled]:active,.sc-btn--disabled:active{transform:none;
  box-shadow:0 5px 0 var(--b-dk), 0 7px 0 var(--sc-ink), inset 0 2px 0 rgba(255,255,255,.4);}

/* ----- 2. 面板 sc-panel ----- */
.sc-panel{position:relative; background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:4px solid var(--sc-ink);
  border-radius:16px; box-shadow:0 6px 0 var(--sc-ink), 0 14px 22px rgba(0,10,30,.35), inset 0 2px 0 rgba(255,255,255,.5);}
.sc-panel__hd{font-family:var(--sc-disp); font-weight:400; font-size:17px; color:#fff; text-align:center; padding:12px 16px;
  background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue) 55%); border-bottom:4px solid var(--sc-ink);
  border-radius:11px 11px 0 0; text-shadow:0 2px 0 var(--sc-blue-dk); letter-spacing:.03em;}
.sc-panel__bd{padding:16px 18px 18px;}
.sc-panel__bd p{font-weight:700; font-size:13px; color:var(--sc-text); line-height:1.6;}
/* corner rivets (可选) */
.sc-rivet{position:absolute; width:11px; height:11px; border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#ffe9a8,var(--sc-gold) 55%,var(--sc-gold-dk));
  border:2px solid var(--sc-ink); box-shadow:0 1px 0 var(--sc-ink);}
.sc-rivet.tl{top:8px;left:8px;} .sc-rivet.tr{top:8px;right:8px;}
.sc-rivet.bl{bottom:8px;left:8px;} .sc-rivet.br{bottom:8px;right:8px;}

/* ----- 3. 弹窗 sc-modal ----- */
.sc-modal-mask{position:fixed; inset:0; background:rgba(6,16,32,.66); backdrop-filter:blur(2px);
  display:grid; place-items:center; z-index:100; padding:20px;}
.sc-modal{width:min(380px,92vw); position:relative;}
.sc-modal__close{position:absolute; top:-14px; right:-14px; width:42px; height:42px; z-index:5;
  --b-lt:var(--sc-red-lt);--b:var(--sc-red);--b-dk:var(--sc-red-dk);}

/* ----- 4. 进度条 sc-bar ----- */
.sc-bar{position:relative; height:18px; background:#101f35; border:3px solid var(--sc-ink); border-radius:999px; overflow:hidden;
  box-shadow:inset 0 3px 5px rgba(0,0,0,.5);}
.sc-bar__fill{height:100%; border-radius:999px; box-shadow:inset 0 3px 0 rgba(255,255,255,.45), inset 0 -3px 0 rgba(0,0,0,.18);}
.sc-bar__fill--gold{background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold));}
.sc-bar__fill--hp{background:linear-gradient(180deg,var(--sc-green-lt),var(--sc-green));}
.sc-bar__fill--elixir{background:linear-gradient(180deg,var(--sc-elixir-lt),var(--sc-elixir));}
.sc-bar__label{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--sc-disp); font-weight:400;
  font-size:11px; color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.55); letter-spacing:.04em;}
.sc-bar--tall{height:24px;}

/* ----- 5. 货币条 sc-currency ----- */
.sc-currency{display:inline-flex; align-items:center; gap:7px; font-family:var(--sc-num); font-weight:900; font-size:15px;
  color:#fff; background:linear-gradient(180deg,#243d5e,#152841); border:3px solid var(--sc-ink); border-radius:999px;
  padding:4px 14px 4px 5px; box-shadow:inset 0 2px 5px rgba(0,0,0,.5), 0 2px 0 rgba(255,255,255,.08); text-shadow:0 1px 0 rgba(0,0,0,.5);}
.sc-currency__coin{width:26px; height:26px; border-radius:50%; flex:none; border:2px solid var(--sc-ink);
  display:grid; place-items:center; font-size:13px; box-shadow:inset 0 2px 0 rgba(255,255,255,.5);}
.sc-currency__coin--gold{background:radial-gradient(circle at 40% 30%,var(--sc-gold-lt),var(--sc-gold) 60%,var(--sc-gold-dk)); color:#7a5200;}
.sc-currency__coin--gem{border-radius:8px; transform:rotate(0deg);
  background:radial-gradient(circle at 40% 30%,#b6ff9e,var(--sc-gem) 60%,var(--sc-gem-dk)); color:#14611a;}
.sc-currency__coin--elixir{background:radial-gradient(circle at 40% 30%,var(--sc-elixir-lt),var(--sc-elixir) 60%,var(--sc-elixir-dk)); color:#571a70;}

/* ----- 6. 圣水计量 sc-meter ----- */
.sc-meter{display:inline-flex; align-items:center; gap:3px; background:#101f35; border:3px solid var(--sc-ink);
  border-radius:999px; padding:6px 10px; box-shadow:inset 0 2px 5px rgba(0,0,0,.5);}
.sc-meter__seg{width:14px; height:14px; border-radius:50% 50% 50% 4px; transform:rotate(45deg); margin:0 1px;
  background:#26364f; box-shadow:inset 0 1px 2px rgba(0,0,0,.4);}
.sc-meter__seg.on{background:radial-gradient(circle at 40% 30%,var(--sc-elixir-lt),var(--sc-elixir) 70%);
  box-shadow:0 0 6px rgba(208,110,232,.8);}
.sc-meter__num{font-family:var(--sc-disp); font-size:14px; color:#e8b6f5; margin-left:6px; text-shadow:0 1px 0 rgba(0,0,0,.5);}
.sc-meter__num.max{color:var(--sc-gold); animation:sc-pulse .7s ease-in-out infinite;}
@keyframes sc-pulse{50%{opacity:.55;}}

/* ----- 7. 图标底座 sc-icon ----- */
.sc-icon{width:52px; height:52px; border-radius:12px; display:grid; place-items:center; font-size:26px; position:relative;
  background:linear-gradient(180deg,#fdf6e4,var(--sc-paper-dk)); border:3px solid var(--sc-ink);
  box-shadow:0 4px 0 var(--sc-ink), inset 0 2px 0 #fff;}
.sc-icon:hover{transform:translateY(-2px);}
.sc-icon--rare{background:linear-gradient(180deg,#ffe2ac,#ffb44e);}
.sc-icon--epic{background:linear-gradient(180deg,#efc2ff,#cf7ff2);}
.sc-icon--legend{background:linear-gradient(180deg,#fff3b0,#ffd23c 55%,#57d7ff);}
.sc-icon__cd{position:absolute; inset:0; background:rgba(14,26,46,.68); border-radius:9px; display:grid; place-items:center;
  font-family:var(--sc-disp); font-size:16px; color:#fff;}

/* ----- 8. 卡片 sc-card ----- */
.sc-card{width:150px; background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:4px solid var(--sc-ink);
  border-radius:14px; overflow:hidden; cursor:pointer; box-shadow:0 6px 0 var(--sc-ink), 0 12px 16px rgba(0,10,30,.35);
  transition:.12s; position:relative;}
.sc-card:hover{transform:translateY(-4px);}
.sc-card__art{height:96px; display:grid; place-items:center; font-size:48px; position:relative;
  background:linear-gradient(180deg,var(--c1,#84ccff),var(--c2,#3a7dd0)); border-bottom:4px solid var(--sc-ink);
  text-shadow:0 3px 0 rgba(0,0,0,.2);}
.sc-card--rare{--c1:#ffd98e;--c2:#e8912a;} .sc-card--epic{--c1:#e0a8f5;--c2:#8e3bbf;}
.sc-card--legend{--c1:#ffe57a;--c2:#38b6e0;}
.sc-card__tag{position:absolute; top:6px; left:6px; font-family:var(--sc-num); font-weight:900; font-size:9px; color:#fff;
  background:rgba(14,26,46,.85); padding:2px 8px; border-radius:999px; letter-spacing:.05em;}
.sc-card__name{font-family:var(--sc-disp); font-weight:400; font-size:14px; color:var(--sc-text); text-align:center; padding:8px 6px 4px;}
.sc-card__foot{padding:0 10px 10px;}
/* 等级角标 */
.sc-card__lv{position:absolute; bottom:44px; left:50%; transform:translateX(-50%); font-family:var(--sc-disp); font-size:11px;
  color:#fff; background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue)); border:2px solid var(--sc-ink);
  border-radius:8px; padding:1px 9px; text-shadow:0 1px 0 rgba(0,0,0,.4); z-index:2;}

/* ----- 9. 列表项 sc-list ----- */
.sc-list{border:3px solid var(--sc-ink); border-radius:12px; overflow:hidden;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); box-shadow:0 4px 0 var(--sc-ink);}
.sc-list__item{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer;
  border-bottom:2px solid rgba(46,35,24,.14); transition:.1s;}
.sc-list__item:last-child{border-bottom:none;}
.sc-list__item:hover{background:rgba(255,214,90,.28);}
.sc-list__ic{width:34px; height:34px; flex:none; display:grid; place-items:center; font-size:18px;
  background:linear-gradient(180deg,#fdf6e4,var(--sc-paper-dk)); border:2px solid var(--sc-ink); border-radius:9px;}
.sc-list__tx{flex:1;}
.sc-list__tx b{font-family:var(--sc-disp); font-weight:400; font-size:14px; color:var(--sc-text); display:block;}
.sc-list__tx small{font-family:var(--sc-num); font-weight:700; font-size:11px; color:#8a765c;}
.sc-list__val{font-family:var(--sc-num); font-weight:900; font-size:14px; color:var(--sc-blue-dk);}

/* ----- 10. 顶部 HUD sc-hud ----- */
.sc-hud{display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:linear-gradient(180deg,#22395a,#152841); border:3px solid var(--sc-ink); border-radius:14px;
  box-shadow:0 4px 0 var(--sc-ink), inset 0 2px 0 rgba(255,255,255,.1);}
.sc-hud__ava{width:44px; height:44px; border-radius:10px; flex:none; display:grid; place-items:center; font-size:22px;
  background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold)); border:3px solid var(--sc-ink);}
.sc-hud__who b{font-family:var(--sc-disp); font-weight:400; font-size:15px; color:#fff; display:block; text-shadow:0 1px 0 rgba(0,0,0,.5);}
.sc-hud__who small{font-family:var(--sc-num); font-weight:800; font-size:10px; color:#ffd968; letter-spacing:.04em;}
.sc-hud__spacer{flex:1;}

/* ----- 11. 导航栏 sc-nav ----- */
.sc-nav{display:flex; gap:6px; padding:7px; background:linear-gradient(180deg,#1b3152,#122340);
  border:3px solid var(--sc-ink); border-radius:16px; box-shadow:0 4px 0 var(--sc-ink);}
.sc-nav__tab{flex:1; text-align:center; font-family:var(--sc-disp); font-weight:400; font-size:11px; color:#7e93b4;
  padding:8px 4px; cursor:pointer; border-radius:11px; border:3px solid transparent; transition:.1s; letter-spacing:.03em;}
.sc-nav__tab .i{display:block; font-size:20px; margin-bottom:2px; filter:grayscale(.55) brightness(.85);}
.sc-nav__tab--active{color:#fff; background:linear-gradient(180deg,var(--sc-gold-lt) 0%,var(--sc-gold-lt) 42%,var(--sc-gold) 46%);
  border-color:var(--sc-ink); box-shadow:0 3px 0 var(--sc-gold-dk); text-shadow:0 1px 0 var(--sc-gold-dk); color:#5c3c00;}
.sc-nav__tab--active .i{filter:none;}

/* ----- 12. 标签页 sc-tabs ----- */
.sc-tabs{display:flex; gap:6px;}
.sc-tabs__tab{font-family:var(--sc-disp); font-weight:400; font-size:12px; color:#7e93b4; padding:9px 18px; cursor:pointer;
  background:#122340; border:3px solid var(--sc-ink); border-radius:10px 10px 0 0; border-bottom:none; transition:.1s; letter-spacing:.03em;}
.sc-tabs__tab--active{color:#fff; background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue) 60%); text-shadow:0 1px 0 var(--sc-blue-dk);}

/* ----- 13. 输入框 sc-input ----- */
.sc-input{font-family:var(--sc-ui); font-weight:700; font-size:14px; color:#e5eefb; background:#101f35;
  border:3px solid var(--sc-ink); border-radius:10px; padding:10px 14px; width:100%; outline:none; transition:.12s;
  box-shadow:inset 0 3px 6px rgba(0,0,0,.45);}
.sc-input::placeholder{color:#54688a;}
.sc-input:focus{border-color:var(--sc-blue); box-shadow:inset 0 3px 6px rgba(0,0,0,.45), 0 0 0 3px rgba(74,160,240,.35);}
.sc-field{position:relative;}
.sc-field__ic{position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px;}
.sc-field .sc-input{padding-left:36px;}

/* ----- 14. 下拉选择 sc-select ----- */
.sc-select{position:relative; display:inline-block;}
.sc-select select{appearance:none; -webkit-appearance:none; font-family:var(--sc-disp); font-weight:400; font-size:13px;
  color:#fff; background:linear-gradient(180deg,#2a4468,#182f4e); border:3px solid var(--sc-ink); border-radius:10px;
  padding:10px 36px 10px 14px; cursor:pointer; outline:none; box-shadow:0 3px 0 var(--sc-ink); letter-spacing:.03em;}
.sc-select::after{content:&quot;▾&quot;; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--sc-gold);
  pointer-events:none; font-weight:800;}

/* ----- 15. 开关 sc-switch ----- */
.sc-switch{position:relative; display:inline-flex; align-items:center; cursor:pointer; user-select:none;}
.sc-switch input{position:absolute; opacity:0; pointer-events:none;}
.sc-switch__track{width:52px; height:28px; border-radius:999px; background:#101f35; border:3px solid var(--sc-ink);
  position:relative; transition:.15s; box-shadow:inset 0 3px 5px rgba(0,0,0,.5);}
.sc-switch__track::before{content:&quot;&quot;; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:linear-gradient(180deg,#fdf6e4,#d8c9a8); border:2px solid var(--sc-ink); transition:.15s;}
.sc-switch input:checked + .sc-switch__track{background:linear-gradient(180deg,var(--sc-green-lt),var(--sc-green));}
.sc-switch input:checked + .sc-switch__track::before{left:26px;}

/* ----- 16. 滑条 sc-slider ----- */
.sc-slider{-webkit-appearance:none; appearance:none; width:100%; height:12px; border-radius:999px;
  background:linear-gradient(90deg,var(--sc-gold),#101f35); border:3px solid var(--sc-ink); outline:none; cursor:pointer;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4);}
.sc-slider::-webkit-slider-thumb{-webkit-appearance:none; width:24px; height:24px; border-radius:50%;
  background:radial-gradient(circle at 40% 30%,#ffe9a8,var(--sc-gold) 60%,var(--sc-gold-dk)); border:3px solid var(--sc-ink);
  cursor:pointer; box-shadow:0 2px 0 var(--sc-ink);}
.sc-slider::-moz-range-thumb{width:24px; height:24px; border-radius:50%; background:var(--sc-gold); border:3px solid var(--sc-ink); cursor:pointer;}

/* ----- 17. 徽章 sc-badge ----- */
.sc-badge{display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
  font-family:var(--sc-num); font-weight:900; font-size:11px; color:#fff;
  background:linear-gradient(180deg,var(--sc-red-lt),var(--sc-red)); border:2px solid var(--sc-ink);
  box-shadow:0 2px 0 var(--sc-ink); text-shadow:0 1px 0 rgba(0,0,0,.4);}
.sc-badge--gold{background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold)); color:#5c3c00; text-shadow:none;}
.sc-badge-wrap{position:relative; display:inline-flex;}
.sc-badge-wrap > .sc-badge{position:absolute; top:-8px; right:-8px;}

/* ----- 18. 角标 sc-ribbon ----- */
.sc-ribbon{position:absolute; top:10px; left:-4px; font-family:var(--sc-disp); font-weight:400; font-size:11px; color:#fff;
  background:linear-gradient(180deg,var(--sc-red-lt),var(--sc-red)); padding:3px 12px; border:2px solid var(--sc-ink);
  border-radius:4px; z-index:3; box-shadow:0 2px 0 var(--sc-ink); text-shadow:0 1px 0 var(--sc-red-dk); letter-spacing:.04em;}
.sc-ribbon--gold{background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold)); color:#5c3c00; text-shadow:none;}

/* ----- 19. 标签 sc-tag ----- */
.sc-tag{display:inline-flex; align-items:center; gap:5px; font-family:var(--sc-num); font-weight:800; font-size:11px;
  color:#d7e5f8; background:#1b3152; border:2px solid var(--sc-ink); border-radius:999px; padding:3px 10px;}
.sc-tag--red{background:#5c1f14; color:#ffb09e;}
.sc-tag--green{background:#1e4a12; color:#b2f08e;}
.sc-tag--elixir{background:#4a1a5c; color:#eab2f8;}

/* ----- 20. Tooltip sc-tooltip ----- */
.sc-tooltip{position:relative; display:inline-flex; cursor:help; color:#cfe3ff; font-weight:800;
  border-bottom:2px dotted #5a76a0;}
.sc-tooltip::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
  font-family:var(--sc-ui); font-weight:700; font-size:12px; color:#3d2f1c; white-space:nowrap;
  background:linear-gradient(180deg,#fdf3d8,var(--sc-paper-dk)); border:2px solid var(--sc-ink);
  border-radius:8px; padding:7px 12px; opacity:0; pointer-events:none; transition:.12s; z-index:20; box-shadow:0 3px 0 var(--sc-ink);}
.sc-tooltip::before{content:&quot;&quot;; position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:var(--sc-ink); opacity:0; transition:.12s; z-index:20;}
.sc-tooltip:hover::after,.sc-tooltip:hover::before{opacity:1;}

/* ----- 21. Toast sc-toast ----- */
.sc-toast{display:flex; align-items:center; gap:10px; font-family:var(--sc-ui); font-weight:700; font-size:13px;
  color:var(--sc-text); background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink);
  border-radius:14px; padding:11px 16px; max-width:340px; box-shadow:0 5px 0 var(--sc-ink);}
.sc-toast__ic{width:34px; height:34px; border-radius:9px; flex:none; display:grid; place-items:center; font-size:18px;
  background:linear-gradient(180deg,var(--sc-green-lt),var(--sc-green)); border:2px solid var(--sc-ink);}
.sc-toast--danger .sc-toast__ic{background:linear-gradient(180deg,var(--sc-red-lt),var(--sc-red));}
.sc-toast--gold .sc-toast__ic{background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold));}
.sc-toast b{font-family:var(--sc-disp); font-weight:400; font-size:13px; color:var(--sc-text); display:block;}

/* ----- 22. 对话气泡 sc-bubble ----- */
.sc-bubble{position:relative; font-family:var(--sc-ui); font-weight:700; font-size:13px; color:var(--sc-text); max-width:300px;
  background:linear-gradient(180deg,#fdf6e4,var(--sc-paper-dk)); border:3px solid var(--sc-ink); border-radius:14px;
  padding:12px 16px; box-shadow:0 5px 0 var(--sc-ink);}
.sc-bubble__who{font-family:var(--sc-disp); font-weight:400; font-size:12px; color:var(--sc-blue-dk); margin-bottom:5px; letter-spacing:.03em;}
.sc-bubble::before{content:&quot;&quot;; position:absolute; left:24px; bottom:-14px; border:8px solid transparent; border-top-color:var(--sc-ink);}
.sc-bubble::after{content:&quot;&quot;; position:absolute; left:26px; bottom:-9px; border:6px solid transparent; border-top-color:var(--sc-paper-dk);}

/* ----- 23. 加载 sc-spinner(旋转宝石) ----- */
.sc-spinner{width:40px; height:40px; border-radius:10px; transform:rotate(45deg);
  background:radial-gradient(circle at 40% 30%,#b6ff9e,var(--sc-gem) 60%,var(--sc-gem-dk));
  border:3px solid var(--sc-ink); display:grid; place-items:center;
  animation:sc-spin 1.1s linear infinite; box-shadow:inset 0 2px 0 rgba(255,255,255,.5);}
@keyframes sc-spin{0%{transform:rotate(45deg) rotateY(0)}100%{transform:rotate(45deg) rotateY(360deg)}}

/* ----- 24. 头像组 sc-avatars ----- */
.sc-avatars{display:inline-flex;}
.sc-avatars__a{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-size:18px; margin-left:-10px;
  background:linear-gradient(180deg,#fdf6e4,var(--sc-paper-dk)); border:3px solid var(--sc-ink);}
.sc-avatars__a:first-child{margin-left:0;}
.sc-avatars__more{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; margin-left:-10px;
  font-family:var(--sc-num); font-weight:900; font-size:11px; color:#fff;
  background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue)); border:3px solid var(--sc-ink);}

/* ----- 25. 星级评分 sc-stars ----- */
.sc-stars{display:inline-flex; gap:3px; font-size:20px; color:#31486b; paint-order:stroke fill; -webkit-text-stroke:2px var(--sc-ink);}
.sc-stars .on{color:var(--sc-gold); filter:drop-shadow(0 2px 0 var(--sc-gold-dk));}

/* ----- 26. 分隔线 sc-divider ----- */
.sc-divider{display:flex; align-items:center; gap:10px; margin:6px 0;}
.sc-divider::before,.sc-divider::after{content:&quot;&quot;; height:3px; flex:1; border-radius:999px;
  background:#456a96; opacity:.5;}
.sc-divider__mark{font-family:var(--sc-disp); font-weight:400; font-size:13px; color:#cfe3ff; letter-spacing:.05em;}

/* ----- 27. 空状态 sc-empty ----- */
.sc-empty{text-align:center; padding:28px 20px; color:#8a765c;}
.sc-empty__ic{font-size:48px; filter:grayscale(.3);}
.sc-empty__tt{font-family:var(--sc-disp); font-weight:400; font-size:16px; color:var(--sc-text); margin:8px 0 4px;}
.sc-empty__ds{font-family:var(--sc-num); font-weight:700; font-size:12px;}

/* ----- 28. 步进器 sc-stepper ----- */
.sc-stepper{display:inline-flex; align-items:center; gap:8px;}
.sc-stepper__btn{width:36px; height:36px; border-radius:10px; font-family:var(--sc-disp); font-weight:400; font-size:20px; color:#fff;
  cursor:pointer; border:3px solid var(--sc-ink); display:grid; place-items:center; line-height:0; padding-bottom:2px;
  background:linear-gradient(180deg,var(--sc-blue-lt) 0%,var(--sc-blue-lt) 42%,var(--sc-blue) 46%);
  box-shadow:0 3px 0 var(--sc-blue-dk), 0 5px 0 var(--sc-ink); transition:.07s; text-shadow:0 1px 0 rgba(0,0,0,.35);}
.sc-stepper__btn:active{transform:translateY(3px); box-shadow:0 0 0 var(--sc-blue-dk), 0 2px 0 var(--sc-ink);}
.sc-stepper__val{min-width:46px; text-align:center; font-family:var(--sc-num); font-weight:900; font-size:18px; color:#fff;
  background:#101f35; border:3px solid var(--sc-ink); border-radius:10px; padding:6px 0; box-shadow:inset 0 3px 5px rgba(0,0,0,.5);}

/* ----- 29. 面包屑 sc-breadcrumb ----- */
.sc-breadcrumb{display:flex; align-items:center; gap:6px; font-family:var(--sc-ui); font-weight:700; font-size:13px; flex-wrap:wrap;}
.sc-breadcrumb a{color:#8fd0ff; text-decoration:none; cursor:pointer;}
.sc-breadcrumb a:hover{color:var(--sc-gold);}
.sc-breadcrumb__sep{color:#54688a; font-weight:800;}
.sc-breadcrumb__cur{color:#fff; font-weight:800;}

/* ----- 30. 手风琴 sc-accordion ----- */
.sc-accordion{border:3px solid var(--sc-ink); border-radius:12px; overflow:hidden;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); box-shadow:0 4px 0 var(--sc-ink);}
.sc-accordion details{border-bottom:2px solid rgba(46,35,24,.14);}
.sc-accordion details:last-child{border-bottom:none;}
.sc-accordion summary{list-style:none; cursor:pointer; padding:12px 14px; font-family:var(--sc-disp); font-weight:400; font-size:13px;
  color:var(--sc-text); display:flex; align-items:center; gap:8px; letter-spacing:.02em;}
.sc-accordion summary::-webkit-details-marker{display:none;}
.sc-accordion summary::before{content:&quot;▶&quot;; color:var(--sc-gold-dk); font-size:11px; transition:.15s;}
.sc-accordion details[open] summary::before{transform:rotate(90deg);}
.sc-accordion summary:hover{background:rgba(255,214,90,.28);}
.sc-accordion__bd{padding:2px 16px 14px 32px; font-family:var(--sc-ui); font-weight:700; font-size:12px; color:#8a765c; line-height:1.6;}

/* ----- 31. 侧边抽屉 sc-drawer ----- */
.sc-drawer-mask{position:fixed; inset:0; background:rgba(6,16,32,.6); z-index:110; opacity:0; pointer-events:none; transition:.2s;}
.sc-drawer-mask.open{opacity:1; pointer-events:auto;}
.sc-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border-left:4px solid var(--sc-ink);
  box-shadow:-8px 0 26px rgba(0,0,0,.45); transform:translateX(100%);
  transition:.22s cubic-bezier(.3,.8,.3,1); display:flex; flex-direction:column;}
.sc-drawer.open{transform:translateX(0);}
.sc-drawer__hd{font-family:var(--sc-disp); font-weight:400; font-size:16px; color:#fff; padding:16px;
  background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue) 55%); border-bottom:4px solid var(--sc-ink);
  display:flex; align-items:center; justify-content:space-between; text-shadow:0 2px 0 var(--sc-blue-dk); letter-spacing:.03em;}
.sc-drawer__hd span{cursor:pointer;}
.sc-drawer__bd{padding:12px; overflow-y:auto;}

/* ----- 32. 数据表格 sc-table ----- */
.sc-table{width:100%; border-collapse:collapse; font-family:var(--sc-num); font-weight:700; font-size:12px;
  border:3px solid var(--sc-ink); border-radius:12px; overflow:hidden;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk));}
.sc-table thead th{font-family:var(--sc-disp); font-weight:400; font-size:11px; color:#fff; text-align:left; padding:9px 12px;
  background:linear-gradient(180deg,var(--sc-blue-lt),var(--sc-blue) 60%); border-bottom:3px solid var(--sc-ink);
  text-shadow:0 1px 0 var(--sc-blue-dk); letter-spacing:.05em;}
.sc-table tbody td{padding:9px 12px; color:var(--sc-text); border-bottom:2px solid rgba(46,35,24,.12);}
.sc-table tbody tr:last-child td{border-bottom:none;}
.sc-table tbody tr:nth-child(even){background:rgba(46,35,24,.05);}
.sc-table tbody tr:hover{background:rgba(255,214,90,.3);}
.sc-table__rank{color:var(--sc-gold-dk); font-family:var(--sc-disp); font-weight:400;}

/* ----- 33. 分页器 sc-pagination ----- */
.sc-pagination{display:inline-flex; gap:6px;}
.sc-pagination__pg{min-width:34px; height:34px; padding:0 6px; display:grid; place-items:center; cursor:pointer;
  font-family:var(--sc-disp); font-weight:400; font-size:13px; color:#cfe3ff; background:#1b3152;
  border:3px solid var(--sc-ink); border-radius:10px; box-shadow:0 3px 0 var(--sc-ink); transition:.07s;}
.sc-pagination__pg:active{transform:translateY(3px); box-shadow:0 0 0 var(--sc-ink);}
.sc-pagination__pg--active{color:#5c3c00; background:linear-gradient(180deg,var(--sc-gold-lt) 0%,var(--sc-gold-lt) 42%,var(--sc-gold) 46%);
  box-shadow:0 3px 0 var(--sc-gold-dk);}
.sc-pagination__pg--dis{opacity:.4; cursor:not-allowed; box-shadow:0 3px 0 var(--sc-ink);}

/* ----- 34. 时间轴 sc-timeline ----- */
.sc-timeline{position:relative; padding-left:28px;}
.sc-timeline::before{content:&quot;&quot;; position:absolute; left:9px; top:8px; bottom:8px; width:4px; border-radius:999px;
  background:repeating-linear-gradient(180deg,#456a96 0 6px,transparent 6px 12px); opacity:.6;}
.sc-timeline__item{position:relative; padding-bottom:16px;}
.sc-timeline__item:last-child{padding-bottom:0;}
.sc-timeline__item::before{content:&quot;&quot;; position:absolute; left:-24px; top:2px; width:16px; height:16px; border-radius:50%;
  background:#1b3152; border:3px solid var(--sc-ink);}
.sc-timeline__item--done::before{background:radial-gradient(circle at 40% 30%,var(--sc-green-lt),var(--sc-green));}
.sc-timeline__item--now::before{background:radial-gradient(circle at 40% 30%,var(--sc-gold-lt),var(--sc-gold)); box-shadow:0 0 8px rgba(255,201,40,.8);}
.sc-timeline__t{font-family:var(--sc-disp); font-weight:400; font-size:13px; color:#fff; letter-spacing:.02em; text-shadow:0 1px 0 rgba(0,0,0,.4);}
.sc-timeline__d{font-family:var(--sc-num); font-weight:700; font-size:11px; color:#93a7c0; margin-top:2px;}

/* ----- 35. 树形菜单 sc-tree ----- */
.sc-tree{font-family:var(--sc-ui); font-weight:700; font-size:13px;}
.sc-tree details{margin-left:4px;}
.sc-tree summary{list-style:none; cursor:pointer; padding:5px 0; color:#e5eefb; display:flex; align-items:center; gap:6px;}
.sc-tree summary::-webkit-details-marker{display:none;}
.sc-tree summary::before{content:&quot;▶&quot;; color:var(--sc-gold); font-size:9px; transition:.15s;}
.sc-tree details[open] > summary::before{transform:rotate(90deg);}
.sc-tree summary:hover{color:var(--sc-gold);}
.sc-tree__leaf{padding:5px 0 5px 20px; color:#93a7c0; cursor:pointer;}
.sc-tree__leaf:hover{color:#fff;}
.sc-tree details > *:not(summary){margin-left:14px; border-left:3px solid #2a4468; padding-left:6px;}

/* ----- 36. 能量条倒计时 sc-energy ----- */
.sc-energy{display:flex; align-items:center; gap:10px;}
.sc-energy__orb{width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:15px; flex:none;
  background:radial-gradient(circle at 40% 30%,var(--sc-elixir-lt),var(--sc-elixir) 60%,var(--sc-elixir-dk)); border:3px solid var(--sc-ink);}
.sc-energy__body{flex:1;}
.sc-energy__top{display:flex; justify-content:space-between; font-family:var(--sc-num); font-weight:800; font-size:11px; color:#93a7c0; margin-bottom:3px;}
.sc-energy__timer{color:#e8b6f5; font-variant-numeric:tabular-nums;}

/* ----- 37. 签到日历 sc-calendar ----- */
.sc-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.sc-calendar__day{aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; font-family:var(--sc-num); font-weight:800; font-size:10px; color:#8a765c;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink); position:relative;}
.sc-calendar__day .r{font-size:16px;}
.sc-calendar__day--done{filter:saturate(.7);}
.sc-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center; border-radius:7px;
  background:rgba(72,153,28,.82); color:#fff; font-size:20px; font-weight:900;}
.sc-calendar__day--today{border-color:var(--sc-gold); box-shadow:0 0 0 3px rgba(255,201,40,.4), 0 0 12px rgba(255,201,40,.5);
  background:linear-gradient(180deg,#fff3c8,#ffe08e);}

/* ----- 38. 奖杯之路 sc-questchain ----- */
.sc-questchain{display:flex; align-items:center;}
.sc-questchain__node{width:42px; height:42px; border-radius:50%; display:grid; place-items:center; font-size:18px; flex:none; z-index:2;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink); box-shadow:0 3px 0 var(--sc-ink);}
.sc-questchain__node--done{background:radial-gradient(circle at 40% 30%,var(--sc-gold-lt),var(--sc-gold));}
.sc-questchain__node--now{background:radial-gradient(circle at 40% 30%,var(--sc-red-lt),var(--sc-red)); color:#fff; transform:scale(1.1);
  box-shadow:0 3px 0 var(--sc-ink), 0 0 14px rgba(240,86,60,.7);}
.sc-questchain__link{height:4px; flex:1; min-width:16px; border-radius:999px;
  background:repeating-linear-gradient(90deg,#456a96 0 5px,transparent 5px 10px); opacity:.6;}
.sc-questchain__link--done{background:var(--sc-gold); opacity:1;}

/* ----- 39. 成就解锁 sc-achievement ----- */
.sc-achievement{display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink);
  border-radius:14px; box-shadow:0 4px 0 var(--sc-ink);}
.sc-achievement__medal{width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:26px; flex:none;
  background:radial-gradient(circle at 40% 30%,var(--sc-gold-lt),var(--sc-gold) 60%,var(--sc-gold-dk)); border:3px solid var(--sc-ink);}
.sc-achievement__tx b{font-family:var(--sc-disp); font-weight:400; font-size:14px; color:var(--sc-text); display:block;}
.sc-achievement__tx small{font-family:var(--sc-num); font-weight:700; font-size:11px; color:#8a765c;}
.sc-achievement--locked{filter:grayscale(.75); opacity:.7;}
.sc-achievement--locked .sc-achievement__medal{background:#9aa4b5;}

/* ----- 40. 翻牌 sc-flipcard ----- */
.sc-flipcard{width:120px; height:168px; perspective:800px; cursor:pointer;}
.sc-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s;}
.sc-flipcard.flipped .sc-flipcard__inner{transform:rotateY(180deg);}
.sc-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border:4px solid var(--sc-ink); border-radius:14px; display:grid; place-items:center; overflow:hidden;}
.sc-flipcard__back{background:
  radial-gradient(circle at 50% 42%,rgba(255,255,255,.18),transparent 55%),
  linear-gradient(135deg,#2a4468 0 25%,#1b3152 25% 50%,#2a4468 50% 75%,#1b3152 75%);
  color:var(--sc-gold); font-size:40px; font-family:var(--sc-disp); text-shadow:0 3px 0 rgba(0,0,0,.5);}
.sc-flipcard__front{transform:rotateY(180deg); flex-direction:column;
  background:linear-gradient(180deg,var(--sc-gold-lt),var(--sc-gold) 55%,#38b6e0);}
.sc-flipcard__front .em{font-size:46px;}
.sc-flipcard__front .nm{font-family:var(--sc-disp); font-weight:400; font-size:13px; color:#5c3c00; margin-top:6px;}

/* ----- 41. 开宝箱 sc-chest ----- */
.sc-chest{width:120px; text-align:center; cursor:pointer; user-select:none;}
.sc-chest__box{width:78px; height:66px; margin:0 auto; border-radius:12px 12px 10px 10px; display:grid; place-items:center;
  font-size:34px; font-family:var(--sc-disp); color:#5c3c00; position:relative;
  background:linear-gradient(180deg,#ffe08e 0 40%,#e8a838 40% 100%);
  border:4px solid var(--sc-ink); box-shadow:0 5px 0 var(--sc-ink), inset 0 3px 0 rgba(255,255,255,.45); transition:.15s;}
.sc-chest__box::before{content:&quot;&quot;; position:absolute; left:-4px; right:-4px; top:38%; height:7px;
  background:linear-gradient(180deg,#8a5a20,#6a4014); border-top:2px solid var(--sc-ink); border-bottom:2px solid var(--sc-ink);}
.sc-chest:hover .sc-chest__box{transform:translateY(-4px);}
.sc-chest.opened .sc-chest__box{animation:sc-shake .5s ease;}
@keyframes sc-shake{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(-10px) rotate(-6deg)}
  50%{transform:translateY(-14px) rotate(6deg)}75%{transform:translateY(-6px) rotate(-3deg)}100%{transform:translateY(0)}}
.sc-chest__glow{height:0; overflow:hidden; opacity:0; transition:.3s;}
.sc-chest.opened .sc-chest__glow{height:auto; opacity:1; padding-top:8px;}
.sc-chest__label{font-family:var(--sc-disp); font-weight:400; font-size:12px; color:#cfe3ff; margin-top:6px; text-shadow:0 1px 2px rgba(0,0,0,.5);}

/* ----- 42. 背包网格 sc-invgrid ----- */
.sc-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:10px;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink);
  border-radius:12px; width:max-content; box-shadow:0 4px 0 var(--sc-ink);}
.sc-invgrid__cell{width:46px; height:46px; border-radius:9px; display:grid; place-items:center; font-size:22px; position:relative;
  background:linear-gradient(180deg,#fdf6e4,#e0cda6); border:2px solid var(--sc-ink);}
.sc-invgrid__cell:hover{background:linear-gradient(180deg,#fff3c8,#ffe08e);}
.sc-invgrid__cell--rare{background:linear-gradient(180deg,#ffe2ac,#ffb44e);}
.sc-invgrid__cell--epic{background:linear-gradient(180deg,#efc2ff,#cf7ff2);}
.sc-invgrid__cell--empty{background:rgba(46,35,24,.12); opacity:.7;}
.sc-invgrid__qty{position:absolute; bottom:1px; right:3px; font-family:var(--sc-num); font-weight:900; font-size:10px; color:var(--sc-text);}

/* ----- 43. 装备对比 sc-compare ----- */
.sc-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center;
  background:linear-gradient(180deg,var(--sc-paper),var(--sc-paper-dk)); border:3px solid var(--sc-ink);
  border-radius:14px; padding:14px; box-shadow:0 4px 0 var(--sc-ink);}
.sc-compare__side{text-align:center;}
.sc-compare__side .sc-icon{margin:0 auto 8px;}
.sc-compare__nm{font-family:var(--sc-disp); font-weight:400; font-size:12px; color:var(--sc-text); margin-bottom:8px;}
.sc-compare__stat{display:flex; justify-content:space-between; font-family:var(--sc-num); font-weight:700; font-size:11px;
  padding:3px 0; border-bottom:2px solid rgba(46,35,24,.12);}
.sc-compare__stat span:first-child{color:#8a765c;}
.sc-compare__up{color:#3f8a14;} .sc-compare__down{color:var(--sc-red-dk);}
.sc-compare__vs{font-family:var(--sc-disp); font-weight:400; font-size:16px; color:var(--sc-red);
  paint-order:stroke fill; -webkit-text-stroke:2px var(--sc-ink); text-shadow:0 2px 0 var(--sc-ink);}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}
</style>

  <h1>Supercell 风 UI 组件库</h1>
  <p>43 个组件 · sc- 前缀 · 厚重双色渐变钮 + 羊皮纸面板 + 金币宝石圣水</p>
  <div class=&quot;tokens&quot;>
    <span class=&quot;tok&quot;><i style=&quot;background:#78d838&quot;></i>--sc-green</span>
    <span class=&quot;tok&quot;><i style=&quot;background:#4aa0f0&quot;></i>--sc-blue</span>
    <span class=&quot;tok&quot;><i style=&quot;background:#ffc928&quot;></i>--sc-gold</span>
    <span class=&quot;tok&quot;><i style=&quot;background:#d06ee8&quot;></i>--sc-elixir</span>
    <span class=&quot;tok&quot;><i style=&quot;background:#2e2318&quot;></i>--sc-ink</span>
  </div>
</div>

<div class=&quot;doc&quot;>

  <!-- 1 -->
  <div class=&quot;comp&quot;><div class=&quot;comp-title&quot;>按钮 · Button</div><div class=&quot;comp-desc&quot;>厚重双色渐变钮,绿/蓝/红/金四色,硬顶光泽 + 双层 3D 投影,按下真实下沉。</div>
    <div class=&quot;showcase&quot;>
      <button class=&quot;sc-btn sc-btn--green sc-btn--lg&quot;>对战!</button>
      <button class=&quot;sc-btn sc-btn--blue&quot;>部落</button>
      <button class=&quot;sc-btn sc-btn--gold&quot;>商店</button>
      <button class=&quot;sc-btn sc-btn--red&quot;>进攻</button>
      <button class=&quot;sc-btn sc-btn--green sc-btn--round&quot;>＋</button>
      <button class=&quot;sc-btn sc-btn--blue sc-btn--sm&quot;>小按钮</button>

<div class="hint">点击顶部标签切换风格 · 每套均可独立交互</div>

<script>
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const frames = Array.from(document.querySelectorAll('.frame'));
  function activate(i){
    tabs.forEach(t => t.classList.toggle('active', +t.dataset.i === i));
    frames.forEach(f => {
      const on = +f.dataset.i === i;
      if(on && !f.getAttribute('srcdoc') && f.dataset.src){
        f.setAttribute('srcdoc', f.dataset.src);  // lazy-load on first view
        f.removeAttribute('data-src');
      }
      f.classList.toggle('active', on);
    });
  }
  tabs.forEach(t => t.addEventListener('click', () => activate(+t.dataset.i)));
</script>

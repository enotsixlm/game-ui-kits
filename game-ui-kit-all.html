.tokens{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px;}
.tok{display:flex; align-items:center; gap:7px; font-family:var(--mr-num); font-weight:800; font-size:11px; color:#3a3a4a;
  background:#fff; border:3px solid var(--mr-ink); padding:4px 10px; border-radius:999px; box-shadow:0 2px 0 var(--mr-ink);}
.tok i{width:14px;height:14px; border-radius:4px; border:2px solid var(--mr-ink);}

.comp{margin-top:38px;}
.comp-title{font-family:var(--mr-disp); font-weight:800; font-size:20px; color:#fff; display:flex; align-items:center; gap:10px;
  margin-bottom:4px; -webkit-text-stroke:1.5px var(--mr-ink); text-shadow:0 2px 0 var(--mr-ink);}
.comp-title::before{content:&quot;★&quot;; color:var(--mr-yellow); -webkit-text-stroke:1.5px var(--mr-ink); font-size:16px;}
.comp-desc{color:#1c4a1c; font-weight:800; font-size:13px; margin-bottom:16px; text-shadow:0 1px 0 rgba(255,255,255,.4);}
.showcase{display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:24px;
  background:rgba(255,255,255,.55); border:4px dashed var(--mr-ink); border-radius:20px;}
.classline{margin-top:10px; font-family:ui-monospace,monospace; font-size:12px; color:#1c7a2c;
  background:#fff; border:3px solid var(--mr-ink); border-radius:10px; padding:8px 12px; overflow-x:auto; font-weight:600;}
.classline b{color:var(--mr-red-dk);}

/* ============================================================================
   ============  COMPONENTS  ============
   ============================================================================ */

/* ----- 1. 按钮 mr-btn ----- */
.mr-btn{font-family:var(--mr-disp); font-weight:800; font-size:15px; color:#fff; cursor:pointer; user-select:none;
  display:inline-flex; align-items:center; gap:8px; padding:12px 24px 14px; border:3px solid var(--mr-ink);
  border-radius:16px; text-align:center; text-shadow:0 2px 0 rgba(0,0,0,.22); transition:.07s;
  background:linear-gradient(180deg,var(--b-lt),var(--b)); box-shadow:0 5px 0 var(--b-dk), inset 0 2px 0 rgba(255,255,255,.5);
  --b-lt:var(--mr-red-lt); --b:var(--mr-red); --b-dk:var(--mr-red-dk);}
.mr-btn:active{transform:translateY(5px); box-shadow:0 0 0 var(--b-dk), inset 0 2px 0 rgba(255,255,255,.4);}
.mr-btn--red{--b-lt:var(--mr-red-lt);--b:var(--mr-red);--b-dk:var(--mr-red-dk);}
.mr-btn--blue{--b-lt:var(--mr-blue-lt);--b:var(--mr-blue);--b-dk:var(--mr-blue-dk);}
.mr-btn--green{--b-lt:var(--mr-green-lt);--b:var(--mr-green);--b-dk:var(--mr-green-dk);}
.mr-btn--yellow{--b-lt:var(--mr-yellow-lt);--b:var(--mr-yellow);--b-dk:var(--mr-yellow-dk); color:#5a4200; text-shadow:0 1px 0 rgba(255,255,255,.5);}
.mr-btn--sm{font-size:13px; padding:9px 16px 11px; border-radius:13px;}
.mr-btn--lg{font-size:19px; padding:16px 34px 18px; border-radius:20px;}
.mr-btn--block{width:100%; justify-content:center;}
.mr-btn--round{width:56px; height:56px; padding:0; border-radius:50%; font-size:24px;}
.mr-btn[disabled],.mr-btn--disabled{cursor:not-allowed; filter:grayscale(.6) brightness(.95); opacity:.85;}
.mr-btn[disabled]:active,.mr-btn--disabled:active{transform:none; box-shadow:0 5px 0 var(--b-dk), inset 0 2px 0 rgba(255,255,255,.4);}

/* ----- 2. 面板 mr-panel ----- */
.mr-panel{position:relative; background:var(--mr-panel); border:4px solid var(--mr-ink); border-radius:20px;
  box-shadow:0 6px 0 var(--mr-ink), 0 12px 20px rgba(0,0,0,.15);}
.mr-panel__hd{font-family:var(--mr-disp); font-weight:800; font-size:17px; color:#fff; text-align:center; padding:12px 16px;
  background:linear-gradient(180deg,var(--mr-red-lt),var(--mr-red)); border-bottom:4px solid var(--mr-ink);
  border-radius:15px 15px 0 0; text-shadow:0 2px 0 var(--mr-red-dk);}
.mr-panel__bd{padding:16px 18px 18px;}
.mr-panel__bd p{font-weight:700; font-size:13px; color:var(--mr-text); line-height:1.6;}
/* corner studs (可选) */
.mr-stud{position:absolute; width:12px; height:12px; border-radius:50%; background:var(--mr-yellow);
  border:2px solid var(--mr-ink); box-shadow:0 1px 0 var(--mr-ink);}
.mr-stud.tl{top:8px;left:8px;} .mr-stud.tr{top:8px;right:8px;}
.mr-stud.bl{bottom:8px;left:8px;} .mr-stud.br{bottom:8px;right:8px;}

/* ----- 3. 弹窗 mr-modal ----- */
.mr-modal-mask{position:fixed; inset:0; background:rgba(20,30,50,.55); backdrop-filter:blur(2px);
  display:grid; place-items:center; z-index:100; padding:20px;}
.mr-modal{width:min(380px,92vw); position:relative;}
.mr-modal__close{position:absolute; top:-14px; right:-14px; width:42px; height:42px; z-index:5;
  --b-lt:var(--mr-red-lt);--b:var(--mr-red);--b-dk:var(--mr-red-dk);}

/* ----- 4. 进度条 mr-bar ----- */
.mr-bar{position:relative; height:18px; background:#e3e6ef; border:3px solid var(--mr-ink); border-radius:999px; overflow:hidden;
  box-shadow:inset 0 2px 3px rgba(0,0,0,.15);}
.mr-bar__fill{height:100%; border-radius:999px; box-shadow:inset 0 3px 0 rgba(255,255,255,.5), inset 0 -3px 0 rgba(0,0,0,.12);}
.mr-bar__fill--coin{background:linear-gradient(180deg,var(--mr-yellow-lt),var(--mr-yellow));}
.mr-bar__fill--life{background:linear-gradient(180deg,var(--mr-green-lt),var(--mr-green));}
.mr-bar__fill--star{background:linear-gradient(180deg,var(--mr-blue-lt),var(--mr-blue));}
.mr-bar__label{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--mr-disp); font-weight:800;
  font-size:11px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4);}
.mr-bar--tall{height:24px;}

/* ----- 5. 货币条 mr-currency ----- */
.mr-currency{display:inline-flex; align-items:center; gap:7px; font-family:var(--mr-num); font-weight:900; font-size:16px;
  color:var(--mr-text); background:#fff; border:3px solid var(--mr-ink); border-radius:999px; padding:4px 14px 4px 5px;
  box-shadow:0 3px 0 var(--mr-ink);}
.mr-currency__coin{width:26px; height:26px; border-radius:50%; flex:none; border:2px solid var(--mr-ink);
  display:grid; place-items:center; font-size:13px; box-shadow:inset 0 2px 0 rgba(255,255,255,.5);}
.mr-currency__coin--gold{background:radial-gradient(circle at 40% 30%,var(--mr-yellow-lt),var(--mr-yellow) 60%,var(--mr-yellow-dk));}
.mr-currency__coin--star{background:radial-gradient(circle at 40% 30%,var(--mr-blue-lt),var(--mr-blue) 60%,var(--mr-blue-dk));}
.mr-currency__coin--life{background:radial-gradient(circle at 40% 30%,var(--mr-green-lt),var(--mr-green) 60%,var(--mr-green-dk));}

/* ----- 6. 状态计量表 mr-meter(P 速度表) ----- */
.mr-meter{display:inline-flex; align-items:center; gap:3px; background:#fff; border:3px solid var(--mr-ink);
  border-radius:10px; padding:5px 8px; box-shadow:0 3px 0 var(--mr-ink);}
.mr-meter__seg{width:0;height:0; border-top:7px solid transparent; border-bottom:7px solid transparent;
  border-left:11px solid #d5d8e2;}
.mr-meter__seg.on{border-left-color:var(--mr-yellow);}
.mr-meter__p{font-family:var(--mr-disp); font-weight:800; font-size:15px; color:#d5d8e2; margin-left:3px;}
.mr-meter__p.on{color:var(--mr-red); animation:mr-blink .4s steps(1) infinite;}
@keyframes mr-blink{50%{opacity:.4;}}

/* ----- 7. 图标底座 mr-icon ----- */
.mr-icon{width:52px; height:52px; border-radius:14px; display:grid; place-items:center; font-size:26px; position:relative;
  background:linear-gradient(180deg,#fff,#eef1f8); border:3px solid var(--mr-ink); box-shadow:0 4px 0 var(--mr-ink), inset 0 2px 0 #fff;}
.mr-icon:hover{transform:translateY(-2px);}
.mr-icon--rare{background:linear-gradient(180deg,var(--mr-blue-lt),#bfe4ff);}
.mr-icon--legend{background:linear-gradient(180deg,var(--mr-yellow-lt),#ffe89a);}
.mr-icon__cd{position:absolute; inset:0; background:rgba(42,42,58,.6); border-radius:11px; display:grid; place-items:center;
  font-family:var(--mr-disp); font-weight:800; font-size:16px; color:#fff;}

/* ----- 8. 卡片 mr-card ----- */
.mr-card{width:150px; background:#fff; border:4px solid var(--mr-ink); border-radius:18px; overflow:hidden; cursor:pointer;
  box-shadow:0 6px 0 var(--mr-ink), 0 10px 14px rgba(0,0,0,.15); transition:.12s; position:relative;}
.mr-card:hover{transform:translateY(-4px);}
.mr-card__art{height:96px; display:grid; place-items:center; font-size:48px; position:relative;
  background:linear-gradient(180deg,var(--c1,var(--mr-blue-lt)),var(--c2,var(--mr-blue))); border-bottom:4px solid var(--mr-ink);
  text-shadow:0 3px 0 rgba(0,0,0,.15);}
.mr-card--red{--c1:var(--mr-red-lt);--c2:var(--mr-red);} .mr-card--green{--c1:var(--mr-green-lt);--c2:var(--mr-green);}
.mr-card--yellow{--c1:var(--mr-yellow-lt);--c2:var(--mr-yellow);}
.mr-card__tag{position:absolute; top:6px; left:6px; font-family:var(--mr-num); font-weight:900; font-size:9px; color:#fff;
  background:var(--mr-ink); padding:2px 8px; border-radius:999px;}
.mr-card__name{font-family:var(--mr-disp); font-weight:800; font-size:14px; color:var(--mr-text); text-align:center; padding:8px 6px 4px;}
.mr-card__foot{padding:0 10px 10px;}

/* ----- 9. 列表项 mr-list ----- */
.mr-list{border:3px solid var(--mr-ink); border-radius:14px; overflow:hidden; background:#fff; box-shadow:0 4px 0 var(--mr-ink);}
.mr-list__item{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer;
  border-bottom:2px solid #eef1f8; transition:.1s;}
.mr-list__item:last-child{border-bottom:none;}
.mr-list__item:hover{background:#fff8dc;}
.mr-list__ic{width:34px; height:34px; flex:none; display:grid; place-items:center; font-size:18px;
  background:linear-gradient(180deg,#fff,#eef1f8); border:2px solid var(--mr-ink); border-radius:10px;}
.mr-list__tx{flex:1;}
.mr-list__tx b{font-family:var(--mr-disp); font-weight:800; font-size:14px; color:var(--mr-text); display:block;}
.mr-list__tx small{font-family:var(--mr-num); font-weight:700; font-size:11px; color:var(--mr-dim);}
.mr-list__val{font-family:var(--mr-num); font-weight:900; font-size:14px; color:var(--mr-red);}

/* ----- 10. 顶部 HUD mr-hud ----- */
.mr-hud{display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border:3px solid var(--mr-ink);
  border-radius:16px; box-shadow:0 4px 0 var(--mr-ink);}
.mr-hud__ava{width:44px; height:44px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:22px;
  background:linear-gradient(180deg,var(--mr-red-lt),var(--mr-red)); border:3px solid var(--mr-ink);}
.mr-hud__who b{font-family:var(--mr-disp); font-weight:800; font-size:15px; color:var(--mr-text); display:block;}
.mr-hud__who small{font-family:var(--mr-num); font-weight:800; font-size:10px; color:var(--mr-green-dk); letter-spacing:.04em;}
.mr-hud__spacer{flex:1;}

/* ----- 11. 导航栏 mr-nav ----- */
.mr-nav{display:flex; gap:8px; padding:8px; background:#fff; border:3px solid var(--mr-ink); border-radius:18px;
  box-shadow:0 4px 0 var(--mr-ink);}
.mr-nav__tab{flex:1; text-align:center; font-family:var(--mr-disp); font-weight:800; font-size:11px; color:var(--mr-dim);
  padding:8px 4px; cursor:pointer; border-radius:12px; border:3px solid transparent; transition:.1s;}
.mr-nav__tab .i{display:block; font-size:20px; margin-bottom:2px;}
.mr-nav__tab--active{color:#fff; background:linear-gradient(180deg,var(--mr-red-lt),var(--mr-red));
  border-color:var(--mr-ink); box-shadow:0 3px 0 var(--mr-red-dk); text-shadow:0 1px 0 var(--mr-red-dk);}

/* ----- 12. 标签页 mr-tabs ----- */
.mr-tabs{display:flex; gap:6px;}
.mr-tabs__tab{font-family:var(--mr-disp); font-weight:800; font-size:12px; color:var(--mr-dim); padding:9px 16px; cursor:pointer;
  background:#eef1f8; border:3px solid var(--mr-ink); border-radius:12px 12px 0 0; border-bottom:none; transition:.1s;}
.mr-tabs__tab--active{color:#fff; background:linear-gradient(180deg,var(--mr-blue-lt),var(--mr-blue));}

/* ----- 13. 输入框 mr-input ----- */
.mr-input{font-family:var(--mr-ui); font-weight:700; font-size:14px; color:var(--mr-text); background:#fff;
  border:3px solid var(--mr-ink); border-radius:12px; padding:10px 14px; width:100%; outline:none; transition:.12s;
  box-shadow:inset 0 2px 3px rgba(0,0,0,.08);}
.mr-input::placeholder{color:#b5bccf;}
.mr-input:focus{border-color:var(--mr-blue); box-shadow:0 0 0 3px rgba(42,134,224,.25);}
.mr-field{position:relative;}
.mr-field__ic{position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px;}
.mr-field .mr-input{padding-left:36px;}

/* ----- 14. 下拉选择 mr-select ----- */
.mr-select{position:relative; display:inline-block;}
.mr-select select{appearance:none; -webkit-appearance:none; font-family:var(--mr-disp); font-weight:700; font-size:13px;
  color:var(--mr-text); background:#fff; border:3px solid var(--mr-ink); border-radius:12px; padding:10px 36px 10px 14px;
  cursor:pointer; outline:none; box-shadow:0 3px 0 var(--mr-ink);}
.mr-select::after{content:&quot;▾&quot;; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--mr-ink);
  pointer-events:none; font-weight:800;}

/* ----- 15. 开关 mr-switch ----- */
.mr-switch{position:relative; display:inline-flex; align-items:center; cursor:pointer; user-select:none;}
.mr-switch input{position:absolute; opacity:0; pointer-events:none;}
.mr-switch__track{width:52px; height:28px; border-radius:999px; background:#c9cede; border:3px solid var(--mr-ink);
  position:relative; transition:.15s; box-shadow:inset 0 2px 3px rgba(0,0,0,.1);}
.mr-switch__track::before{content:&quot;&quot;; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:#fff; border:2px solid var(--mr-ink); transition:.15s;}
.mr-switch input:checked + .mr-switch__track{background:var(--mr-green);}
.mr-switch input:checked + .mr-switch__track::before{left:26px;}

/* ----- 16. 滑条 mr-slider ----- */
.mr-slider{-webkit-appearance:none; appearance:none; width:100%; height:10px; border-radius:999px;
  background:linear-gradient(90deg,var(--mr-red),#e3e6ef); border:3px solid var(--mr-ink); outline:none; cursor:pointer;}
.mr-slider::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:radial-gradient(circle at 40% 30%,#fff,#e8e8f0); border:3px solid var(--mr-ink); cursor:pointer;
  box-shadow:0 2px 0 var(--mr-ink);}
.mr-slider::-moz-range-thumb{width:22px; height:22px; border-radius:50%; background:#fff; border:3px solid var(--mr-ink); cursor:pointer;}

/* ----- 17. 徽章 mr-badge ----- */
.mr-badge{display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
  font-family:var(--mr-num); font-weight:900; font-size:11px; color:#fff; background:var(--mr-red);
  border:2px solid var(--mr-ink); box-shadow:0 2px 0 var(--mr-ink);}
.mr-badge--yellow{background:var(--mr-yellow); color:#5a4200;}
.mr-badge-wrap{position:relative; display:inline-flex;}
.mr-badge-wrap > .mr-badge{position:absolute; top:-8px; right:-8px;}

/* ----- 18. 角标 mr-ribbon ----- */
.mr-ribbon{position:absolute; top:10px; left:-4px; font-family:var(--mr-disp); font-weight:800; font-size:11px; color:#fff;
  background:var(--mr-red); padding:3px 12px; border:2px solid var(--mr-ink); border-radius:4px; z-index:3;
  box-shadow:0 2px 0 var(--mr-ink); text-shadow:0 1px 0 var(--mr-red-dk);}
.mr-ribbon--yellow{background:var(--mr-yellow); color:#5a4200; text-shadow:none;}

/* ----- 19. 标签 mr-tag ----- */
.mr-tag{display:inline-flex; align-items:center; gap:5px; font-family:var(--mr-num); font-weight:800; font-size:11px;
  color:var(--mr-text); background:#eef1f8; border:2px solid var(--mr-ink); border-radius:999px; padding:3px 10px;}
.mr-tag--red{background:#ffe0da; color:var(--mr-red-dk);}
.mr-tag--green{background:#dcf5df; color:var(--mr-green-dk);}
.mr-tag--yellow{background:#fff3cc; color:#8a6a00;}

/* ----- 20. Tooltip mr-tooltip ----- */
.mr-tooltip{position:relative; display:inline-flex; cursor:help; border-bottom:2px dotted var(--mr-dim);}
.mr-tooltip::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
  font-family:var(--mr-ui); font-weight:700; font-size:12px; color:#fff; white-space:nowrap; background:var(--mr-ink);
  border-radius:10px; padding:7px 12px; opacity:0; pointer-events:none; transition:.12s; z-index:20;}
.mr-tooltip::before{content:&quot;&quot;; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:var(--mr-ink); opacity:0; transition:.12s; z-index:20;}
.mr-tooltip:hover::after,.mr-tooltip:hover::before{opacity:1;}

/* ----- 21. Toast mr-toast ----- */
.mr-toast{display:flex; align-items:center; gap:10px; font-family:var(--mr-ui); font-weight:700; font-size:13px;
  color:var(--mr-text); background:#fff; border:3px solid var(--mr-ink); border-radius:16px; padding:11px 16px; max-width:340px;
  box-shadow:0 5px 0 var(--mr-ink);}
.mr-toast__ic{width:34px; height:34px; border-radius:10px; flex:none; display:grid; place-items:center; font-size:18px;
  background:var(--mr-green); border:2px solid var(--mr-ink);}
.mr-toast--danger .mr-toast__ic{background:var(--mr-red);}
.mr-toast--coin .mr-toast__ic{background:var(--mr-yellow);}
.mr-toast b{font-family:var(--mr-disp); font-weight:800; font-size:13px; color:var(--mr-text); display:block;}

/* ----- 22. 对话气泡 mr-bubble ----- */
.mr-bubble{position:relative; font-family:var(--mr-ui); font-weight:700; font-size:13px; color:var(--mr-text); max-width:300px;
  background:#fff; border:3px solid var(--mr-ink); border-radius:16px; padding:12px 16px; box-shadow:0 5px 0 var(--mr-ink);}
.mr-bubble__who{font-family:var(--mr-disp); font-weight:800; font-size:12px; color:var(--mr-red); margin-bottom:5px;}
.mr-bubble::before{content:&quot;&quot;; position:absolute; left:24px; bottom:-14px; border:8px solid transparent; border-top-color:var(--mr-ink);}
.mr-bubble::after{content:&quot;&quot;; position:absolute; left:26px; bottom:-9px; border:6px solid transparent; border-top-color:#fff;}

/* ----- 23. 加载 mr-spinner(旋转金币) ----- */
.mr-spinner{width:40px; height:40px; border-radius:50%; background:radial-gradient(circle at 40% 30%,var(--mr-yellow-lt),var(--mr-yellow) 60%,var(--mr-yellow-dk));
  border:3px solid var(--mr-ink); display:grid; place-items:center; font-family:var(--mr-disp); font-weight:800; color:var(--mr-yellow-dk);
  animation:mr-flip 1s linear infinite;}
.mr-spinner::before{content:&quot;$&quot;; font-size:16px;}
@keyframes mr-flip{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

/* ----- 24. 头像组 mr-avatars ----- */
.mr-avatars{display:inline-flex;}
.mr-avatars__a{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-size:18px; margin-left:-10px;
  background:linear-gradient(180deg,#fff,#eef1f8); border:3px solid var(--mr-ink);}
.mr-avatars__a:first-child{margin-left:0;}
.mr-avatars__more{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; margin-left:-10px;
  font-family:var(--mr-num); font-weight:900; font-size:11px; color:#fff; background:var(--mr-blue); border:3px solid var(--mr-ink);}

/* ----- 25. 星级评分 mr-stars ----- */
.mr-stars{display:inline-flex; gap:3px; font-size:20px; color:#d5d8e2;}
.mr-stars .on{color:var(--mr-yellow); filter:drop-shadow(0 1px 0 var(--mr-yellow-dk));}

/* ----- 26. 分隔线 mr-divider ----- */
.mr-divider{display:flex; align-items:center; gap:10px; margin:6px 0;}
.mr-divider::before,.mr-divider::after{content:&quot;&quot;; height:3px; flex:1; border-radius:999px; background:var(--mr-ink); opacity:.25;}
.mr-divider__mark{font-family:var(--mr-disp); font-weight:800; font-size:13px; color:var(--mr-text);}

/* ----- 27. 空状态 mr-empty ----- */
.mr-empty{text-align:center; padding:28px 20px; color:var(--mr-dim);}
.mr-empty__ic{font-size:48px;}
.mr-empty__tt{font-family:var(--mr-disp); font-weight:800; font-size:16px; color:var(--mr-text); margin:8px 0 4px;}
.mr-empty__ds{font-family:var(--mr-num); font-weight:700; font-size:12px;}

/* ----- 28. 步进器 mr-stepper ----- */
.mr-stepper{display:inline-flex; align-items:center; gap:8px;}
.mr-stepper__btn{width:36px; height:36px; border-radius:50%; font-family:var(--mr-disp); font-weight:800; font-size:20px; color:#fff;
  cursor:pointer; border:3px solid var(--mr-ink); display:grid; place-items:center; line-height:0; padding-bottom:2px;
  background:linear-gradient(180deg,var(--mr-blue-lt),var(--mr-blue)); box-shadow:0 3px 0 var(--mr-blue-dk); transition:.07s;}
.mr-stepper__btn:active{transform:translateY(3px); box-shadow:0 0 0 var(--mr-blue-dk);}
.mr-stepper__val{min-width:46px; text-align:center; font-family:var(--mr-num); font-weight:900; font-size:18px; color:var(--mr-text);
  background:#fff; border:3px solid var(--mr-ink); border-radius:10px; padding:6px 0;}

/* ----- 29. 面包屑 mr-breadcrumb ----- */
.mr-breadcrumb{display:flex; align-items:center; gap:6px; font-family:var(--mr-ui); font-weight:700; font-size:13px; flex-wrap:wrap;}
.mr-breadcrumb a{color:var(--mr-blue-dk); text-decoration:none; cursor:pointer;}
.mr-breadcrumb a:hover{color:var(--mr-red);}
.mr-breadcrumb__sep{color:var(--mr-dim); font-weight:800;}
.mr-breadcrumb__cur{color:var(--mr-text); font-weight:800;}

/* ----- 30. 手风琴 mr-accordion ----- */
.mr-accordion{border:3px solid var(--mr-ink); border-radius:14px; overflow:hidden; background:#fff; box-shadow:0 4px 0 var(--mr-ink);}
.mr-accordion details{border-bottom:2px solid #eef1f8;}
.mr-accordion details:last-child{border-bottom:none;}
.mr-accordion summary{list-style:none; cursor:pointer; padding:12px 14px; font-family:var(--mr-disp); font-weight:800; font-size:13px;
  color:var(--mr-text); display:flex; align-items:center; gap:8px;}
.mr-accordion summary::-webkit-details-marker{display:none;}
.mr-accordion summary::before{content:&quot;▶&quot;; color:var(--mr-red); font-size:11px; transition:.15s;}
.mr-accordion details[open] summary::before{transform:rotate(90deg);}
.mr-accordion summary:hover{background:#fff8dc;}
.mr-accordion__bd{padding:2px 16px 14px 32px; font-family:var(--mr-ui); font-weight:700; font-size:12px; color:var(--mr-dim); line-height:1.6;}

/* ----- 31. 侧边抽屉 mr-drawer ----- */
.mr-drawer-mask{position:fixed; inset:0; background:rgba(20,30,50,.5); z-index:110; opacity:0; pointer-events:none; transition:.2s;}
.mr-drawer-mask.open{opacity:1; pointer-events:auto;}
.mr-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120; background:#fff;
  border-left:4px solid var(--mr-ink); box-shadow:-8px 0 24px rgba(0,0,0,.25); transform:translateX(100%);
  transition:.22s cubic-bezier(.3,.8,.3,1); display:flex; flex-direction:column;}
.mr-drawer.open{transform:translateX(0);}
.mr-drawer__hd{font-family:var(--mr-disp); font-weight:800; font-size:16px; color:#fff; padding:16px;
  background:linear-gradient(180deg,var(--mr-red-lt),var(--mr-red)); border-bottom:4px solid var(--mr-ink);
  display:flex; align-items:center; justify-content:space-between; text-shadow:0 2px 0 var(--mr-red-dk);}
.mr-drawer__hd span{cursor:pointer;}
.mr-drawer__bd{padding:12px; overflow-y:auto;}

/* ----- 32. 数据表格 mr-table ----- */
.mr-table{width:100%; border-collapse:collapse; font-family:var(--mr-num); font-weight:700; font-size:12px;
  border:3px solid var(--mr-ink); border-radius:12px; overflow:hidden;}
.mr-table thead th{font-family:var(--mr-disp); font-weight:800; font-size:11px; color:#fff; text-align:left; padding:9px 12px;
  background:linear-gradient(180deg,var(--mr-blue-lt),var(--mr-blue)); border-bottom:3px solid var(--mr-ink);}
.mr-table tbody td{padding:9px 12px; color:var(--mr-text); border-bottom:2px solid #eef1f8;}
.mr-table tbody tr:last-child td{border-bottom:none;}
.mr-table tbody tr:nth-child(even){background:#f7f9ff;}
.mr-table tbody tr:hover{background:#fff8dc;}
.mr-table__rank{color:var(--mr-red); font-family:var(--mr-disp); font-weight:800;}

/* ----- 33. 分页器 mr-pagination ----- */
.mr-pagination{display:inline-flex; gap:6px;}
.mr-pagination__pg{min-width:34px; height:34px; padding:0 6px; display:grid; place-items:center; cursor:pointer;
  font-family:var(--mr-disp); font-weight:800; font-size:13px; color:var(--mr-text); background:#fff;
  border:3px solid var(--mr-ink); border-radius:10px; box-shadow:0 3px 0 var(--mr-ink); transition:.07s;}
.mr-pagination__pg:active{transform:translateY(3px); box-shadow:0 0 0 var(--mr-ink);}
.mr-pagination__pg--active{color:#fff; background:linear-gradient(180deg,var(--mr-red-lt),var(--mr-red)); box-shadow:0 3px 0 var(--mr-red-dk);}
.mr-pagination__pg--dis{opacity:.4; cursor:not-allowed; box-shadow:0 3px 0 var(--mr-ink);}

/* ----- 34. 时间轴 mr-timeline ----- */
.mr-timeline{position:relative; padding-left:28px;}
.mr-timeline::before{content:&quot;&quot;; position:absolute; left:9px; top:8px; bottom:8px; width:4px; border-radius:999px;
  background:repeating-linear-gradient(180deg,var(--mr-ink) 0 6px,transparent 6px 12px); opacity:.5;}
.mr-timeline__item{position:relative; padding-bottom:16px;}
.mr-timeline__item:last-child{padding-bottom:0;}
.mr-timeline__item::before{content:&quot;&quot;; position:absolute; left:-24px; top:2px; width:16px; height:16px; border-radius:50%;
  background:#fff; border:3px solid var(--mr-ink);}
.mr-timeline__item--done::before{background:var(--mr-green);}
.mr-timeline__item--now::before{background:var(--mr-red);}
.mr-timeline__t{font-family:var(--mr-disp); font-weight:800; font-size:13px; color:var(--mr-text);}
.mr-timeline__d{font-family:var(--mr-num); font-weight:700; font-size:11px; color:var(--mr-dim); margin-top:2px;}

/* ----- 35. 树形菜单 mr-tree ----- */
.mr-tree{font-family:var(--mr-ui); font-weight:700; font-size:13px;}
.mr-tree details{margin-left:4px;}
.mr-tree summary{list-style:none; cursor:pointer; padding:5px 0; color:var(--mr-text); display:flex; align-items:center; gap:6px;}
.mr-tree summary::-webkit-details-marker{display:none;}
.mr-tree summary::before{content:&quot;▶&quot;; color:var(--mr-red); font-size:9px; transition:.15s;}
.mr-tree details[open] > summary::before{transform:rotate(90deg);}
.mr-tree summary:hover{color:var(--mr-red);}
.mr-tree__leaf{padding:5px 0 5px 20px; color:var(--mr-dim); cursor:pointer;}
.mr-tree__leaf:hover{color:var(--mr-text);}
.mr-tree details > *:not(summary){margin-left:14px; border-left:3px solid #eef1f8; padding-left:6px;}

/* ----- 36. 能量条倒计时 mr-energy ----- */
.mr-energy{display:flex; align-items:center; gap:10px;}
.mr-energy__orb{width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:15px; flex:none;
  background:radial-gradient(circle at 40% 30%,var(--mr-green-lt),var(--mr-green) 60%,var(--mr-green-dk)); border:3px solid var(--mr-ink);}
.mr-energy__body{flex:1;}
.mr-energy__top{display:flex; justify-content:space-between; font-family:var(--mr-num); font-weight:800; font-size:11px; color:var(--mr-dim); margin-bottom:3px;}
.mr-energy__timer{color:var(--mr-green-dk); font-variant-numeric:tabular-nums;}

/* ----- 37. 签到日历 mr-calendar ----- */
.mr-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.mr-calendar__day{aspect-ratio:1; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; font-family:var(--mr-num); font-weight:800; font-size:10px; color:var(--mr-dim); background:#fff;
  border:3px solid var(--mr-ink); position:relative;}
.mr-calendar__day .r{font-size:16px;}
.mr-calendar__day--done{background:#dcf5df;}
.mr-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center; border-radius:9px;
  background:rgba(63,181,74,.85); color:#fff; font-size:20px; font-weight:900;}
.mr-calendar__day--today{border-color:var(--mr-red); box-shadow:0 0 0 3px rgba(232,64,46,.25); background:#fff3cc;}

/* ----- 38. 任务链 mr-questchain ----- */
.mr-questchain{display:flex; align-items:center;}
.mr-questchain__node{width:42px; height:42px; border-radius:50%; display:grid; place-items:center; font-size:18px; flex:none; z-index:2;
  background:#fff; border:3px solid var(--mr-ink); box-shadow:0 3px 0 var(--mr-ink);}
.mr-questchain__node--done{background:var(--mr-yellow);}
.mr-questchain__node--now{background:var(--mr-red); color:#fff; transform:scale(1.1);}
.mr-questchain__link{height:4px; flex:1; min-width:16px; border-radius:999px;
  background:repeating-linear-gradient(90deg,var(--mr-ink) 0 5px,transparent 5px 10px); opacity:.4;}
.mr-questchain__link--done{background:var(--mr-yellow); opacity:1;}

/* ----- 39. 成就解锁 mr-achievement ----- */
.mr-achievement{display:flex; align-items:center; gap:14px; padding:12px 16px; background:#fff; border:3px solid var(--mr-ink);
  border-radius:16px; box-shadow:0 4px 0 var(--mr-ink);}
.mr-achievement__medal{width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:26px; flex:none;
  background:radial-gradient(circle at 40% 30%,var(--mr-yellow-lt),var(--mr-yellow) 60%,var(--mr-yellow-dk)); border:3px solid var(--mr-ink);}
.mr-achievement__tx b{font-family:var(--mr-disp); font-weight:800; font-size:14px; color:var(--mr-text); display:block;}
.mr-achievement__tx small{font-family:var(--mr-num); font-weight:700; font-size:11px; color:var(--mr-dim);}
.mr-achievement--locked{filter:grayscale(.7); opacity:.7;}
.mr-achievement--locked .mr-achievement__medal{background:#c9cede;}

/* ----- 40. 翻牌 mr-flipcard ----- */
.mr-flipcard{width:120px; height:168px; perspective:800px; cursor:pointer;}
.mr-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s;}
.mr-flipcard.flipped .mr-flipcard__inner{transform:rotateY(180deg);}
.mr-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border:4px solid var(--mr-ink); border-radius:16px; display:grid; place-items:center; overflow:hidden;}
.mr-flipcard__back{background:linear-gradient(180deg,var(--mr-brick),var(--mr-brick-dk)); color:#fff; font-size:40px; font-weight:800; font-family:var(--mr-disp);}
.mr-flipcard__front{transform:rotateY(180deg); flex-direction:column; background:linear-gradient(180deg,var(--mr-yellow-lt),var(--mr-yellow));}
.mr-flipcard__front .em{font-size:46px;} .mr-flipcard__front .nm{font-family:var(--mr-disp); font-weight:800; font-size:13px; color:#5a4200; margin-top:6px;}

/* ----- 41. 开砖块 mr-chest ----- */
.mr-chest{width:120px; text-align:center; cursor:pointer; user-select:none;}
.mr-chest__box{width:74px; height:74px; margin:0 auto; border-radius:12px; display:grid; place-items:center; font-size:38px; font-weight:800;
  font-family:var(--mr-disp); color:#7a4a12; background:linear-gradient(180deg,var(--mr-yellow),var(--mr-yellow-dk));
  border:4px solid var(--mr-ink); box-shadow:0 5px 0 var(--mr-ink), inset 0 3px 0 rgba(255,255,255,.4); transition:.15s;}
.mr-chest:hover .mr-chest__box{transform:translateY(-4px);}
.mr-chest.opened .mr-chest__box{animation:mr-bounce .5s ease;}
@keyframes mr-bounce{0%{transform:translateY(0)}40%{transform:translateY(-14px)}100%{transform:translateY(0)}}
.mr-chest__glow{height:0; overflow:hidden; opacity:0; transition:.3s;}
.mr-chest.opened .mr-chest__glow{height:auto; opacity:1; padding-top:8px;}
.mr-chest__label{font-family:var(--mr-disp); font-weight:800; font-size:12px; color:var(--mr-text); margin-top:6px;}

/* ----- 42. 背包网格 mr-invgrid ----- */
.mr-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:10px; background:#fff;
  border:3px solid var(--mr-ink); border-radius:14px; width:max-content; box-shadow:0 4px 0 var(--mr-ink);}
.mr-invgrid__cell{width:46px; height:46px; border-radius:10px; display:grid; place-items:center; font-size:22px; position:relative;
  background:linear-gradient(180deg,#fff,#eef1f8); border:2px solid var(--mr-ink);}
.mr-invgrid__cell:hover{background:#fff8dc;}
.mr-invgrid__cell--rare{background:linear-gradient(180deg,var(--mr-blue-lt),#bfe4ff);}
.mr-invgrid__cell--legend{background:linear-gradient(180deg,var(--mr-yellow-lt),#ffe89a);}
.mr-invgrid__cell--empty{background:#eef1f8; opacity:.6;}
.mr-invgrid__qty{position:absolute; bottom:1px; right:3px; font-family:var(--mr-num); font-weight:900; font-size:10px; color:var(--mr-text);}

/* ----- 43. 装备对比 mr-compare ----- */
.mr-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; background:#fff;
  border:3px solid var(--mr-ink); border-radius:16px; padding:14px; box-shadow:0 4px 0 var(--mr-ink);}
.mr-compare__side{text-align:center;}
.mr-compare__side .mr-icon{margin:0 auto 8px;}
.mr-compare__nm{font-family:var(--mr-disp); font-weight:800; font-size:12px; color:var(--mr-text); margin-bottom:8px;}
.mr-compare__stat{display:flex; justify-content:space-between; font-family:var(--mr-num); font-weight:700; font-size:11px;
  padding:3px 0; border-bottom:2px solid #eef1f8;}
.mr-compare__stat span:first-child{color:var(--mr-dim);}
.mr-compare__up{color:var(--mr-green-dk);} .mr-compare__down{color:var(--mr-red);}
.mr-compare__vs{font-family:var(--mr-disp); font-weight:800; font-size:16px; color:var(--mr-red);}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}
</style>

  --ios-faint:#b8c0d8;  --ios-white:#ffffff;  --ios-surface:#ffffff;
  --ios-bg1:#eef1ff;    --ios-bg2:#faf0fc;    --ios-track:#e7eaf5;

  --ios-font:'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
  --ios-round:'Quicksand','Nunito',sans-serif;

  --ios-sh-sm:0 4px 12px rgba(120,130,180,.16);
  --ios-sh:0 8px 20px rgba(120,130,180,.2);
  --ios-sh-lg:0 14px 30px rgba(120,110,220,.28);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--ios-font); color:var(--ios-text); line-height:1.5;
  background:linear-gradient(160deg,#eef1ff 0%,#f4eefc 50%,#fdf0f6 100%);
  background-attachment:fixed; min-height:100vh; padding:0 0 90px;
}
.doc{max-width:960px; margin:0 auto; padding:0 20px;}
.doc-head{text-align:center; padding:52px 20px 26px;}
.doc-head .eb{display:inline-block; margin-bottom:16px; font-family:var(--ios-round); font-weight:700; font-size:12px;
  letter-spacing:.14em; color:var(--ios-purple-dk); background:#fff; padding:7px 18px; border-radius:999px;
  box-shadow:var(--ios-sh-sm);}
.doc-head h1{font-family:var(--ios-round); font-weight:700; font-size:clamp(28px,5vw,46px); color:var(--ios-ink);
  letter-spacing:-.01em;}
.doc-head h1 .g{background:linear-gradient(120deg,var(--ios-purple),var(--ios-pink));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
.doc-head p{margin-top:12px; color:var(--ios-dim); font-weight:700;}

.tokens{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:22px;}
.tok{display:flex; align-items:center; gap:7px; font-family:var(--ios-font); font-weight:800; font-size:11px; color:var(--ios-text);
  background:#fff; padding:5px 12px; border-radius:999px; box-shadow:var(--ios-sh-sm);}
.tok i{width:14px;height:14px; border-radius:6px;}

.comp{margin-top:38px;}
.comp-title{font-family:var(--ios-round); font-weight:700; font-size:19px; color:var(--ios-ink);
  display:flex; align-items:center; gap:10px; margin-bottom:4px;}
.comp-title::before{content:&quot;&quot;; width:10px; height:10px; border-radius:4px;
  background:linear-gradient(135deg,var(--ios-purple),var(--ios-pink));}
.comp-desc{color:var(--ios-dim); font-weight:700; font-size:13px; margin-bottom:16px;}
.showcase{display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:26px;
  background:rgba(255,255,255,.6); border-radius:24px; box-shadow:var(--ios-sh-sm);}
.classline{margin-top:10px; font-family:ui-monospace,monospace; font-size:12px; color:var(--ios-purple-dk);
  background:#fff; border-radius:12px; padding:9px 14px; overflow-x:auto; font-weight:600; box-shadow:var(--ios-sh-sm);}
.classline b{color:var(--ios-pink-dk);}

/* ============================================================================
   ============  COMPONENTS  ============
   ============================================================================ */

/* ----- 1. 按钮 ios-btn ----- */
.ios-btn{font-family:var(--ios-font); font-weight:800; font-size:15px; color:#fff; cursor:pointer; user-select:none;
  display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border:none; border-radius:16px; text-align:center;
  background:linear-gradient(135deg,var(--b1,var(--ios-purple)),var(--b2,var(--ios-purple-dk)));
  box-shadow:0 8px 18px var(--bsh,rgba(138,124,255,.4)); transition:transform .12s, box-shadow .12s, filter .12s;}
.ios-btn:hover{filter:brightness(1.04);}
.ios-btn:active{transform:translateY(2px) scale(.98); box-shadow:0 4px 10px var(--bsh,rgba(138,124,255,.4));}
.ios-btn--purple{--b1:var(--ios-purple);--b2:var(--ios-purple-dk);--bsh:rgba(138,124,255,.4);}
.ios-btn--pink{--b1:var(--ios-pink);--b2:var(--ios-pink-dk);--bsh:rgba(255,143,184,.42);}
.ios-btn--mint{--b1:var(--ios-mint);--b2:var(--ios-mint-dk);--bsh:rgba(79,216,168,.42);}
.ios-btn--blue{--b1:var(--ios-blue);--b2:var(--ios-blue-dk);--bsh:rgba(91,184,255,.42);}
.ios-btn--soft{background:#fff; color:var(--ios-purple-dk); box-shadow:var(--ios-sh-sm);}
.ios-btn--ghost{background:transparent; color:var(--ios-dim); box-shadow:none;}
.ios-btn--sm{font-size:13px; padding:9px 18px; border-radius:13px;}
.ios-btn--lg{font-size:17px; padding:16px 32px; border-radius:20px;}
.ios-btn--block{width:100%; justify-content:center;}
.ios-btn--pill{border-radius:999px;}
.ios-btn[disabled],.ios-btn--disabled{opacity:.5; cursor:not-allowed;}
.ios-btn[disabled]:active,.ios-btn--disabled:active{transform:none;}

/* ----- 2. 面板 ios-panel ----- */
.ios-panel{background:var(--ios-surface); border-radius:24px; box-shadow:var(--ios-sh); overflow:hidden;}
.ios-panel__hd{font-family:var(--ios-round); font-weight:700; font-size:17px; color:var(--ios-ink); padding:18px 20px 10px;}
.ios-panel__bd{padding:4px 20px 20px;}
.ios-panel__bd p{font-weight:700; font-size:13px; color:var(--ios-dim); line-height:1.6;}

/* ----- 3. 弹窗 ios-modal ----- */
.ios-modal-mask{position:fixed; inset:0; background:rgba(60,60,90,.35); backdrop-filter:blur(6px);
  display:grid; place-items:center; z-index:100; padding:20px;}
.ios-modal{width:min(360px,92vw); background:#fff; border-radius:28px; box-shadow:var(--ios-sh-lg); overflow:hidden;
  text-align:center;}
.ios-modal__hd{padding:24px 24px 6px; font-family:var(--ios-round); font-weight:700; font-size:20px; color:var(--ios-ink);}
.ios-modal__bd{padding:4px 24px 12px; font-weight:700; font-size:13px; color:var(--ios-dim);}
.ios-modal__ft{display:flex; border-top:1px solid #eef1f8;}
.ios-modal__ft .ios-btn{flex:1; border-radius:0; background:none; color:var(--ios-purple-dk); box-shadow:none; padding:16px;}
.ios-modal__ft .ios-btn:active{transform:none; background:#f7f8ff;}
.ios-modal__ft .ios-btn + .ios-btn{border-left:1px solid #eef1f8;}
.ios-modal__ft .ios-btn.primary{color:var(--ios-purple); font-weight:900;}

/* ----- 4. 进度条 ios-bar ----- */
.ios-bar{position:relative; height:12px; background:var(--ios-track); border-radius:999px; overflow:hidden;}
.ios-bar__fill{height:100%; border-radius:999px;}
.ios-bar__fill--purple{background:linear-gradient(90deg,var(--ios-purple),var(--ios-pink));}
.ios-bar__fill--mint{background:linear-gradient(90deg,var(--ios-mint),var(--ios-blue));}
.ios-bar__fill--amber{background:linear-gradient(90deg,var(--ios-amber),var(--ios-pink));}
.ios-bar__cap{display:flex; justify-content:space-between; font-weight:800; font-size:12px; color:var(--ios-dim); margin-bottom:6px;}
.ios-bar--tall{height:16px;}

/* ----- 5. 货币条 ios-currency ----- */
.ios-currency{display:inline-flex; align-items:center; gap:6px; font-weight:900; font-size:15px; color:var(--ios-text);
  background:#fff; padding:5px 14px 5px 6px; border-radius:999px; box-shadow:var(--ios-sh-sm);}
.ios-currency__ic{width:24px; height:24px; border-radius:50%; flex:none; display:grid; place-items:center; font-size:13px;}
.ios-currency__ic--coin{background:#fff2cc;} .ios-currency__ic--gem{background:#e3e0ff;} .ios-currency__ic--heart{background:#ffe0e6;}

/* ----- 6. 状态计量表 ios-ring(环形) ----- */
.ios-ring{width:64px; height:64px; position:relative; flex:none;}
.ios-ring svg{transform:rotate(-90deg);}
.ios-ring__track{fill:none; stroke:var(--ios-track); stroke-width:7;}
.ios-ring__val{fill:none; stroke-width:7; stroke-linecap:round;}
.ios-ring__val--purple{stroke:url(#iosGrad1);} .ios-ring__val--mint{stroke:url(#iosGrad2);}
.ios-ring__num{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--ios-round); font-weight:700;
  font-size:15px; color:var(--ios-ink);}

/* ----- 7. 图标底座 ios-icon ----- */
.ios-icon{width:52px; height:52px; border-radius:16px; display:grid; place-items:center; font-size:24px; position:relative;
  background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-purple)); box-shadow:0 6px 14px rgba(138,124,255,.3);}
.ios-icon--pink{background:linear-gradient(135deg,var(--ios-pink-lt),var(--ios-pink)); box-shadow:0 6px 14px rgba(255,143,184,.3);}
.ios-icon--mint{background:linear-gradient(135deg,var(--ios-mint-lt),var(--ios-mint)); box-shadow:0 6px 14px rgba(79,216,168,.3);}
.ios-icon--amber{background:linear-gradient(135deg,var(--ios-amber-lt),var(--ios-amber)); box-shadow:0 6px 14px rgba(255,194,74,.3);}
.ios-icon__cd{position:absolute; inset:0; background:rgba(58,63,85,.55); border-radius:16px; display:grid; place-items:center;
  font-family:var(--ios-round); font-weight:700; font-size:16px; color:#fff;}

/* ----- 8. 卡片 ios-card ----- */
.ios-card{width:150px; background:#fff; border-radius:20px; overflow:hidden; cursor:pointer; box-shadow:var(--ios-sh);
  transition:transform .12s, box-shadow .12s; position:relative;}
.ios-card:hover{transform:translateY(-4px); box-shadow:var(--ios-sh-lg);}
.ios-card__art{height:100px; display:grid; place-items:center; font-size:46px; position:relative;
  background:linear-gradient(135deg,var(--c1,var(--ios-purple-lt)),var(--c2,var(--ios-pink)));}
.ios-card--mint{--c1:var(--ios-mint-lt);--c2:var(--ios-blue);} .ios-card--amber{--c1:var(--ios-amber-lt);--c2:var(--ios-pink);}
.ios-card--blue{--c1:var(--ios-blue-lt);--c2:var(--ios-purple);}
.ios-card__tag{position:absolute; top:8px; left:8px; font-weight:800; font-size:9px; color:var(--ios-purple-dk);
  background:rgba(255,255,255,.9); padding:3px 9px; border-radius:999px;}
.ios-card__name{font-family:var(--ios-round); font-weight:700; font-size:14px; color:var(--ios-ink); text-align:center; padding:10px 6px 4px;}
.ios-card__foot{padding:0 12px 12px;}

/* ----- 9. 列表项 ios-list ----- */
.ios-list{background:#fff; border-radius:18px; overflow:hidden; box-shadow:var(--ios-sh-sm);}
.ios-list__item{display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; transition:.1s;}
.ios-list__item:not(:last-child){border-bottom:1px solid #f0f2fa;}
.ios-list__item:hover{background:#faf9ff;}
.ios-list__ic{width:38px; height:38px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:18px;
  background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-purple)); color:#fff;}
.ios-list__tx{flex:1;}
.ios-list__tx b{font-family:var(--ios-round); font-weight:700; font-size:14px; color:var(--ios-ink); display:block;}
.ios-list__tx small{font-weight:700; font-size:12px; color:var(--ios-dim);}
.ios-list__val{font-weight:900; font-size:14px; color:var(--ios-purple-dk);}
.ios-list__chev{color:var(--ios-faint); font-size:16px;}

/* ----- 10. 顶部 HUD ios-hud ----- */
.ios-hud{display:flex; align-items:center; gap:12px; padding:14px 16px; background:#fff; border-radius:20px; box-shadow:var(--ios-sh-sm);}
.ios-hud__ava{width:44px; height:44px; border-radius:16px; flex:none; display:grid; place-items:center; font-size:22px;
  background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-pink));}
.ios-hud__who b{font-family:var(--ios-round); font-weight:700; font-size:15px; color:var(--ios-ink); display:block;}
.ios-hud__who small{font-weight:700; font-size:11px; color:var(--ios-dim);}
.ios-hud__spacer{flex:1;}

/* ----- 11. 导航栏 ios-nav ----- */
.ios-nav{display:flex; padding:8px 8px 10px; background:rgba(255,255,255,.85); backdrop-filter:blur(10px);
  border-radius:22px; box-shadow:var(--ios-sh);}
.ios-nav__tab{flex:1; text-align:center; font-weight:800; font-size:11px; color:var(--ios-faint); cursor:pointer;
  padding-top:4px; transition:.12s;}
.ios-nav__tab .i{display:block; font-size:22px; margin-bottom:2px; filter:grayscale(.5); opacity:.55; transition:.12s;}
.ios-nav__tab--active{color:var(--ios-purple);}
.ios-nav__tab--active .i{filter:none; opacity:1; transform:translateY(-2px);}

/* ----- 12. 标签页 ios-tabs(分段控件) ----- */
.ios-tabs{display:inline-flex; background:var(--ios-track); border-radius:14px; padding:4px; gap:2px;}
.ios-tabs__tab{font-weight:800; font-size:13px; color:var(--ios-dim); padding:8px 18px; cursor:pointer; border-radius:11px; transition:.15s;}
.ios-tabs__tab--active{color:var(--ios-ink); background:#fff; box-shadow:var(--ios-sh-sm);}

/* ----- 13. 输入框 ios-input ----- */
.ios-input{font-family:var(--ios-font); font-weight:700; font-size:14px; color:var(--ios-text); background:var(--ios-track);
  border:2px solid transparent; border-radius:14px; padding:12px 16px; width:100%; outline:none; transition:.15s;}
.ios-input::placeholder{color:var(--ios-faint);}
.ios-input:focus{background:#fff; border-color:var(--ios-purple); box-shadow:0 0 0 4px rgba(138,124,255,.15);}
.ios-field{position:relative;}
.ios-field__ic{position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:15px; color:var(--ios-dim);}
.ios-field .ios-input{padding-left:40px;}

/* ----- 14. 下拉选择 ios-select ----- */
.ios-select{position:relative; display:inline-block;}
.ios-select select{appearance:none; -webkit-appearance:none; font-family:var(--ios-font); font-weight:700; font-size:14px;
  color:var(--ios-text); background:#fff; border:none; border-radius:14px; padding:12px 40px 12px 16px; cursor:pointer;
  outline:none; box-shadow:var(--ios-sh-sm);}
.ios-select::after{content:&quot;⌄&quot;; position:absolute; right:16px; top:42%; transform:translateY(-50%); color:var(--ios-purple);
  pointer-events:none; font-weight:900; font-size:16px;}

/* ----- 15. 开关 ios-switch ----- */
.ios-switch{position:relative; display:inline-flex; align-items:center; cursor:pointer; user-select:none;}
.ios-switch input{position:absolute; opacity:0; pointer-events:none;}
.ios-switch__track{width:52px; height:31px; border-radius:999px; background:var(--ios-track); position:relative; transition:.2s;}
.ios-switch__track::before{content:&quot;&quot;; position:absolute; top:3px; left:3px; width:25px; height:25px; border-radius:50%;
  background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.2); transition:.2s;}
.ios-switch input:checked + .ios-switch__track{background:var(--ios-mint);}
.ios-switch input:checked + .ios-switch__track::before{left:24px;}

/* ----- 16. 滑条 ios-slider ----- */
.ios-slider{-webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:999px; background:var(--ios-track);
  outline:none; cursor:pointer;}
.ios-slider::-webkit-slider-thumb{-webkit-appearance:none; width:26px; height:26px; border-radius:50%; background:#fff;
  box-shadow:0 3px 8px rgba(0,0,0,.2); cursor:pointer; border:1px solid #eef1f8;}
.ios-slider::-moz-range-thumb{width:26px; height:26px; border-radius:50%; background:#fff; border:1px solid #eef1f8;
  box-shadow:0 3px 8px rgba(0,0,0,.2); cursor:pointer;}

/* ----- 17. 徽章 ios-badge ----- */
.ios-badge{display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
  font-weight:900; font-size:11px; color:#fff; background:var(--ios-red); box-shadow:0 2px 6px rgba(255,107,107,.4);}
.ios-badge--purple{background:var(--ios-purple); box-shadow:0 2px 6px rgba(138,124,255,.4);}
.ios-badge-wrap{position:relative; display:inline-flex;}
.ios-badge-wrap > .ios-badge{position:absolute; top:-6px; right:-6px;}

/* ----- 18. 角标 ios-ribbon ----- */
.ios-ribbon{position:absolute; top:10px; right:10px; font-weight:800; font-size:10px; color:#fff;
  background:linear-gradient(135deg,var(--ios-pink),var(--ios-purple)); padding:4px 12px; border-radius:999px; z-index:3;
  box-shadow:0 3px 8px rgba(138,124,255,.4);}
.ios-ribbon--amber{background:linear-gradient(135deg,var(--ios-amber),var(--ios-pink));}

/* ----- 19. 标签 ios-tag ----- */
.ios-tag{display:inline-flex; align-items:center; gap:5px; font-weight:800; font-size:11px; color:var(--ios-purple-dk);
  background:#efecff; padding:4px 11px; border-radius:999px;}
.ios-tag--pink{color:var(--ios-pink-dk); background:#ffe9f1;}
.ios-tag--mint{color:var(--ios-mint-dk); background:#dcf7ee;}
.ios-tag--amber{color:#a87500; background:#fff2d6;}

/* ----- 20. Tooltip ios-tooltip ----- */
.ios-tooltip{position:relative; display:inline-flex; cursor:help; border-bottom:2px dotted var(--ios-faint);}
.ios-tooltip::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
  font-weight:700; font-size:12px; color:#fff; white-space:nowrap; background:var(--ios-ink); border-radius:12px; padding:8px 12px;
  opacity:0; pointer-events:none; transition:.15s; z-index:20; box-shadow:var(--ios-sh);}
.ios-tooltip::before{content:&quot;&quot;; position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:var(--ios-ink); opacity:0; transition:.15s; z-index:20;}
.ios-tooltip:hover::after,.ios-tooltip:hover::before{opacity:1;}

/* ----- 21. Toast ios-toast ----- */
.ios-toast{display:flex; align-items:center; gap:12px; font-weight:700; font-size:13px; color:var(--ios-text);
  background:#fff; border-radius:18px; padding:12px 16px; max-width:340px; box-shadow:var(--ios-sh);}
.ios-toast__ic{width:36px; height:36px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:18px; color:#fff;
  background:linear-gradient(135deg,var(--ios-mint-lt),var(--ios-mint));}
.ios-toast--danger .ios-toast__ic{background:linear-gradient(135deg,var(--ios-pink),var(--ios-red));}
.ios-toast--info .ios-toast__ic{background:linear-gradient(135deg,var(--ios-blue-lt),var(--ios-blue));}
.ios-toast b{font-family:var(--ios-round); font-weight:700; font-size:13px; color:var(--ios-ink); display:block;}

/* ----- 22. 对话气泡 ios-bubble ----- */
.ios-bubble{position:relative; font-weight:700; font-size:13px; color:var(--ios-text); max-width:280px;
  background:linear-gradient(135deg,var(--ios-purple),var(--ios-purple-dk)); color:#fff; padding:12px 16px;
  border-radius:20px 20px 20px 6px; box-shadow:var(--ios-sh);}
.ios-bubble__who{font-family:var(--ios-round); font-weight:700; font-size:11px; opacity:.85; margin-bottom:4px;}

/* ----- 23. 加载 ios-spinner ----- */
.ios-spinner{width:36px; height:36px; border-radius:50%; border:4px solid var(--ios-track);
  border-top-color:var(--ios-purple); animation:ios-spin .7s linear infinite;}
@keyframes ios-spin{to{transform:rotate(360deg);}}
.ios-dots{display:inline-flex; gap:6px;}
.ios-dots i{width:9px; height:9px; border-radius:50%; background:var(--ios-purple); animation:ios-bounce 1.2s ease-in-out infinite;}
.ios-dots i:nth-child(2){animation-delay:.15s; background:var(--ios-pink);}
.ios-dots i:nth-child(3){animation-delay:.3s; background:var(--ios-mint);}
@keyframes ios-bounce{0%,60%,100%{transform:translateY(0); opacity:.5}30%{transform:translateY(-8px); opacity:1}}

/* ----- 24. 头像组 ios-avatars ----- */
.ios-avatars{display:inline-flex;}
.ios-avatars__a{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-size:18px; margin-left:-10px;
  background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-pink)); border:3px solid #fff; box-shadow:var(--ios-sh-sm);}
.ios-avatars__a:first-child{margin-left:0;}
.ios-avatars__more{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; margin-left:-10px;
  font-weight:900; font-size:11px; color:var(--ios-purple-dk); background:#efecff; border:3px solid #fff; box-shadow:var(--ios-sh-sm);}

/* ----- 25. 星级评分 ios-stars ----- */
.ios-stars{display:inline-flex; gap:4px; font-size:20px; color:var(--ios-track);}
.ios-stars .on{color:var(--ios-amber);}

/* ----- 26. 分隔线 ios-divider ----- */
.ios-divider{display:flex; align-items:center; gap:12px; margin:6px 0; color:var(--ios-faint);}
.ios-divider::before,.ios-divider::after{content:&quot;&quot;; height:1.5px; flex:1; border-radius:999px; background:#e7eaf5;}
.ios-divider__mark{font-weight:800; font-size:12px; color:var(--ios-dim);}

/* ----- 27. 空状态 ios-empty ----- */
.ios-empty{text-align:center; padding:32px 20px; color:var(--ios-dim);}
.ios-empty__ic{width:80px; height:80px; margin:0 auto; border-radius:28px; display:grid; place-items:center; font-size:40px;
  background:linear-gradient(135deg,#f0edff,#ffeef6);}
.ios-empty__tt{font-family:var(--ios-round); font-weight:700; font-size:16px; color:var(--ios-ink); margin:14px 0 4px;}
.ios-empty__ds{font-weight:700; font-size:12px;}

/* ----- 28. 步进器 ios-stepper ----- */
.ios-stepper{display:inline-flex; align-items:center; background:var(--ios-track); border-radius:14px; padding:3px;}
.ios-stepper__btn{width:34px; height:34px; border-radius:11px; font-family:var(--ios-round); font-weight:700; font-size:18px;
  color:var(--ios-purple-dk); background:#fff; border:none; cursor:pointer; display:grid; place-items:center;
  box-shadow:var(--ios-sh-sm); transition:.1s;}
.ios-stepper__btn:active{transform:scale(.92);}
.ios-stepper__val{min-width:44px; text-align:center; font-weight:900; font-size:16px; color:var(--ios-ink);}

/* ----- 29. 面包屑 ios-breadcrumb ----- */
.ios-breadcrumb{display:flex; align-items:center; gap:7px; font-weight:700; font-size:13px; flex-wrap:wrap;}
.ios-breadcrumb a{color:var(--ios-dim); text-decoration:none; cursor:pointer;}
.ios-breadcrumb a:hover{color:var(--ios-purple);}
.ios-breadcrumb__sep{color:var(--ios-faint);}
.ios-breadcrumb__cur{color:var(--ios-ink); font-weight:800;}

/* ----- 30. 手风琴 ios-accordion ----- */
.ios-accordion{background:#fff; border-radius:18px; overflow:hidden; box-shadow:var(--ios-sh-sm);}
.ios-accordion details:not(:last-child){border-bottom:1px solid #f0f2fa;}
.ios-accordion summary{list-style:none; cursor:pointer; padding:14px 16px; font-family:var(--ios-round); font-weight:700; font-size:14px;
  color:var(--ios-ink); display:flex; align-items:center; justify-content:space-between;}
.ios-accordion summary::-webkit-details-marker{display:none;}
.ios-accordion summary::after{content:&quot;⌄&quot;; color:var(--ios-faint); font-size:16px; font-weight:900; transition:.2s;}
.ios-accordion details[open] summary::after{transform:rotate(180deg);}
.ios-accordion__bd{padding:0 16px 14px; font-weight:700; font-size:12px; color:var(--ios-dim); line-height:1.6;}

/* ----- 31. 侧边抽屉 ios-drawer ----- */
.ios-drawer-mask{position:fixed; inset:0; background:rgba(60,60,90,.3); backdrop-filter:blur(3px); z-index:110;
  opacity:0; pointer-events:none; transition:.2s;}
.ios-drawer-mask.open{opacity:1; pointer-events:auto;}
.ios-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120; background:var(--ios-bg1);
  box-shadow:-8px 0 30px rgba(60,60,90,.2); transform:translateX(100%); transition:.24s cubic-bezier(.3,.8,.3,1);
  display:flex; flex-direction:column;}
.ios-drawer.open{transform:translateX(0);}
.ios-drawer__hd{font-family:var(--ios-round); font-weight:700; font-size:17px; color:var(--ios-ink); padding:18px;
  display:flex; align-items:center; justify-content:space-between;}
.ios-drawer__hd span{cursor:pointer; color:var(--ios-dim); font-size:20px;}
.ios-drawer__bd{padding:0 14px 14px; overflow-y:auto;}

/* ----- 32. 数据表格 ios-table ----- */
.ios-table{width:100%; border-collapse:collapse; font-weight:700; font-size:13px; background:#fff; border-radius:16px; overflow:hidden;
  box-shadow:var(--ios-sh-sm);}
.ios-table thead th{font-family:var(--ios-round); font-weight:700; font-size:11px; color:var(--ios-dim); text-align:left;
  padding:12px 14px; background:#f7f8ff;}
.ios-table tbody td{padding:12px 14px; color:var(--ios-text); border-top:1px solid #f0f2fa;}
.ios-table tbody tr:hover{background:#faf9ff;}
.ios-table__rank{font-family:var(--ios-round); font-weight:700; color:var(--ios-purple);}

/* ----- 33. 分页器 ios-pagination ----- */
.ios-pagination{display:inline-flex; gap:6px;}
.ios-pagination__pg{min-width:34px; height:34px; padding:0 6px; display:grid; place-items:center; cursor:pointer;
  font-weight:800; font-size:13px; color:var(--ios-dim); background:#fff; border-radius:11px; box-shadow:var(--ios-sh-sm); transition:.12s;}
.ios-pagination__pg:hover{color:var(--ios-ink);}
.ios-pagination__pg--active{color:#fff; background:linear-gradient(135deg,var(--ios-purple),var(--ios-purple-dk));
  box-shadow:0 4px 10px rgba(138,124,255,.4);}
.ios-pagination__pg--dis{opacity:.4; cursor:not-allowed;}

/* ----- 34. 时间轴 ios-timeline ----- */
.ios-timeline{position:relative; padding-left:26px;}
.ios-timeline::before{content:&quot;&quot;; position:absolute; left:7px; top:8px; bottom:8px; width:2px; background:#e7eaf5;}
.ios-timeline__item{position:relative; padding-bottom:16px;}
.ios-timeline__item:last-child{padding-bottom:0;}
.ios-timeline__item::before{content:&quot;&quot;; position:absolute; left:-23px; top:3px; width:14px; height:14px; border-radius:50%;
  background:#fff; border:3px solid var(--ios-faint);}
.ios-timeline__item--done::before{background:var(--ios-mint); border-color:var(--ios-mint);}
.ios-timeline__item--now::before{background:var(--ios-purple); border-color:var(--ios-purple); box-shadow:0 0 0 4px rgba(138,124,255,.2);}
.ios-timeline__t{font-family:var(--ios-round); font-weight:700; font-size:13px; color:var(--ios-ink);}
.ios-timeline__d{font-weight:700; font-size:11px; color:var(--ios-dim); margin-top:2px;}

/* ----- 35. 树形菜单 ios-tree ----- */
.ios-tree{font-weight:700; font-size:13px;}
.ios-tree details{margin-left:4px;}
.ios-tree summary{list-style:none; cursor:pointer; padding:6px 0; color:var(--ios-ink); display:flex; align-items:center; gap:6px;}
.ios-tree summary::-webkit-details-marker{display:none;}
.ios-tree summary::before{content:&quot;›&quot;; color:var(--ios-purple); font-size:16px; font-weight:900; transition:.15s;}
.ios-tree details[open] > summary::before{transform:rotate(90deg);}
.ios-tree summary:hover{color:var(--ios-purple);}
.ios-tree__leaf{padding:6px 0 6px 22px; color:var(--ios-dim); cursor:pointer;}
.ios-tree__leaf:hover{color:var(--ios-ink);}
.ios-tree details > *:not(summary){margin-left:14px; border-left:1.5px solid #eef1f8; padding-left:6px;}

/* ----- 36. 能量条倒计时 ios-energy ----- */
.ios-energy{display:flex; align-items:center; gap:12px;}
.ios-energy__orb{width:32px; height:32px; border-radius:12px; display:grid; place-items:center; font-size:15px; flex:none; color:#fff;
  background:linear-gradient(135deg,var(--ios-pink-lt),var(--ios-pink));}
.ios-energy__body{flex:1;}
.ios-energy__top{display:flex; justify-content:space-between; font-weight:800; font-size:11px; color:var(--ios-dim); margin-bottom:4px;}
.ios-energy__timer{color:var(--ios-pink-dk); font-variant-numeric:tabular-nums;}
.ios-energy .ios-bar__fill{background:linear-gradient(90deg,var(--ios-pink),var(--ios-purple));}

/* ----- 37. 签到日历 ios-calendar ----- */
.ios-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
.ios-calendar__day{aspect-ratio:1; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; font-weight:800; font-size:10px; color:var(--ios-dim); background:#fff; box-shadow:var(--ios-sh-sm); position:relative;}
.ios-calendar__day .r{font-size:16px;}
.ios-calendar__day--done{background:linear-gradient(135deg,#dcf7ee,#e3f5ff);}
.ios-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center; border-radius:16px;
  background:rgba(79,216,168,.85); color:#fff; font-size:22px; font-weight:900;}
.ios-calendar__day--today{background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-purple)); color:#fff;
  box-shadow:0 6px 14px rgba(138,124,255,.4);}
.ios-calendar__day--today .r{filter:brightness(1.2);}

/* ----- 38. 任务链 ios-questchain ----- */
.ios-questchain{display:flex; align-items:center;}
.ios-questchain__node{width:42px; height:42px; border-radius:16px; display:grid; place-items:center; font-size:18px; flex:none; z-index:2;
  background:#fff; box-shadow:var(--ios-sh-sm); color:var(--ios-dim);}
.ios-questchain__node--done{background:linear-gradient(135deg,var(--ios-mint-lt),var(--ios-mint)); color:#fff;}
.ios-questchain__node--now{background:linear-gradient(135deg,var(--ios-purple-lt),var(--ios-purple)); color:#fff;
  box-shadow:0 6px 14px rgba(138,124,255,.4);}
.ios-questchain__link{height:3px; flex:1; min-width:16px; border-radius:999px; background:#e7eaf5;}
.ios-questchain__link--done{background:var(--ios-mint);}

/* ----- 39. 成就解锁 ios-achievement ----- */
.ios-achievement{display:flex; align-items:center; gap:14px; padding:14px 16px; background:#fff; border-radius:18px; box-shadow:var(--ios-sh-sm);}
.ios-achievement__medal{width:52px; height:52px; border-radius:18px; display:grid; place-items:center; font-size:26px; flex:none; color:#fff;
  background:linear-gradient(135deg,var(--ios-amber-lt),var(--ios-amber)); box-shadow:0 6px 14px rgba(255,194,74,.35);}
.ios-achievement__tx b{font-family:var(--ios-round); font-weight:700; font-size:14px; color:var(--ios-ink); display:block;}
.ios-achievement__tx small{font-weight:700; font-size:11px; color:var(--ios-dim);}
.ios-achievement--locked{opacity:.6;}
.ios-achievement--locked .ios-achievement__medal{background:var(--ios-track); color:var(--ios-faint); box-shadow:none;}

/* ----- 40. 翻牌 ios-flipcard ----- */
.ios-flipcard{width:120px; height:168px; perspective:900px; cursor:pointer;}
.ios-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s;}
.ios-flipcard.flipped .ios-flipcard__inner{transform:rotateY(180deg);}
.ios-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:20px; display:grid; place-items:center; overflow:hidden; box-shadow:var(--ios-sh);}
.ios-flipcard__back{background:linear-gradient(135deg,var(--ios-purple),var(--ios-pink)); color:#fff; font-size:34px;}
.ios-flipcard__front{transform:rotateY(180deg); flex-direction:column; background:linear-gradient(135deg,var(--ios-mint-lt),var(--ios-blue));}
.ios-flipcard__front .em{font-size:46px;} .ios-flipcard__front .nm{font-family:var(--ios-round); font-weight:700; font-size:13px; color:#fff; margin-top:6px;}

/* ----- 41. 开礼盒 ios-chest ----- */
.ios-chest{width:120px; text-align:center; cursor:pointer; user-select:none;}
.ios-chest__box{width:78px; height:78px; margin:0 auto; border-radius:22px; display:grid; place-items:center; font-size:40px;
  background:linear-gradient(135deg,var(--ios-pink-lt),var(--ios-pink)); box-shadow:0 8px 18px rgba(255,143,184,.4); transition:.2s;}
.ios-chest:hover .ios-chest__box{transform:translateY(-4px) rotate(-3deg);}
.ios-chest.opened .ios-chest__box{animation:ios-pop .5s ease;}
@keyframes ios-pop{0%{transform:scale(1)}40%{transform:scale(1.25) rotate(6deg)}100%{transform:scale(1)}}
.ios-chest__glow{height:0; overflow:hidden; opacity:0; transition:.3s;}
.ios-chest.opened .ios-chest__glow{height:auto; opacity:1; padding-top:8px;}
.ios-chest__label{font-family:var(--ios-round); font-weight:700; font-size:12px; color:var(--ios-ink); margin-top:8px;}

/* ----- 42. 背包网格 ios-invgrid ----- */
.ios-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:12px; background:#fff; border-radius:20px;
  width:max-content; box-shadow:var(--ios-sh-sm);}
.ios-invgrid__cell{width:46px; height:46px; border-radius:14px; display:grid; place-items:center; font-size:22px; position:relative;
  background:#f4f5fb;}
.ios-invgrid__cell:hover{background:#efecff;}
.ios-invgrid__cell--rare{background:linear-gradient(135deg,#e3f0ff,#dcf7ee);}
.ios-invgrid__cell--legend{background:linear-gradient(135deg,#f0edff,#ffeef6);}
.ios-invgrid__cell--empty{background:#f7f8fc; opacity:.6;}
.ios-invgrid__qty{position:absolute; bottom:2px; right:4px; font-weight:900; font-size:10px; color:var(--ios-dim);}

/* ----- 43. 装备对比 ios-compare ----- */
.ios-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; background:#fff; border-radius:20px;
  padding:16px; box-shadow:var(--ios-sh-sm);}
.ios-compare__side{text-align:center;}
.ios-compare__side .ios-icon{margin:0 auto 10px;}
.ios-compare__nm{font-family:var(--ios-round); font-weight:700; font-size:12px; color:var(--ios-ink); margin-bottom:8px;}
.ios-compare__stat{display:flex; justify-content:space-between; font-weight:700; font-size:11px; padding:4px 0; border-bottom:1px solid #f0f2fa;}
.ios-compare__stat span:first-child{color:var(--ios-dim);}
.ios-compare__up{color:var(--ios-mint-dk);} .ios-compare__down{color:var(--ios-red);}
.ios-compare__vs{font-family:var(--ios-round); font-weight:700; font-size:15px; color:var(--ios-purple);}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}

.px-empty__ic{font-size:44px; image-rendering:pixelated;}
.px-empty__tt{font-family:var(--px-disp); font-size:11px; color:var(--px-white); margin:16px 0 8px; line-height:1.6;}
.px-empty__ds{font-size:18px;}

/* ----- 28. 步进器 px-stepper ----- */
.px-stepper{display:inline-flex; align-items:stretch;
  box-shadow:0 -3px 0 0 var(--px-ink),0 3px 0 0 var(--px-ink),-3px 0 0 0 var(--px-ink),3px 0 0 0 var(--px-ink);}
.px-stepper__btn{width:36px; font-family:var(--px-disp); font-size:14px; color:var(--px-white); background:var(--px-blue); border:none;
  cursor:pointer; display:grid; place-items:center;}
.px-stepper__btn:active{background:var(--px-blue-dk);}
.px-stepper__val{min-width:50px; display:grid; place-items:center; font-family:var(--px-disp); font-size:11px; color:var(--px-white);
  background:var(--px-ink);}

/* ----- 29. 面包屑 px-breadcrumb ----- */
.px-breadcrumb{display:flex; align-items:center; gap:8px; font-family:var(--px-disp); font-size:9px; flex-wrap:wrap; line-height:1.8;}
.px-breadcrumb a{color:var(--px-cyan); text-decoration:none; cursor:pointer;}
.px-breadcrumb a:hover{color:var(--px-yellow);}
.px-breadcrumb__sep{color:var(--px-grey);}
.px-breadcrumb__cur{color:var(--px-yellow);}

/* ----- 30. 手风琴 px-accordion ----- */
.px-accordion{background:var(--px-panel);
  box-shadow:0 -3px 0 0 var(--px-ink),0 3px 0 0 var(--px-ink),-3px 0 0 0 var(--px-ink),3px 0 0 0 var(--px-ink);}
.px-accordion details{border-bottom:3px solid var(--px-ink2);}
.px-accordion details:last-child{border-bottom:none;}
.px-accordion summary{list-style:none; cursor:pointer; padding:12px 14px; font-family:var(--px-disp); font-size:9px; color:var(--px-white);
  display:flex; align-items:center; gap:10px; line-height:1.6;}
.px-accordion summary::-webkit-details-marker{display:none;}
.px-accordion summary::before{content:&quot;+&quot;; color:var(--px-yellow);}
.px-accordion details[open] summary::before{content:&quot;-&quot;;}
.px-accordion summary:hover{background:var(--px-ink2);}
.px-accordion__bd{padding:2px 14px 14px 30px; font-size:18px; color:var(--px-cyan); line-height:1.5;}

/* ----- 31. 侧边抽屉 px-drawer ----- */
.px-drawer-mask{position:fixed; inset:0; background:rgba(15,15,27,.75); z-index:110; opacity:0; pointer-events:none; transition:opacity .1s;}
.px-drawer-mask.open{opacity:1; pointer-events:auto;}
.px-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120; background:var(--px-panel);
  box-shadow:-6px 0 0 0 var(--px-ink), -6px 0 0 6px var(--px-cyan); transform:translateX(110%); transition:transform .12s steps(4);
  display:flex; flex-direction:column;}
.px-drawer.open{transform:translateX(0);}
.px-drawer__hd{font-family:var(--px-disp); font-size:11px; color:var(--px-white); padding:16px; background:var(--px-blue);
  display:flex; align-items:center; justify-content:space-between; text-shadow:2px 2px 0 var(--px-blue-dk);}
.px-drawer__hd span{cursor:pointer;}
.px-drawer__bd{padding:12px; overflow-y:auto;}

/* ----- 32. 数据表格 px-table ----- */
.px-table{width:100%; border-collapse:separate; border-spacing:0; font-size:17px; background:var(--px-panel);
  box-shadow:0 -3px 0 0 var(--px-ink),0 3px 0 0 var(--px-ink),-3px 0 0 0 var(--px-ink),3px 0 0 0 var(--px-ink);}
.px-table thead th{font-family:var(--px-disp); font-size:8px; color:var(--px-ink); text-align:left; padding:10px 12px; background:var(--px-yellow); line-height:1.6;}
.px-table tbody td{padding:9px 12px; color:var(--px-white); border-bottom:3px solid var(--px-ink2);}
.px-table tbody tr:last-child td{border-bottom:none;}
.px-table tbody tr:nth-child(even){background:var(--px-ink2);}
.px-table tbody tr:hover{background:var(--px-blue-dk);}
.px-table__rank{font-family:var(--px-disp); font-size:9px; color:var(--px-yellow);}

/* ----- 33. 分页器 px-pagination ----- */
.px-pagination{display:inline-flex; gap:5px;}
.px-pagination__pg{min-width:34px; height:34px; padding:0 6px; display:grid; place-items:center; cursor:pointer; font-family:var(--px-disp);
  font-size:9px; color:var(--px-white); background:var(--px-ink2); box-shadow:0 0 0 3px var(--px-ink);}
.px-pagination__pg:hover{background:var(--px-blue-dk);}
.px-pagination__pg--active{color:var(--px-ink); background:var(--px-yellow);}
.px-pagination__pg--dis{opacity:.4; cursor:not-allowed;}

/* ----- 34. 时间轴 px-timeline ----- */
.px-timeline{position:relative; padding-left:28px;}
.px-timeline::before{content:&quot;&quot;; position:absolute; left:8px; top:6px; bottom:6px; width:4px;
  background:repeating-linear-gradient(180deg,var(--px-grey-dk) 0 6px,transparent 6px 12px);}
.px-timeline__item{position:relative; padding-bottom:16px;}
.px-timeline__item:last-child{padding-bottom:0;}
.px-timeline__item::before{content:&quot;&quot;; position:absolute; left:-24px; top:2px; width:14px; height:14px; background:var(--px-grey);
  box-shadow:0 0 0 3px var(--px-ink);}
.px-timeline__item--done::before{background:var(--px-green);}
.px-timeline__item--now::before{background:var(--px-red);}
.px-timeline__t{font-family:var(--px-disp); font-size:9px; color:var(--px-white); line-height:1.6;}
.px-timeline__d{font-size:16px; color:var(--px-cyan); margin-top:4px;}

/* ----- 35. 树形菜单 px-tree ----- */
.px-tree{font-size:18px;}
.px-tree details{margin-left:4px;}
.px-tree summary{list-style:none; cursor:pointer; padding:5px 0; color:var(--px-white); display:flex; align-items:center; gap:8px;}
.px-tree summary::-webkit-details-marker{display:none;}
.px-tree summary::before{content:&quot;▶&quot;; color:var(--px-yellow); font-size:9px;}
.px-tree details[open] > summary::before{content:&quot;▼&quot;;}
.px-tree summary:hover{color:var(--px-yellow);}
.px-tree__leaf{padding:5px 0 5px 22px; color:var(--px-cyan); cursor:pointer;}
.px-tree__leaf:hover{color:var(--px-white);}
.px-tree details > *:not(summary){margin-left:12px; border-left:3px solid var(--px-ink2); padding-left:8px;}

/* ----- 36. 能量条倒计时 px-energy ----- */
.px-energy{display:flex; align-items:center; gap:12px;}
.px-energy__orb{width:30px; height:30px; display:grid; place-items:center; font-size:16px; flex:none; background:var(--px-green-dk);
  box-shadow:0 0 0 3px var(--px-ink);}
.px-energy__body{flex:1;}
.px-energy__top{display:flex; justify-content:space-between; font-family:var(--px-disp); font-size:8px; color:var(--px-grey); margin-bottom:5px; line-height:1.6;}
.px-energy__timer{color:var(--px-green);}
.px-energy .px-bar__fill{background:var(--px-green);}

/* ----- 37. 签到日历 px-calendar ----- */
.px-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.px-calendar__day{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  font-family:var(--px-disp); font-size:8px; color:var(--px-grey); background:var(--px-ink2); box-shadow:0 0 0 3px var(--px-ink); position:relative;}
.px-calendar__day .r{font-size:16px;}
.px-calendar__day--done{color:var(--px-white);}
.px-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center; background:rgba(74,208,74,.82);
  color:var(--px-ink); font-size:20px; font-weight:900;}
.px-calendar__day--today{box-shadow:0 0 0 3px var(--px-yellow); background:var(--px-yellow-dk); color:var(--px-white);}

/* ----- 38. 任务链 px-questchain ----- */
.px-questchain{display:flex; align-items:center;}
.px-questchain__node{width:40px; height:40px; display:grid; place-items:center; font-size:17px; flex:none; z-index:2; background:var(--px-ink2);
  box-shadow:0 0 0 3px var(--px-ink);}
.px-questchain__node--done{background:var(--px-green-dk);}
.px-questchain__node--now{background:var(--px-red-dk); box-shadow:0 0 0 3px var(--px-yellow);}
.px-questchain__link{height:4px; flex:1; min-width:16px; background:repeating-linear-gradient(90deg,var(--px-grey-dk) 0 5px,transparent 5px 10px);}
.px-questchain__link--done{background:var(--px-green);}

/* ----- 39. 成就解锁 px-achievement ----- */
.px-achievement{display:flex; align-items:center; gap:14px; padding:12px 14px; background:var(--px-panel);
  box-shadow:0 -3px 0 0 var(--px-yellow),0 3px 0 0 var(--px-yellow),-3px 0 0 0 var(--px-yellow),3px 0 0 0 var(--px-yellow),0 0 0 6px var(--px-ink);}
.px-achievement__medal{width:50px; height:50px; display:grid; place-items:center; font-size:24px; flex:none; background:var(--px-yellow-dk);
  box-shadow:0 0 0 3px var(--px-ink);}
.px-achievement__tx b{font-family:var(--px-disp); font-size:9px; color:var(--px-yellow); display:block; line-height:1.7;}
.px-achievement__tx small{font-size:17px; color:var(--px-cyan);}
.px-achievement--locked{box-shadow:0 -3px 0 0 var(--px-grey-dk),0 3px 0 0 var(--px-grey-dk),-3px 0 0 0 var(--px-grey-dk),3px 0 0 0 var(--px-grey-dk),0 0 0 6px var(--px-ink); opacity:.7;}
.px-achievement--locked .px-achievement__medal{background:var(--px-grey-dk);}

/* ----- 40. 翻牌 px-flipcard ----- */
.px-flipcard{width:118px; height:164px; perspective:600px; cursor:pointer; image-rendering:pixelated;}
.px-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .3s steps(4);}
.px-flipcard.flipped .px-flipcard__inner{transform:rotateY(180deg);}
.px-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  display:grid; place-items:center; overflow:hidden; box-shadow:0 0 0 4px var(--px-ink);}
.px-flipcard__back{background:var(--px-purple-dk); color:var(--px-yellow); font-family:var(--px-disp); font-size:28px;}
.px-flipcard__front{transform:rotateY(180deg); flex-direction:column; background:var(--px-blue-dk);}
.px-flipcard__front .em{font-size:44px;} .px-flipcard__front .nm{font-family:var(--px-disp); font-size:8px; color:var(--px-white); margin-top:8px; line-height:1.5;}

/* ----- 41. 开宝箱 px-chest ----- */
.px-chest{width:120px; text-align:center; cursor:pointer; user-select:none;}
.px-chest__box{font-size:56px; image-rendering:pixelated;}
.px-chest.opened .px-chest__box{animation:px-shake .4s steps(2) 2;}
@keyframes px-shake{0%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}100%{transform:translateX(0)}}
.px-chest__glow{height:0; overflow:hidden; opacity:0;}
.px-chest.opened .px-chest__glow{height:auto; opacity:1; padding-top:10px;}
.px-chest__label{font-family:var(--px-disp); font-size:9px; color:var(--px-yellow); margin-top:8px; line-height:1.6;}

/* ----- 42. 背包网格 px-invgrid ----- */
.px-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:8px; background:var(--px-ink);
  box-shadow:0 0 0 3px var(--px-grey-dk); width:max-content;}
.px-invgrid__cell{width:44px; height:44px; display:grid; place-items:center; font-size:22px; position:relative; background:var(--px-ink2);
  box-shadow:inset 0 0 0 2px var(--px-ink);}
.px-invgrid__cell:hover{background:var(--px-blue-dk);}
.px-invgrid__cell--rare{box-shadow:inset 0 0 0 3px var(--px-blue);}
.px-invgrid__cell--legend{box-shadow:inset 0 0 0 3px var(--px-yellow);}
.px-invgrid__cell--empty{background:var(--px-ink);}
.px-invgrid__qty{position:absolute; bottom:0; right:2px; font-family:var(--px-disp); font-size:7px; color:var(--px-white);}

/* ----- 43. 装备对比 px-compare ----- */
.px-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; background:var(--px-panel); padding:14px;
  box-shadow:0 -3px 0 0 var(--px-ink),0 3px 0 0 var(--px-ink),-3px 0 0 0 var(--px-ink),3px 0 0 0 var(--px-ink);}
.px-compare__side{text-align:center;}
.px-compare__side .px-icon{margin:0 auto 10px;}
.px-compare__nm{font-family:var(--px-disp); font-size:8px; color:var(--px-white); margin-bottom:10px; line-height:1.6;}
.px-compare__stat{display:flex; justify-content:space-between; font-size:17px; padding:4px 0; border-bottom:3px solid var(--px-ink2);}
.px-compare__stat span:first-child{color:var(--px-grey);}
.px-compare__up{color:var(--px-green);} .px-compare__down{color:var(--px-red);}
.px-compare__vs{font-family:var(--px-disp); font-size:11px; color:var(--px-red);}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}
</style>

  <!-- 8 -->
  <div class=&quot;comp&quot;><div class=&quot;comp-title&quot;>卡片 · Card</div><div class=&quot;comp-desc&quot;>像素卡,含标签、名称、底部插槽,按下位移。</div>

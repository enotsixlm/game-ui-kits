<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏 UI 组件库 · 六风格合集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bar:#0e0f1a;--bar2:#16182a;--line:#2a2d45;--text:#e8ebf5;--dim:#8b93ad;}
html,body{height:100%;}
body{font-family:'Nunito',system-ui,sans-serif; background:#05060c; color:var(--text); overflow:hidden;}

.topbar{height:60px; display:flex; align-items:center; gap:16px; padding:0 18px;
  background:linear-gradient(180deg,var(--bar2),var(--bar)); border-bottom:1px solid var(--line);
  box-shadow:0 4px 18px rgba(0,0,0,.5); position:relative; z-index:10;}
.brand{display:flex; align-items:center; gap:10px; flex:none;}
.brand .logo{width:30px; height:30px; border-radius:8px; display:grid; place-items:center; font-size:16px;
  background:linear-gradient(135deg,#8a7cff,#ff8fb8,#2ad4ff); background-size:200% 200%; animation:sh 6s ease infinite;}
@keyframes sh{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.brand b{font-family:'Orbitron',sans-serif; font-weight:800; font-size:15px; letter-spacing:.02em; white-space:nowrap;}
.brand small{color:var(--dim); font-size:11px; font-weight:700; white-space:nowrap;}

.tabs{display:flex; gap:6px; flex:1; overflow-x:auto; justify-content:flex-end; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{display:inline-flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; white-space:nowrap;
  background:var(--bar2); border:1px solid var(--line); border-radius:10px; color:var(--dim);
  font-family:inherit; font-weight:800; font-size:13px; transition:.14s;}
.tab .dot{width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); flex:none;}
.tab .pre{font-size:10px; opacity:.7; font-family:ui-monospace,monospace;}
.tab:hover{color:var(--text); border-color:var(--accent);}
.tab.active{color:#fff; border-color:var(--accent); background:color-mix(in srgb, var(--accent) 16%, var(--bar2));
  box-shadow:0 0 0 1px var(--accent), 0 4px 14px color-mix(in srgb, var(--accent) 30%, transparent);}

.stage{position:absolute; top:60px; left:0; right:0; bottom:0; background:#05060c;}
.frame{position:absolute; inset:0; width:100%; height:100%; border:none; display:none; background:#05060c;}
.frame.active{display:block;}

.hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:20;
  font-size:11px; font-weight:700; color:var(--dim); background:rgba(14,15,26,.85); backdrop-filter:blur(6px);
  padding:6px 14px; border-radius:999px; border:1px solid var(--line); pointer-events:none;
  animation:fade 5s ease forwards;}
@keyframes fade{0%,70%{opacity:1}100%{opacity:0}}

@media(max-width:640px){
  .brand small{display:none;} .brand b{font-size:13px;}
  .tab .nm{display:none;} .tab{padding:8px 10px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="logo">🎮</span>
    <div><b>GAME UI KIT</b> &nbsp;<small>六风格 × 43 组件</small></div>
  </div>
  <div class="tabs" id="tabs">
      <button class="tab active" data-i="0" style="--accent:#c8a04a"><span class="dot"></span><span class="nm">暗黑哥特</span><span class="pre">dg-</span></button>
      <button class="tab" data-i="1" style="--accent:#2ad4ff"><span class="dot"></span><span class="nm">赛博朋克</span><span class="pre">cy-</span></button>
      <button class="tab" data-i="2" style="--accent:#e8402e"><span class="dot"></span><span class="nm">马力欧</span><span class="pre">mr-</span></button>
      <button class="tab" data-i="3" style="--accent:#8a7cff"><span class="dot"></span><span class="nm">iOS 休闲</span><span class="pre">ios-</span></button>
      <button class="tab" data-i="4" style="--accent:#ffd23c"><span class="dot"></span><span class="nm">像素 8-bit</span><span class="pre">px-</span></button>
      <button class="tab" data-i="5" style="--accent:#78d838"><span class="dot"></span><span class="nm">Supercell</span><span class="pre">sc-</span></button>
  </div>
</div>

<div class="stage" id="stage">
    <iframe class="frame active" data-i="0" title="暗黑哥特" srcdoc="<!DOCTYPE html>
<html lang=&quot;zh&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>暗黑哥特 UI 组件库 · Diablo Style Kit</title>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin>
<link href=&quot;https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&amp;family=Nunito:wght@600;700;800;900&amp;display=swap&quot; rel=&quot;stylesheet&quot;>
<style>
/* ============================================================================
   DIABLO / GOTHIC UI KIT  —  reusable component library
   ----------------------------------------------------------------------------
   全部组件用 dg- 前缀,不污染全局。改主题只改下面这组 :root 令牌即可。
   ============================================================================ */
:root{
  /* ---- design tokens ---- */
  --dg-gold:#c9962f;        /* 主金属描边 */
  --dg-gold-lt:#ffe08a;     /* 高光金 */
  --dg-gold-dk:#6e4f21;     /* 暗金边 */
  --dg-parch:#e8d3a0;       /* 羊皮纸/主文字 */
  --dg-parch-dim:#b8935a;   /* 次级文字 */
  --dg-ink:#0a0806;         /* 最深底色 */
  --dg-stone-1:#1c1712;     /* 石材亮 */
  --dg-stone-2:#120d09;     /* 石材暗 */
  --dg-blood:#c0331f;       /* 血红(HP/危险) */
  --dg-blood-dk:#6e130a;
  --dg-mana:#3a72d0;        /* 法力蓝 */
  --dg-mana-dk:#0a3a8a;
  --dg-line:#6e4f21;        /* 通用金线 */

  --dg-serif:'Cinzel',serif;
  --dg-sans:'Nunito',system-ui,sans-serif;

  /* 可复用的组合 */
  --dg-panel-bg:linear-gradient(180deg,rgba(30,22,14,.94),rgba(14,10,6,.96));
  --dg-metal:linear-gradient(180deg,#3a2a16,#1c130a);
  --dg-inset:inset 0 0 20px rgba(0,0,0,.7);
}

/* ---------- 页面外壳(仅文档用,非组件) ---------- */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--dg-sans); color:var(--dg-parch);
  background:
    radial-gradient(90% 50% at 50% 0%, #3a1c14 0%, rgba(0,0,0,0) 55%),
    repeating-linear-gradient(135deg,#161310 0 6px,#1a1512 6px 12px),
    linear-gradient(180deg,#1c1712,#0a0806 80%);
  background-attachment:fixed; min-height:100vh; padding:0 0 90px; line-height:1.5;
}
.doc{max-width:960px; margin:0 auto; padding:0 20px;}
.doc-head{text-align:center; padding:48px 20px 26px;}
.doc-head h1{font-family:var(--dg-serif); font-weight:900; font-size:clamp(28px,5vw,44px);
  color:var(--dg-gold-lt); letter-spacing:.04em; text-shadow:0 2px 0 #000,0 0 20px rgba(201,150,47,.4);}
.doc-head p{margin-top:10px; color:var(--dg-parch-dim); font-weight:700;}
.doc-head .eb{display:inline-block; margin-bottom:14px; font-family:var(--dg-serif); font-size:12px;
  letter-spacing:.3em; color:var(--dg-gold); border:1px solid var(--dg-gold-dk); padding:5px 16px; border-radius:3px;}

.tokens{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px;}
.tok{display:flex; align-items:center; gap:7px; font-family:var(--dg-sans); font-weight:800; font-size:11px;
  color:var(--dg-parch-dim); background:rgba(0,0,0,.35); border:1px solid var(--dg-gold-dk);
  padding:4px 10px; border-radius:3px;}
.tok i{width:14px;height:14px;border-radius:3px; border:1px solid #000;}

.comp{margin-top:40px;}
.comp-title{font-family:var(--dg-serif); font-weight:700; font-size:20px; color:var(--dg-gold-lt);
  letter-spacing:.1em; display:flex; align-items:center; gap:10px; margin-bottom:4px;}
.comp-title::before{content:&quot;✦&quot;; color:var(--dg-gold);}
.comp-desc{color:var(--dg-parch-dim); font-size:13px; font-weight:700; margin-bottom:16px;}
.showcase{display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:24px;
  background:rgba(0,0,0,.32); border:1px solid var(--dg-gold-dk); border-radius:6px;
  box-shadow:var(--dg-inset);}
.classline{margin-top:10px; font-family:ui-monospace,monospace; font-size:12px; color:#8fb28f;
  background:#0a0806; border:1px solid #2a1c0c; border-radius:4px; padding:8px 12px; overflow-x:auto;}
.classline b{color:var(--dg-gold-lt);}

/* ============================================================================
   ============  COMPONENTS  (复制下面任意块即可使用)  ============
   ============================================================================ */

/* ----- 1. 按钮 dg-btn ----- */
.dg-btn{
  font-family:var(--dg-serif); font-weight:700; font-size:14px; letter-spacing:.08em;
  color:var(--dg-parch); padding:11px 22px; cursor:pointer; user-select:none;
  display:inline-flex; align-items:center; gap:8px; text-align:center;
  background:var(--dg-metal); border:1px solid var(--dg-line); border-radius:3px;
  box-shadow:inset 0 1px 0 rgba(255,220,150,.15), 0 2px 5px rgba(0,0,0,.6);
  text-shadow:0 1px 2px #000; transition:.1s;
}
.dg-btn:hover{border-color:var(--dg-gold-lt); color:#fff; box-shadow:inset 0 1px 0 rgba(255,220,150,.2),0 0 12px rgba(232,200,119,.35);}
.dg-btn:active{transform:translateY(1px);}
.dg-btn--primary{background:linear-gradient(180deg,#8a2418,#4a0f08); border-color:var(--dg-gold);}
.dg-btn--ghost{background:transparent; border-color:var(--dg-gold-dk);}
.dg-btn--gold{background:linear-gradient(180deg,#e6bd54,#a97a1e); color:#2a1c08; text-shadow:0 1px 0 rgba(255,255,255,.3);}
.dg-btn--sm{font-size:12px; padding:8px 14px;}
.dg-btn--lg{font-size:17px; padding:14px 30px;}
.dg-btn--block{width:100%; justify-content:center;}
.dg-btn[disabled],.dg-btn--disabled{opacity:.5; cursor:not-allowed; filter:grayscale(.6);}

/* ----- 2. 面板 dg-panel ----- */
.dg-panel{
  position:relative; background:var(--dg-panel-bg); border:1px solid var(--dg-line);
  border-radius:4px; box-shadow:var(--dg-inset), 0 0 0 1px #2a1c0c, 0 6px 16px rgba(0,0,0,.5);
  padding:2px;
}
.dg-panel__hd{font-family:var(--dg-serif); font-weight:700; letter-spacing:.14em; font-size:14px;
  color:var(--dg-gold-lt); text-align:center; padding:12px 16px 10px; text-shadow:0 1px 2px #000;
  position:relative;}
.dg-panel__hd::after{content:&quot;&quot;; position:absolute; left:14px; right:14px; bottom:2px; height:1px;
  background:linear-gradient(90deg,transparent,var(--dg-line),transparent);}
.dg-panel__bd{padding:14px 18px 18px; color:var(--dg-parch);}
.dg-panel__bd p{font-family:var(--dg-sans); font-weight:700; font-size:13px; color:var(--dg-parch-dim); line-height:1.6;}
/* 四角装饰(可选):在 dg-panel 内放 <span class=&quot;dg-corner tl/tr/bl/br&quot;> */
.dg-corner{position:absolute; color:var(--dg-gold); font-size:12px; line-height:1; pointer-events:none;}
.dg-corner.tl{top:5px;left:7px;} .dg-corner.tr{top:5px;right:7px;}
.dg-corner.bl{bottom:5px;left:7px;} .dg-corner.br{bottom:5px;right:7px;}

/* ----- 3. 弹窗 dg-modal ----- */
.dg-modal-mask{position:fixed; inset:0; background:rgba(4,2,0,.72); backdrop-filter:blur(2px);
  display:grid; place-items:center; z-index:100; padding:20px;}
.dg-modal{width:min(380px,92vw); position:relative;}
.dg-modal__close{position:absolute; top:-12px; right:-12px; width:34px;height:34px; border-radius:50%;
  display:grid; place-items:center; font-family:var(--dg-serif); font-weight:700; font-size:15px; cursor:pointer;
  color:var(--dg-parch); background:linear-gradient(180deg,#8a2418,#4a0f08); border:1px solid var(--dg-gold);
  box-shadow:0 2px 6px rgba(0,0,0,.6);}
.dg-modal__close:hover{color:#fff;}

/* ----- 4. 进度条 dg-bar ----- */
.dg-bar{position:relative; height:14px; background:#0a0604; border:1px solid var(--dg-line);
  border-radius:2px; overflow:hidden; box-shadow:inset 0 0 8px #000;}
.dg-bar__fill{height:100%; box-shadow:inset 0 1px 0 rgba(255,255,255,.25);}
.dg-bar__fill--hp{background:linear-gradient(180deg,#e0553c,var(--dg-blood-dk));}
.dg-bar__fill--mp{background:linear-gradient(180deg,#5a92e6,var(--dg-mana-dk));}
.dg-bar__fill--xp{background:linear-gradient(180deg,var(--dg-gold-lt),var(--dg-gold-dk));}
.dg-bar__label{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--dg-sans);
  font-weight:900; font-size:9px; color:#fff; text-shadow:0 1px 2px #000; letter-spacing:.1em;}
.dg-bar--tall{height:20px;}

/* ----- 5. 货币条 dg-currency ----- */
.dg-currency{display:inline-flex; align-items:center; gap:6px; font-family:var(--dg-sans);
  font-weight:900; font-size:14px; color:var(--dg-gold-lt); background:linear-gradient(180deg,#241a10,#120c06);
  padding:5px 12px 5px 5px; border-radius:4px; border:1px solid var(--dg-gold-dk);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08); text-shadow:0 1px 1px #000;}
.dg-currency__coin{width:20px;height:20px;border-radius:50%; flex:none; border:1px solid #3a2408;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}
.dg-currency__coin--gold{background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold) 60%,#7a5410);}
.dg-currency__coin--soul{background:radial-gradient(circle at 40% 30%,#9be0ff,#2a86c0 60%,#0a3a6a);}
.dg-currency__coin--blood{background:radial-gradient(circle at 40% 30%,#ff8a6a,var(--dg-blood) 60%,var(--dg-blood-dk));}

/* ----- 6. 状态条(球体 HP/MP) dg-orb ----- */
.dg-orb{width:56px;height:56px;border-radius:50%; position:relative; overflow:hidden; flex:none;
  border:2px solid var(--dg-gold); box-shadow:0 0 0 1px #2a1408, 0 0 12px rgba(0,0,0,.8);}
.dg-orb__liquid{position:absolute; left:0; right:0; bottom:0;}
.dg-orb__liquid--hp{background:radial-gradient(circle at 50% 120%,#ff5a3c,var(--dg-blood-dk));}
.dg-orb__liquid--mp{background:radial-gradient(circle at 50% 120%,#5aa0ff,var(--dg-mana-dk));}
.dg-orb__gloss{position:absolute; top:7px; left:12px; width:16px;height:11px;border-radius:50%;
  background:rgba(255,255,255,.4); filter:blur(1.5px);}
.dg-orb__num{position:absolute; inset:0; display:grid; place-items:center; z-index:2; font-family:var(--dg-sans);
  font-weight:900; font-size:11px; color:#fff; text-shadow:0 1px 2px #000;}

/* ----- 7. 图标底座 dg-icon ----- */
.dg-icon{width:52px;height:52px;border-radius:4px; display:grid; place-items:center; font-size:24px; position:relative;
  background:radial-gradient(circle at 50% 30%,#2a2018,#0e0a06); border:1px solid var(--dg-line);
  box-shadow:var(--dg-inset),0 0 0 1px #000;}
.dg-icon:hover{border-color:var(--dg-gold-lt); box-shadow:var(--dg-inset),0 0 10px rgba(232,200,119,.5);}
.dg-icon--rare{border-color:#3a72d0;} .dg-icon--rare:hover{box-shadow:var(--dg-inset),0 0 10px rgba(90,150,255,.6);}
.dg-icon--legend{border-color:var(--dg-gold-lt); box-shadow:var(--dg-inset),0 0 12px rgba(232,200,119,.6);}
.dg-icon__cd{position:absolute; inset:0; background:rgba(0,0,0,.55); display:grid; place-items:center;
  font-family:var(--dg-sans); font-weight:900; font-size:13px; color:#fff;}

/* ----- 8. 卡片 dg-card ----- */
.dg-card{width:150px; border:1px solid var(--dg-line); border-radius:4px; overflow:hidden;
  background:var(--dg-panel-bg); box-shadow:var(--dg-inset),0 4px 10px rgba(0,0,0,.5); cursor:pointer; transition:.12s;}
.dg-card:hover{border-color:var(--dg-gold); transform:translateY(-3px);}
.dg-card__art{height:96px; display:grid; place-items:center; font-size:46px; position:relative;
  background:radial-gradient(circle at 50% 30%,#3a2a1a,#100b06); border-bottom:1px solid var(--dg-line);
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));}
.dg-card__rank{position:absolute; top:5px; left:5px; font-family:var(--dg-serif); font-weight:700; font-size:9px;
  letter-spacing:.1em; color:var(--dg-gold-lt); background:rgba(10,6,4,.85); padding:2px 7px; border-radius:2px;
  border:1px solid var(--dg-gold-dk);}
.dg-card__name{font-family:var(--dg-serif); font-weight:700; font-size:13px; color:var(--dg-parch);
  text-align:center; padding:8px 6px 4px; text-shadow:0 1px 2px #000;}
.dg-card__foot{padding:0 10px 10px;}

/* ----- 9. 列表项 dg-list ----- */
.dg-list{border:1px solid var(--dg-gold-dk); border-radius:4px; overflow:hidden; background:rgba(10,6,4,.4);}
.dg-list__item{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer;
  border-bottom:1px solid rgba(110,79,33,.3); transition:.1s;}
.dg-list__item:last-child{border-bottom:none;}
.dg-list__item:hover{background:rgba(58,42,22,.5);}
.dg-list__ic{width:30px;height:30px;border-radius:3px; flex:none; display:grid; place-items:center; font-size:16px;
  background:radial-gradient(circle at 50% 30%,#2a2018,#0e0a06); border:1px solid var(--dg-line);}
.dg-list__tx{flex:1;}
.dg-list__tx b{font-family:var(--dg-serif); font-weight:700; font-size:13px; color:var(--dg-parch);}
.dg-list__tx small{display:block; font-family:var(--dg-sans); font-weight:700; font-size:11px; color:var(--dg-parch-dim);}
.dg-list__val{font-family:var(--dg-sans); font-weight:900; font-size:13px; color:var(--dg-gold-lt);}

/* ----- 10. 顶部 HUD dg-hud ----- */
.dg-hud{display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:linear-gradient(180deg,rgba(28,23,18,.9),rgba(10,8,6,.9)); border:1px solid var(--dg-line);
  border-radius:4px; box-shadow:var(--dg-inset);}
.dg-hud__portrait{width:42px;height:42px;border-radius:50%; flex:none; display:grid; place-items:center; font-size:22px;
  background:radial-gradient(circle at 40% 30%,#7a2a1e,#2a0d08); border:2px solid var(--dg-gold);
  box-shadow:0 0 0 1px #2a1408,0 0 10px rgba(201,150,47,.4);}
.dg-hud__who b{font-family:var(--dg-serif); font-weight:700; font-size:14px; color:var(--dg-parch); display:block;}
.dg-hud__who small{font-family:var(--dg-sans); font-weight:800; font-size:10px; color:var(--dg-gold); letter-spacing:.08em;}
.dg-hud__spacer{flex:1;}

/* ----- 11. 导航栏 dg-nav ----- */
.dg-nav{display:flex; gap:4px; padding:6px; background:linear-gradient(180deg,rgba(20,15,10,.9),rgba(8,6,4,.95));
  border:1px solid var(--dg-line); border-radius:4px; box-shadow:var(--dg-inset);}
.dg-nav__tab{flex:1; text-align:center; font-family:var(--dg-serif); font-weight:700; font-size:11px;
  letter-spacing:.06em; color:var(--dg-parch-dim); padding:8px 4px; border-radius:3px; cursor:pointer;
  border:1px solid transparent; transition:.1s;}
.dg-nav__tab .i{display:block; font-size:18px; margin-bottom:3px;}
.dg-nav__tab:hover{color:var(--dg-parch);}
.dg-nav__tab--active{color:var(--dg-gold-lt); background:var(--dg-metal); border-color:var(--dg-line);
  box-shadow:inset 0 1px 0 rgba(255,220,150,.12);}

/* ----- 12. 标签页 dg-tabs ----- */
.dg-tabs{display:flex; gap:2px; border-bottom:1px solid var(--dg-line);}
.dg-tabs__tab{font-family:var(--dg-serif); font-weight:700; font-size:12px; letter-spacing:.08em;
  color:var(--dg-parch-dim); padding:9px 16px; cursor:pointer; position:relative; border:1px solid transparent;
  border-bottom:none; border-radius:3px 3px 0 0; transition:.1s;}
.dg-tabs__tab:hover{color:var(--dg-parch);}
.dg-tabs__tab--active{color:var(--dg-gold-lt); background:var(--dg-panel-bg); border-color:var(--dg-line);}
.dg-tabs__tab--active::after{content:&quot;&quot;; position:absolute; left:0; right:0; bottom:-1px; height:1px; background:var(--dg-panel-bg,#1c1712);}

/* ============================================================================
   ============  EXPANSION PACK  ·  扩展组件 (13-27)  ============
   ============================================================================ */

/* ----- 13. 输入框 dg-input ----- */
.dg-input{font-family:var(--dg-sans); font-weight:700; font-size:13px; color:var(--dg-parch);
  background:#0a0604; border:1px solid var(--dg-line); border-radius:3px; padding:9px 12px; width:100%;
  box-shadow:inset 0 0 10px rgba(0,0,0,.7); outline:none; transition:.12s;}
.dg-input::placeholder{color:#6e5a38;}
.dg-input:focus{border-color:var(--dg-gold-lt); box-shadow:inset 0 0 10px rgba(0,0,0,.7),0 0 8px rgba(201,150,47,.4);}
.dg-field{position:relative;}
.dg-field__ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:14px; opacity:.7;}
.dg-field .dg-input{padding-left:32px;}

/* ----- 14. 下拉选择 dg-select ----- */
.dg-select{position:relative; display:inline-block;}
.dg-select select{appearance:none; -webkit-appearance:none; font-family:var(--dg-serif); font-weight:700;
  font-size:13px; letter-spacing:.06em; color:var(--dg-parch); background:var(--dg-metal);
  border:1px solid var(--dg-line); border-radius:3px; padding:9px 34px 9px 14px; cursor:pointer; outline:none;
  box-shadow:inset 0 1px 0 rgba(255,220,150,.12);}
.dg-select select:focus{border-color:var(--dg-gold-lt);}
.dg-select::after{content:&quot;▾&quot;; position:absolute; right:12px; top:50%; transform:translateY(-50%);
  color:var(--dg-gold); pointer-events:none; font-size:12px;}
.dg-select option{background:#1c1712; color:var(--dg-parch);}

/* ----- 15. 开关 dg-switch ----- */
.dg-switch{position:relative; display:inline-flex; align-items:center; cursor:pointer; user-select:none;}
.dg-switch input{position:absolute; opacity:0; pointer-events:none;}
.dg-switch__track{width:48px; height:24px; border-radius:999px; background:#0a0604; border:1px solid var(--dg-line);
  box-shadow:inset 0 0 8px #000; position:relative; transition:.15s;}
.dg-switch__track::before{content:&quot;&quot;; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:radial-gradient(circle at 40% 30%,#4a3a24,#1a120a); border:1px solid var(--dg-gold-dk); transition:.15s;}
.dg-switch input:checked + .dg-switch__track{border-color:var(--dg-gold);
  background:radial-gradient(circle at 70% 50%,#5a2a12,#2a1408);}
.dg-switch input:checked + .dg-switch__track::before{left:26px;
  background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold)); border-color:var(--dg-gold-lt);
  box-shadow:0 0 8px rgba(232,200,119,.6);}

/* ----- 16. 滑条 dg-slider ----- */
.dg-slider{-webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:999px;
  background:linear-gradient(90deg,var(--dg-blood-dk),#0a0604); border:1px solid var(--dg-line);
  box-shadow:inset 0 0 6px #000; outline:none; cursor:pointer;}
.dg-slider::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold) 60%,#7a5410);
  border:1px solid var(--dg-ink); box-shadow:0 0 8px rgba(201,150,47,.6); cursor:pointer;}
.dg-slider::-moz-range-thumb{width:20px; height:20px; border-radius:50%; border:1px solid var(--dg-ink);
  background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold) 60%,#7a5410); cursor:pointer;}

/* ----- 17. 徽章 dg-badge ----- */
.dg-badge{display:inline-grid; place-items:center; min-width:18px; height:18px; padding:0 5px;
  border-radius:999px; font-family:var(--dg-sans); font-weight:900; font-size:10px; color:#fff;
  background:linear-gradient(180deg,#e0553c,var(--dg-blood-dk)); border:1px solid var(--dg-ink);
  box-shadow:0 1px 3px rgba(0,0,0,.6);}
.dg-badge--gold{background:linear-gradient(180deg,var(--dg-gold-lt),var(--dg-gold)); color:#2a1c08;}
.dg-badge-wrap{position:relative; display:inline-flex;}
.dg-badge-wrap > .dg-badge{position:absolute; top:-8px; right:-8px;}

/* ----- 18. 角标 dg-ribbon ----- */
.dg-ribbon{position:absolute; top:8px; left:-6px; font-family:var(--dg-serif); font-weight:700; font-size:10px;
  letter-spacing:.08em; color:var(--dg-parch); padding:4px 10px 4px 8px;
  background:linear-gradient(180deg,#8a2418,#4a0f08); border:1px solid var(--dg-gold);
  box-shadow:0 2px 5px rgba(0,0,0,.5); text-shadow:0 1px 1px #000; z-index:3;}
.dg-ribbon::after{content:&quot;&quot;; position:absolute; left:0; bottom:-5px; border:2.5px solid transparent;
  border-top-color:#2a0806; border-right-color:#2a0806;}
.dg-ribbon--gold{background:linear-gradient(180deg,#e6bd54,#a97a1e); color:#2a1c08;}

/* ----- 19. 标签 dg-tag ----- */
.dg-tag{display:inline-flex; align-items:center; gap:5px; font-family:var(--dg-sans); font-weight:800;
  font-size:11px; letter-spacing:.04em; color:var(--dg-parch-dim); background:rgba(58,42,22,.5);
  border:1px solid var(--dg-gold-dk); border-radius:3px; padding:3px 9px;}
.dg-tag--hp{color:#e88a7a; border-color:#6e2318;}
.dg-tag--mp{color:#8ab0e6; border-color:#1a3a6a;}
.dg-tag--gold{color:var(--dg-gold-lt); border-color:var(--dg-gold);}

/* ----- 20. Tooltip dg-tooltip ----- */
.dg-tooltip{position:relative; display:inline-flex; cursor:help; border-bottom:1px dotted var(--dg-gold-dk);}
.dg-tooltip::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  font-family:var(--dg-sans); font-weight:700; font-size:11px; color:var(--dg-parch); white-space:nowrap;
  background:var(--dg-panel-bg); border:1px solid var(--dg-line); border-radius:3px; padding:6px 10px;
  box-shadow:0 4px 10px rgba(0,0,0,.6); opacity:0; pointer-events:none; transition:.12s; z-index:20;}
.dg-tooltip::before{content:&quot;&quot;; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:var(--dg-line); opacity:0; transition:.12s; z-index:20;}
.dg-tooltip:hover::after,.dg-tooltip:hover::before{opacity:1;}

/* ----- 21. Toast dg-toast ----- */
.dg-toast{display:flex; align-items:center; gap:10px; font-family:var(--dg-sans); font-weight:700; font-size:13px;
  color:var(--dg-parch); background:var(--dg-panel-bg); border:1px solid var(--dg-line); border-left:3px solid var(--dg-gold);
  border-radius:4px; padding:11px 16px; box-shadow:0 6px 16px rgba(0,0,0,.6); max-width:340px;}
.dg-toast__ic{font-size:18px; flex:none;}
.dg-toast--danger{border-left-color:var(--dg-blood);}
.dg-toast--success{border-left-color:#5a9a3a;}
.dg-toast b{font-family:var(--dg-serif); color:var(--dg-gold-lt); display:block; font-size:12px; letter-spacing:.06em;}

/* ----- 22. 对话气泡 dg-bubble ----- */
.dg-bubble{position:relative; font-family:var(--dg-sans); font-weight:700; font-size:13px; color:var(--dg-parch);
  background:var(--dg-panel-bg); border:1px solid var(--dg-line); border-radius:4px; padding:12px 16px; max-width:300px;
  box-shadow:var(--dg-inset),0 4px 10px rgba(0,0,0,.5);}
.dg-bubble__who{font-family:var(--dg-serif); font-weight:700; font-size:11px; letter-spacing:.1em;
  color:var(--dg-gold-lt); margin-bottom:5px;}
.dg-bubble::before{content:&quot;&quot;; position:absolute; left:26px; bottom:-9px; border:8px solid transparent;
  border-top-color:var(--dg-line);}
.dg-bubble::after{content:&quot;&quot;; position:absolute; left:27px; bottom:-7px; border:7px solid transparent;
  border-top-color:#150f0a;}

/* ----- 23. 加载旋转 dg-spinner ----- */
.dg-spinner{width:38px; height:38px; border-radius:50%; border:3px solid rgba(110,79,33,.3);
  border-top-color:var(--dg-gold-lt); animation:dg-spin .8s linear infinite;
  box-shadow:0 0 10px rgba(201,150,47,.3);}
@keyframes dg-spin{to{transform:rotate(360deg);}}
.dg-spinner--rune{position:relative; border-top-color:var(--dg-blood);}

/* ----- 24. 头像组 dg-avatars ----- */
.dg-avatars{display:inline-flex;}
.dg-avatars__a{width:36px; height:36px; border-radius:50%; display:grid; place-items:center; font-size:17px;
  background:radial-gradient(circle at 40% 30%,#4a2a1a,#1a0e08); border:2px solid var(--dg-gold);
  box-shadow:0 0 0 1px var(--dg-ink); margin-left:-10px;}
.dg-avatars__a:first-child{margin-left:0;}
.dg-avatars__more{width:36px; height:36px; border-radius:50%; display:grid; place-items:center; margin-left:-10px;
  font-family:var(--dg-sans); font-weight:900; font-size:11px; color:var(--dg-gold-lt);
  background:#1c1712; border:2px solid var(--dg-gold-dk); box-shadow:0 0 0 1px var(--dg-ink);}

/* ----- 25. 星级评分 dg-stars ----- */
.dg-stars{display:inline-flex; gap:2px; font-size:16px; color:#4a3a24;}
.dg-stars .on{color:var(--dg-gold-lt); text-shadow:0 0 6px rgba(232,200,119,.5);}

/* ----- 26. 分隔线 dg-divider ----- */
.dg-divider{display:flex; align-items:center; gap:10px; color:var(--dg-gold); margin:6px 0;}
.dg-divider::before,.dg-divider::after{content:&quot;&quot;; height:1px; flex:1;
  background:linear-gradient(90deg,transparent,var(--dg-line),transparent);}
.dg-divider__mark{font-size:12px;}
.dg-divider--label{font-family:var(--dg-serif); font-weight:700; font-size:11px; letter-spacing:.16em;
  color:var(--dg-parch-dim);}

/* ----- 27. 空状态 dg-empty ----- */
.dg-empty{text-align:center; padding:28px 20px; color:var(--dg-parch-dim);}
.dg-empty__ic{font-size:44px; opacity:.5; filter:grayscale(.4);}
.dg-empty__tt{font-family:var(--dg-serif); font-weight:700; font-size:15px; color:var(--dg-parch); margin:10px 0 4px;}
.dg-empty__ds{font-family:var(--dg-sans); font-weight:700; font-size:12px;}

/* ============================================================================
   ============  ADVANCED PACK  ·  进阶组件 (28-43)  ============
   ============================================================================ */

/* ----- 28. 步进器 dg-stepper ----- */
.dg-stepper{display:inline-flex; align-items:stretch; border:1px solid var(--dg-line); border-radius:3px;
  overflow:hidden; box-shadow:inset 0 0 8px rgba(0,0,0,.5);}
.dg-stepper__btn{width:32px; font-family:var(--dg-serif); font-weight:700; font-size:16px; color:var(--dg-gold-lt);
  background:var(--dg-metal); border:none; cursor:pointer; display:grid; place-items:center;}
.dg-stepper__btn:hover{color:#fff; background:linear-gradient(180deg,#4a3418,#241608);}
.dg-stepper__btn:active{transform:translateY(1px);}
.dg-stepper__val{min-width:48px; display:grid; place-items:center; font-family:var(--dg-sans); font-weight:900;
  font-size:14px; color:var(--dg-parch); background:#0a0604;}

/* ----- 29. 面包屑 dg-breadcrumb ----- */
.dg-breadcrumb{display:flex; align-items:center; gap:6px; font-family:var(--dg-serif); font-size:12px; flex-wrap:wrap;}
.dg-breadcrumb a{color:var(--dg-parch-dim); text-decoration:none; cursor:pointer;}
.dg-breadcrumb a:hover{color:var(--dg-gold-lt);}
.dg-breadcrumb__sep{color:var(--dg-gold); font-size:10px;}
.dg-breadcrumb__cur{color:var(--dg-gold-lt); font-weight:700;}

/* ----- 30. 手风琴 dg-accordion ----- */
.dg-accordion{border:1px solid var(--dg-gold-dk); border-radius:4px; overflow:hidden; background:rgba(10,6,4,.4);}
.dg-accordion details{border-bottom:1px solid rgba(110,79,33,.3);}
.dg-accordion details:last-child{border-bottom:none;}
.dg-accordion summary{list-style:none; cursor:pointer; padding:11px 14px; font-family:var(--dg-serif);
  font-weight:700; font-size:13px; color:var(--dg-parch); display:flex; align-items:center; gap:8px; transition:.1s;}
.dg-accordion summary::-webkit-details-marker{display:none;}
.dg-accordion summary::before{content:&quot;▸&quot;; color:var(--dg-gold); transition:.15s;}
.dg-accordion details[open] summary::before{transform:rotate(90deg);}
.dg-accordion summary:hover{background:rgba(58,42,22,.4);}
.dg-accordion__bd{padding:2px 16px 14px 30px; font-family:var(--dg-sans); font-weight:700; font-size:12px;
  color:var(--dg-parch-dim); line-height:1.6;}

/* ----- 31. 侧边抽屉 dg-drawer ----- */
.dg-drawer-mask{position:fixed; inset:0; background:rgba(4,2,0,.6); z-index:110; opacity:0; pointer-events:none; transition:.2s;}
.dg-drawer-mask.open{opacity:1; pointer-events:auto;}
.dg-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120;
  background:var(--dg-panel-bg); border-left:1px solid var(--dg-gold); box-shadow:-8px 0 24px rgba(0,0,0,.6);
  transform:translateX(100%); transition:.22s cubic-bezier(.3,.8,.3,1); display:flex; flex-direction:column;}
.dg-drawer.open{transform:translateX(0);}
.dg-drawer__hd{font-family:var(--dg-serif); font-weight:700; letter-spacing:.1em; font-size:15px; color:var(--dg-gold-lt);
  padding:16px; border-bottom:1px solid var(--dg-line); display:flex; align-items:center; justify-content:space-between;}
.dg-drawer__hd span{cursor:pointer; color:var(--dg-parch-dim);}
.dg-drawer__bd{padding:12px; overflow-y:auto;}

/* ----- 32. 数据表格 dg-table ----- */
.dg-table{width:100%; border-collapse:collapse; font-family:var(--dg-sans); font-size:12px;
  border:1px solid var(--dg-gold-dk); border-radius:4px; overflow:hidden;}
.dg-table thead th{font-family:var(--dg-serif); font-weight:700; font-size:11px; letter-spacing:.08em;
  color:var(--dg-gold-lt); text-align:left; padding:9px 12px; background:var(--dg-metal);
  border-bottom:1px solid var(--dg-line);}
.dg-table tbody td{padding:9px 12px; color:var(--dg-parch); border-bottom:1px solid rgba(110,79,33,.25); font-weight:700;}
.dg-table tbody tr:last-child td{border-bottom:none;}
.dg-table tbody tr:nth-child(even){background:rgba(58,42,22,.18);}
.dg-table tbody tr:hover{background:rgba(58,42,22,.4);}
.dg-table__rank{color:var(--dg-gold-lt); font-family:var(--dg-serif); font-weight:700;}

/* ----- 33. 分页器 dg-pagination ----- */
.dg-pagination{display:inline-flex; gap:4px;}
.dg-pagination__pg{min-width:30px; height:30px; padding:0 6px; display:grid; place-items:center; cursor:pointer;
  font-family:var(--dg-serif); font-weight:700; font-size:12px; color:var(--dg-parch-dim); background:var(--dg-metal);
  border:1px solid var(--dg-line); border-radius:3px; transition:.1s;}
.dg-pagination__pg:hover{color:var(--dg-parch); border-color:var(--dg-gold-lt);}
.dg-pagination__pg--active{color:var(--dg-gold-lt); background:linear-gradient(180deg,#8a2418,#4a0f08); border-color:var(--dg-gold);}
.dg-pagination__pg--dis{opacity:.4; cursor:not-allowed;}

/* ----- 34. 时间轴 dg-timeline ----- */
.dg-timeline{position:relative; padding-left:26px;}
.dg-timeline::before{content:&quot;&quot;; position:absolute; left:7px; top:6px; bottom:6px; width:2px;
  background:linear-gradient(180deg,var(--dg-gold),var(--dg-gold-dk));}
.dg-timeline__item{position:relative; padding-bottom:16px;}
.dg-timeline__item:last-child{padding-bottom:0;}
.dg-timeline__item::before{content:&quot;&quot;; position:absolute; left:-23px; top:3px; width:12px; height:12px; border-radius:50%;
  background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold)); border:2px solid var(--dg-ink);
  box-shadow:0 0 8px rgba(201,150,47,.5);}
.dg-timeline__item--done::before{background:radial-gradient(circle at 40% 30%,#7aa04a,#3a6a1a);}
.dg-timeline__t{font-family:var(--dg-serif); font-weight:700; font-size:13px; color:var(--dg-parch);}
.dg-timeline__d{font-family:var(--dg-sans); font-weight:700; font-size:11px; color:var(--dg-parch-dim); margin-top:2px;}

/* ----- 35. 树形菜单 dg-tree ----- */
.dg-tree{font-family:var(--dg-sans); font-weight:700; font-size:13px;}
.dg-tree details{margin-left:4px;}
.dg-tree summary{list-style:none; cursor:pointer; padding:5px 0; color:var(--dg-parch); display:flex; align-items:center; gap:6px;}
.dg-tree summary::-webkit-details-marker{display:none;}
.dg-tree summary::before{content:&quot;▸&quot;; color:var(--dg-gold); font-size:10px; transition:.15s;}
.dg-tree details[open] > summary::before{transform:rotate(90deg);}
.dg-tree summary:hover{color:var(--dg-gold-lt);}
.dg-tree__leaf{padding:5px 0 5px 20px; color:var(--dg-parch-dim); cursor:pointer; display:flex; align-items:center; gap:6px;}
.dg-tree__leaf:hover{color:var(--dg-parch);}
.dg-tree details > *:not(summary){margin-left:16px; border-left:1px solid rgba(110,79,33,.3); padding-left:6px;}

/* ----- 36. 能量条倒计时 dg-energy ----- */
.dg-energy{display:flex; align-items:center; gap:10px;}
.dg-energy__orb{width:28px; height:28px; border-radius:50%; display:grid; place-items:center; font-size:14px; flex:none;
  background:radial-gradient(circle at 40% 30%,#8affd0,#2a9a6a 60%,#0a5a3a); border:2px solid var(--dg-gold);
  box-shadow:0 0 10px rgba(90,220,150,.5);}
.dg-energy__body{flex:1;}
.dg-energy__top{display:flex; justify-content:space-between; font-family:var(--dg-sans); font-weight:800; font-size:11px;
  color:var(--dg-parch-dim); margin-bottom:3px;}
.dg-energy__timer{color:var(--dg-gold-lt); font-variant-numeric:tabular-nums;}
.dg-energy .dg-bar__fill{background:linear-gradient(180deg,#8affd0,#1a8a5a);}

/* ----- 37. 签到日历 dg-calendar ----- */
.dg-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.dg-calendar__day{aspect-ratio:1; border-radius:4px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; font-family:var(--dg-sans); font-weight:800; font-size:10px; color:var(--dg-parch-dim);
  background:rgba(10,6,4,.5); border:1px solid var(--dg-gold-dk); position:relative;}
.dg-calendar__day .r{font-size:15px;}
.dg-calendar__day--done{color:var(--dg-parch); border-color:var(--dg-line);}
.dg-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center;
  background:rgba(10,6,4,.72); color:#7aca4a; font-size:18px; font-weight:900;}
.dg-calendar__day--today{border-color:var(--dg-gold-lt); box-shadow:0 0 10px rgba(201,150,47,.4);
  background:linear-gradient(180deg,#3a2a16,#1c130a);}

/* ----- 38. 任务链 dg-questchain ----- */
.dg-questchain{display:flex; align-items:center;}
.dg-questchain__node{width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-size:18px; flex:none;
  background:radial-gradient(circle at 50% 30%,#2a2018,#0e0a06); border:2px solid var(--dg-line); position:relative; z-index:2;}
.dg-questchain__node--done{border-color:#7aca4a; background:radial-gradient(circle at 50% 30%,#2a3a1a,#0e1a06);}
.dg-questchain__node--now{border-color:var(--dg-gold-lt); box-shadow:0 0 12px rgba(201,150,47,.6);
  background:radial-gradient(circle at 50% 30%,#5a3a16,#2a1608);}
.dg-questchain__link{height:3px; flex:1; min-width:16px; background:repeating-linear-gradient(90deg,var(--dg-gold-dk) 0 5px,transparent 5px 9px);}
.dg-questchain__link--done{background:var(--dg-gold);}

/* ----- 39. 成就解锁 dg-achievement ----- */
.dg-achievement{display:flex; align-items:center; gap:14px; padding:12px 16px; background:var(--dg-panel-bg);
  border:1px solid var(--dg-gold); border-radius:4px; box-shadow:0 0 16px rgba(201,150,47,.2),var(--dg-inset);}
.dg-achievement__medal{width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:26px; flex:none;
  background:radial-gradient(circle at 40% 30%,var(--dg-gold-lt),var(--dg-gold) 60%,#7a5410); border:2px solid var(--dg-gold-lt);
  box-shadow:0 0 14px rgba(232,200,119,.6);}
.dg-achievement__tx b{font-family:var(--dg-serif); font-weight:700; font-size:14px; color:var(--dg-gold-lt); display:block;}
.dg-achievement__tx small{font-family:var(--dg-sans); font-weight:700; font-size:11px; color:var(--dg-parch-dim);}
.dg-achievement--locked{border-color:var(--dg-gold-dk); box-shadow:var(--dg-inset); filter:grayscale(.7); opacity:.7;}
.dg-achievement--locked .dg-achievement__medal{background:radial-gradient(circle at 40% 30%,#4a3a24,#1a120a); box-shadow:none;}

/* ----- 40. 翻牌 dg-flipcard ----- */
.dg-flipcard{width:120px; height:168px; perspective:800px; cursor:pointer;}
.dg-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s;}
.dg-flipcard.flipped .dg-flipcard__inner{transform:rotateY(180deg);}
.dg-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border:1px solid var(--dg-line); border-radius:5px; display:grid; place-items:center; overflow:hidden;}
.dg-flipcard__back{background:repeating-linear-gradient(45deg,#241a10 0 8px,#1c140a 8px 16px);
  color:var(--dg-gold); font-size:34px; box-shadow:var(--dg-inset);}
.dg-flipcard__front{transform:rotateY(180deg); background:radial-gradient(circle at 50% 30%,#3a2a1a,#100b06);
  flex-direction:column; box-shadow:var(--dg-inset),0 0 14px rgba(201,150,47,.3); border-color:var(--dg-gold);}
.dg-flipcard__front .em{font-size:46px;} .dg-flipcard__front .nm{font-family:var(--dg-serif); font-weight:700;
  font-size:12px; color:var(--dg-gold-lt); margin-top:6px;}

/* ----- 41. 开宝箱 dg-chest ----- */
.dg-chest{width:120px; text-align:center; cursor:pointer; user-select:none;}
.dg-chest__box{font-size:64px; transition:transform .2s; filter:drop-shadow(0 6px 8px rgba(0,0,0,.6));}
.dg-chest:hover .dg-chest__box{transform:scale(1.05) rotate(-3deg);}
.dg-chest.opened .dg-chest__box{animation:dg-chest-pop .5s ease;}
@keyframes dg-chest-pop{0%{transform:scale(1)}40%{transform:scale(1.3) translateY(-8px)}100%{transform:scale(1)}}
.dg-chest__glow{height:0; overflow:hidden; transition:.3s; opacity:0;}
.dg-chest.opened .dg-chest__glow{height:auto; opacity:1; padding-top:6px;}
.dg-chest__label{font-family:var(--dg-serif); font-weight:700; font-size:12px; color:var(--dg-gold-lt); margin-top:4px;}

/* ----- 42. 拼图背包网格 dg-invgrid ----- */
.dg-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:5px; padding:8px; background:rgba(10,6,4,.55);
  border:1px solid var(--dg-line); border-radius:4px; box-shadow:var(--dg-inset); width:max-content;}
.dg-invgrid__cell{width:44px; height:44px; border-radius:3px; display:grid; place-items:center; font-size:22px; position:relative;
  background:radial-gradient(circle at 50% 30%,#241a12,#0c0806); border:1px solid rgba(110,79,33,.5);}
.dg-invgrid__cell:hover{border-color:var(--dg-gold-lt);}
.dg-invgrid__cell--rare{border-color:#3a72d0; box-shadow:inset 0 0 8px rgba(58,114,208,.3);}
.dg-invgrid__cell--legend{border-color:var(--dg-gold-lt); box-shadow:inset 0 0 8px rgba(232,200,119,.4);}
.dg-invgrid__cell--empty{background:rgba(10,6,4,.4);}
.dg-invgrid__qty{position:absolute; bottom:1px; right:3px; font-family:var(--dg-sans); font-weight:900; font-size:9px;
  color:#fff; text-shadow:0 1px 2px #000;}

/* ----- 43. 装备对比 dg-compare ----- */
.dg-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center;
  background:rgba(10,6,4,.4); border:1px solid var(--dg-gold-dk); border-radius:4px; padding:14px;}
.dg-compare__side{text-align:center;}
.dg-compare__side .dg-icon{margin:0 auto 8px;}
.dg-compare__nm{font-family:var(--dg-serif); font-weight:700; font-size:12px; color:var(--dg-parch); margin-bottom:8px;}
.dg-compare__stat{display:flex; justify-content:space-between; font-family:var(--dg-sans); font-weight:700; font-size:11px;
  padding:3px 0; border-bottom:1px solid rgba(110,79,33,.2);}
.dg-compare__stat span:first-child{color:var(--dg-parch-dim);}
.dg-compare__up{color:#7aca4a;} .dg-compare__down{color:#e8664a;}
.dg-compare__vs{font-family:var(--dg-serif); font-weight:900; font-size:16px; color:var(--dg-gold); text-align:center;}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}
</style>

<body>

<div class=&quot;doc-head&quot;>

<div class=&quot;doc&quot;>

.cy-bracket.tl{top:4px;left:4px; border-right:none; border-bottom:none;}
.cy-bracket.tr{top:4px;right:4px; border-left:none; border-bottom:none;}
.cy-bracket.bl{bottom:4px;left:4px; border-right:none; border-top:none;}
.cy-bracket.br{bottom:4px;right:4px; border-left:none; border-top:none;}

/* ----- 3. 弹窗 cy-modal ----- */
.cy-modal-mask{position:fixed; inset:0; background:rgba(3,5,12,.8); backdrop-filter:blur(3px);
  display:grid; place-items:center; z-index:100; padding:20px;}
.cy-modal{width:min(380px,92vw); position:relative;}
.cy-modal__close{position:absolute; top:-2px; right:-2px; width:30px; height:30px; z-index:5; cursor:pointer;
  display:grid; place-items:center; font-family:var(--cy-mono); color:var(--cy-mag-lt);
  background:rgba(40,10,30,.9); border:1px solid var(--cy-mag); clip-path:polygon(30% 0,100% 0,100% 70%,70% 100%,0 100%,0 30%);}
.cy-modal__close:hover{background:rgba(255,60,168,.3);}

/* ----- 4. 进度条 cy-bar ----- */
.cy-bar{position:relative; height:10px; background:var(--cy-ink); border:1px solid var(--cy-line); overflow:hidden;
  clip-path:polygon(0 0,100% 0,100% 100%,4px 100%);}
.cy-bar__fill{height:100%; box-shadow:0 0 10px currentColor;}
.cy-bar__fill--cy{background:var(--cy-cyan); color:var(--cy-cyan);}
.cy-bar__fill--mg{background:var(--cy-mag); color:var(--cy-mag);}
.cy-bar__fill--yl{background:var(--cy-yellow); color:var(--cy-yellow);}
.cy-bar__fill--gr{background:var(--cy-green); color:var(--cy-green);}
.cy-bar__cap{display:flex; justify-content:space-between; font-family:var(--cy-mono); font-size:9px;
  letter-spacing:.15em; color:var(--cy-dim); margin-bottom:4px;}
.cy-bar--tall{height:16px;}

/* ----- 5. 货币条 cy-currency ----- */
.cy-currency{display:inline-flex; align-items:center; gap:7px; font-family:var(--cy-disp); font-weight:700;
  font-size:14px; color:var(--cy-cyan-lt); background:linear-gradient(180deg,rgba(16,30,50,.9),rgba(8,14,26,.9));
  padding:5px 14px 5px 8px; border:1px solid var(--cy-line); clip-path:var(--cy-clip-btn);
  text-shadow:var(--cy-glow-cy);}
.cy-currency__sym{font-family:var(--cy-mono); font-size:15px; color:var(--cy-cyan);}
.cy-currency--mag{color:var(--cy-mag-lt); text-shadow:var(--cy-glow-mg);}
.cy-currency--mag .cy-currency__sym{color:var(--cy-mag);}
.cy-currency--yl{color:var(--cy-yellow);} .cy-currency--yl .cy-currency__sym{color:var(--cy-yellow);}

/* ----- 6. 状态计量表 cy-gauge(替代 orb) ----- */
.cy-gauge{width:64px; height:64px; position:relative; flex:none;}
.cy-gauge svg{transform:rotate(-90deg);}
.cy-gauge__track{fill:none; stroke:var(--cy-ink); stroke-width:6;}
.cy-gauge__val{fill:none; stroke-width:6; stroke-linecap:round; filter:drop-shadow(0 0 4px currentColor);}
.cy-gauge__val--cy{stroke:var(--cy-cyan); color:var(--cy-cyan);}
.cy-gauge__val--mg{stroke:var(--cy-mag); color:var(--cy-mag);}
.cy-gauge__num{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--cy-disp);
  font-weight:700; font-size:14px; color:var(--cy-cyan-lt);}
.cy-gauge__lbl{position:absolute; bottom:-14px; left:0; right:0; text-align:center; font-family:var(--cy-mono);
  font-size:8px; letter-spacing:.2em; color:var(--cy-dim);}

/* ----- 7. 图标底座 cy-icon ----- */
.cy-icon{width:48px; height:48px; display:grid; place-items:center; font-size:22px; position:relative;
  background:linear-gradient(180deg,rgba(20,40,60,.6),rgba(8,16,26,.6)); border:1px solid var(--cy-line);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
.cy-icon:hover{border-color:var(--cy-cyan); box-shadow:0 0 12px rgba(42,212,255,.4);}
.cy-icon--rare{border-color:var(--cy-cyan);}
.cy-icon--legend{border-color:var(--cy-mag); box-shadow:0 0 12px rgba(255,60,168,.4);}
.cy-icon__cd{position:absolute; inset:0; background:rgba(3,5,12,.7); display:grid; place-items:center;
  font-family:var(--cy-disp); font-weight:700; font-size:14px; color:var(--cy-cyan-lt);}

/* ----- 8. 卡片 cy-card ----- */
.cy-card{width:150px; background:linear-gradient(180deg,rgba(16,30,50,.85),rgba(8,14,26,.9));
  border:1px solid var(--cy-line); clip-path:var(--cy-clip); cursor:pointer; transition:.12s; position:relative;}
.cy-card:hover{border-color:var(--cy-cyan); box-shadow:0 0 16px rgba(42,212,255,.3); transform:translateY(-3px);}
.cy-card__art{height:94px; display:grid; place-items:center; font-size:44px; position:relative;
  background:radial-gradient(circle at 50% 30%,rgba(42,212,255,.15),rgba(0,0,0,0) 60%);
  border-bottom:1px solid var(--cy-line); filter:drop-shadow(0 0 10px rgba(42,212,255,.4));}
.cy-card__tag{position:absolute; top:6px; left:6px; font-family:var(--cy-mono); font-size:8px; letter-spacing:.1em;
  color:var(--cy-mag); background:rgba(40,10,30,.8); padding:2px 6px; border:1px solid var(--cy-mag-dk);}
.cy-card__name{font-family:var(--cy-disp); font-weight:600; font-size:12px; color:var(--cy-cyan-lt);
  text-align:center; padding:8px 6px 4px; text-shadow:var(--cy-glow-cy);}
.cy-card__foot{padding:0 10px 10px;}

/* ----- 9. 列表项 cy-list ----- */
.cy-list{border:1px solid var(--cy-line); background:rgba(8,16,26,.5);}
.cy-list__item{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer;
  border-bottom:1px solid rgba(28,76,96,.4); transition:.1s;}
.cy-list__item:last-child{border-bottom:none;}
.cy-list__item:hover{background:rgba(42,212,255,.08);}
.cy-list__ic{width:30px; height:30px; flex:none; display:grid; place-items:center; font-size:15px;
  background:rgba(20,40,60,.6); border:1px solid var(--cy-line);
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
.cy-list__tx{flex:1;}
.cy-list__tx b{font-family:var(--cy-ui); font-weight:700; font-size:14px; color:var(--cy-text); display:block;}
.cy-list__tx small{font-family:var(--cy-mono); font-size:10px; color:var(--cy-dim);}
.cy-list__val{font-family:var(--cy-disp); font-weight:700; font-size:13px; color:var(--cy-cyan-lt);}

/* ----- 10. 顶部 HUD cy-hud ----- */
.cy-hud{display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:linear-gradient(180deg,rgba(16,30,50,.9),rgba(8,14,26,.9)); border:1px solid var(--cy-line);
  clip-path:var(--cy-clip);}
.cy-hud__hex{width:42px; height:42px; flex:none; display:grid; place-items:center; font-size:20px;
  background:linear-gradient(180deg,#12324a,#0a1826); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  box-shadow:0 0 10px rgba(42,212,255,.5);}
.cy-hud__who b{font-family:var(--cy-disp); font-weight:700; font-size:14px; color:var(--cy-cyan-lt); display:block;
  text-shadow:var(--cy-glow-cy);}
.cy-hud__who small{font-family:var(--cy-mono); font-size:9px; color:var(--cy-mag); letter-spacing:.15em;}
.cy-hud__spacer{flex:1;}

/* ----- 11. 导航栏 cy-nav ----- */
.cy-nav{display:flex; gap:4px; padding:6px; background:linear-gradient(180deg,rgba(12,22,38,.9),rgba(6,12,22,.95));
  border:1px solid var(--cy-line);}
.cy-nav__tab{flex:1; text-align:center; font-family:var(--cy-disp); font-weight:600; font-size:10px; letter-spacing:.06em;
  color:var(--cy-dim); padding:8px 4px; cursor:pointer; border:1px solid transparent; transition:.1s;
  clip-path:var(--cy-clip-btn);}
.cy-nav__tab .i{display:block; font-size:18px; margin-bottom:3px;}
.cy-nav__tab:hover{color:var(--cy-text);}
.cy-nav__tab--active{color:var(--cy-cyan-lt); border-color:var(--cy-cyan); background:rgba(42,212,255,.12);
  text-shadow:var(--cy-glow-cy);}

/* ----- 12. 标签页 cy-tabs ----- */
.cy-tabs{display:flex; gap:2px; border-bottom:1px solid var(--cy-line);}
.cy-tabs__tab{font-family:var(--cy-disp); font-weight:600; font-size:11px; letter-spacing:.06em; color:var(--cy-dim);
  padding:9px 16px; cursor:pointer; border:1px solid transparent; border-bottom:none; transition:.1s;
  clip-path:polygon(6px 0,100% 0,100% 100%,0 100%);}
.cy-tabs__tab:hover{color:var(--cy-text);}
.cy-tabs__tab--active{color:var(--cy-cyan-lt); background:rgba(42,212,255,.1); border-color:var(--cy-line);
  text-shadow:var(--cy-glow-cy);}

/* ----- 13. 输入框 cy-input ----- */
.cy-input{font-family:var(--cy-mono); font-size:13px; color:var(--cy-cyan-lt); background:var(--cy-ink);
  border:1px solid var(--cy-line); padding:9px 12px; width:100%; outline:none; transition:.12s;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
.cy-input::placeholder{color:#3a5a6a;}
.cy-input:focus{border-color:var(--cy-cyan); box-shadow:0 0 10px rgba(42,212,255,.35);}
.cy-field{position:relative;}
.cy-field__ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--cy-cyan); font-size:13px;}
.cy-field .cy-input{padding-left:32px;}

/* ----- 14. 下拉选择 cy-select ----- */
.cy-select{position:relative; display:inline-block;}
.cy-select select{appearance:none; -webkit-appearance:none; font-family:var(--cy-mono); font-size:12px;
  color:var(--cy-cyan-lt); background:linear-gradient(180deg,rgba(20,40,60,.7),rgba(10,20,34,.7));
  border:1px solid var(--cy-line); padding:9px 34px 9px 14px; cursor:pointer; outline:none;
  clip-path:var(--cy-clip-btn);}
.cy-select select:focus{border-color:var(--cy-cyan);}
.cy-select::after{content:&quot;▾&quot;; position:absolute; right:12px; top:50%; transform:translateY(-50%);
  color:var(--cy-cyan); pointer-events:none;}
.cy-select option{background:#0d1526; color:var(--cy-text);}

/* ----- 15. 开关 cy-switch ----- */
.cy-switch{position:relative; display:inline-flex; align-items:center; cursor:pointer; user-select:none;}
.cy-switch input{position:absolute; opacity:0; pointer-events:none;}
.cy-switch__track{width:46px; height:22px; background:var(--cy-ink); border:1px solid var(--cy-line); position:relative;
  transition:.15s; clip-path:polygon(5px 0,100% 0,100% 100%,0 100%,0 5px);}
.cy-switch__track::before{content:&quot;&quot;; position:absolute; top:2px; left:2px; width:16px; height:16px;
  background:var(--cy-dim); transition:.15s; clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px);}
.cy-switch input:checked + .cy-switch__track{border-color:var(--cy-cyan); background:rgba(42,212,255,.15);}
.cy-switch input:checked + .cy-switch__track::before{left:26px; background:var(--cy-cyan);
  box-shadow:0 0 8px rgba(42,212,255,.7);}

/* ----- 16. 滑条 cy-slider ----- */
.cy-slider{-webkit-appearance:none; appearance:none; width:100%; height:6px; background:linear-gradient(90deg,var(--cy-cyan-dk),var(--cy-ink));
  border:1px solid var(--cy-line); outline:none; cursor:pointer;}
.cy-slider::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px; background:var(--cy-cyan);
  border:1px solid var(--cy-ink); box-shadow:0 0 10px rgba(42,212,255,.7); cursor:pointer;
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.cy-slider::-moz-range-thumb{width:16px; height:16px; background:var(--cy-cyan); border:1px solid var(--cy-ink);
  box-shadow:0 0 10px rgba(42,212,255,.7); cursor:pointer;}

/* ----- 17. 徽章 cy-badge ----- */
.cy-badge{display:inline-grid; place-items:center; min-width:16px; height:16px; padding:0 5px;
  font-family:var(--cy-disp); font-weight:700; font-size:9px; color:var(--cy-ink); background:var(--cy-mag);
  box-shadow:0 0 8px rgba(255,60,168,.6); clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);}
.cy-badge--cy{background:var(--cy-cyan); box-shadow:0 0 8px rgba(42,212,255,.6);}
.cy-badge-wrap{position:relative; display:inline-flex;}
.cy-badge-wrap > .cy-badge{position:absolute; top:-6px; right:-6px;}

/* ----- 18. 角标 cy-ribbon ----- */
.cy-ribbon{position:absolute; top:8px; left:0; font-family:var(--cy-mono); font-size:9px; letter-spacing:.1em;
  color:var(--cy-ink); background:var(--cy-mag); padding:3px 10px 3px 8px; z-index:3; font-weight:700;
  clip-path:polygon(0 0,100% 0,calc(100% - 7px) 50%,100% 100%,0 100%); box-shadow:0 0 10px rgba(255,60,168,.5);}
.cy-ribbon--cy{background:var(--cy-cyan); box-shadow:0 0 10px rgba(42,212,255,.5);}

/* ----- 19. 标签 cy-tag ----- */
.cy-tag{display:inline-flex; align-items:center; gap:5px; font-family:var(--cy-mono); font-size:10px; letter-spacing:.05em;
  color:var(--cy-cyan-lt); background:rgba(42,212,255,.08); border:1px solid var(--cy-line); padding:3px 9px;
  clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px);}
.cy-tag--mg{color:var(--cy-mag-lt); border-color:var(--cy-mag-dk); background:rgba(255,60,168,.08);}
.cy-tag--yl{color:var(--cy-yellow); border-color:#7a6a10; background:rgba(255,225,74,.08);}

/* ----- 20. Tooltip cy-tooltip ----- */
.cy-tooltip{position:relative; display:inline-flex; cursor:help; border-bottom:1px dashed var(--cy-cyan-dk);}
.cy-tooltip::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  font-family:var(--cy-mono); font-size:11px; color:var(--cy-cyan-lt); white-space:nowrap; background:var(--cy-panel);
  border:1px solid var(--cy-cyan); padding:6px 10px; opacity:0; pointer-events:none; transition:.12s; z-index:20;
  box-shadow:0 0 12px rgba(42,212,255,.3);}
.cy-tooltip:hover::after{opacity:1;}

/* ----- 21. Toast cy-toast ----- */
.cy-toast{display:flex; align-items:center; gap:10px; font-family:var(--cy-ui); font-size:13px; color:var(--cy-text);
  background:linear-gradient(180deg,rgba(16,30,50,.92),rgba(8,14,26,.95)); border:1px solid var(--cy-cyan);
  padding:11px 16px; max-width:340px; clip-path:var(--cy-clip); box-shadow:0 0 18px rgba(42,212,255,.25);}
.cy-toast__ic{font-size:18px; flex:none;}
.cy-toast--danger{border-color:var(--cy-red); box-shadow:0 0 18px rgba(255,59,70,.25);}
.cy-toast--success{border-color:var(--cy-green); box-shadow:0 0 18px rgba(57,255,136,.25);}
.cy-toast b{font-family:var(--cy-disp); font-weight:700; font-size:11px; letter-spacing:.06em; color:var(--cy-cyan-lt);
  display:block;}

/* ----- 22. 对话气泡 cy-bubble ----- */
.cy-bubble{position:relative; font-family:var(--cy-ui); font-size:13px; color:var(--cy-text); max-width:300px;
  background:linear-gradient(180deg,rgba(16,30,50,.9),rgba(8,14,26,.92)); border:1px solid var(--cy-line);
  padding:12px 16px; clip-path:var(--cy-clip);}
.cy-bubble__who{font-family:var(--cy-disp); font-weight:700; font-size:10px; letter-spacing:.1em; color:var(--cy-mag);
  margin-bottom:5px; text-shadow:var(--cy-glow-mg);}
.cy-bubble::before{content:&quot;◤&quot;; position:absolute; left:20px; bottom:-11px; color:var(--cy-line); font-size:16px;}

/* ----- 23. 加载 cy-spinner ----- */
.cy-spinner{width:36px; height:36px; position:relative;}
.cy-spinner::before,.cy-spinner::after{content:&quot;&quot;; position:absolute; inset:0; border:2px solid transparent; border-radius:50%;}
.cy-spinner::before{border-top-color:var(--cy-cyan); animation:cy-spin .8s linear infinite; box-shadow:0 0 8px rgba(42,212,255,.4);}
.cy-spinner::after{inset:6px; border-bottom-color:var(--cy-mag); animation:cy-spin 1.2s linear infinite reverse;}
@keyframes cy-spin{to{transform:rotate(360deg);}}

/* ----- 24. 头像组 cy-avatars ----- */
.cy-avatars{display:inline-flex;}
.cy-avatars__a{width:36px; height:36px; display:grid; place-items:center; font-size:16px; margin-left:-8px;
  background:linear-gradient(180deg,#12324a,#0a1826); border:1px solid var(--cy-cyan);
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); box-shadow:0 0 8px rgba(42,212,255,.3);}
.cy-avatars__a:first-child{margin-left:0;}
.cy-avatars__more{width:36px; height:36px; display:grid; place-items:center; margin-left:-8px;
  font-family:var(--cy-disp); font-weight:700; font-size:10px; color:var(--cy-mag-lt);
  background:#0d1526; border:1px solid var(--cy-mag-dk); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}

/* ----- 25. 评级 cy-rating(方块 pip) ----- */
.cy-rating{display:inline-flex; gap:3px;}
.cy-rating__pip{width:14px; height:14px; background:var(--cy-ink); border:1px solid var(--cy-line);
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);}
.cy-rating__pip.on{background:var(--cy-cyan); box-shadow:0 0 8px rgba(42,212,255,.6); border-color:var(--cy-cyan);}

/* ----- 26. 分隔线 cy-divider ----- */
.cy-divider{display:flex; align-items:center; gap:10px; color:var(--cy-cyan); margin:6px 0;}
.cy-divider::before,.cy-divider::after{content:&quot;&quot;; height:1px; flex:1;
  background:linear-gradient(90deg,transparent,var(--cy-line),transparent);}
.cy-divider__mark{font-family:var(--cy-mono); font-size:10px; letter-spacing:.15em; color:var(--cy-dim);}

/* ----- 27. 空状态 cy-empty ----- */
.cy-empty{text-align:center; padding:28px 20px; color:var(--cy-dim);}
.cy-empty__ic{font-size:42px; opacity:.4; filter:drop-shadow(0 0 8px rgba(42,212,255,.3));}
.cy-empty__tt{font-family:var(--cy-disp); font-weight:700; font-size:14px; color:var(--cy-text); margin:10px 0 4px; letter-spacing:.06em;}
.cy-empty__ds{font-family:var(--cy-mono); font-size:11px;}

/* ----- 28. 步进器 cy-stepper ----- */
.cy-stepper{display:inline-flex; border:1px solid var(--cy-line); background:rgba(8,16,26,.6);}
.cy-stepper__btn{width:32px; font-family:var(--cy-disp); font-weight:700; font-size:16px; color:var(--cy-cyan-lt);
  background:transparent; border:none; cursor:pointer; display:grid; place-items:center; text-shadow:var(--cy-glow-cy);}
.cy-stepper__btn:hover{background:rgba(42,212,255,.15);}
.cy-stepper__val{min-width:48px; display:grid; place-items:center; font-family:var(--cy-mono); font-size:14px;
  color:var(--cy-text); border-left:1px solid var(--cy-line); border-right:1px solid var(--cy-line);}

/* ----- 29. 面包屑 cy-breadcrumb ----- */
.cy-breadcrumb{display:flex; align-items:center; gap:7px; font-family:var(--cy-mono); font-size:12px; flex-wrap:wrap;}
.cy-breadcrumb a{color:var(--cy-dim); text-decoration:none; cursor:pointer;}
.cy-breadcrumb a:hover{color:var(--cy-cyan-lt);}
.cy-breadcrumb__sep{color:var(--cy-mag);}
.cy-breadcrumb__cur{color:var(--cy-cyan-lt); text-shadow:var(--cy-glow-cy);}

/* ----- 30. 手风琴 cy-accordion ----- */
.cy-accordion{border:1px solid var(--cy-line); background:rgba(8,16,26,.5);}
.cy-accordion details{border-bottom:1px solid rgba(28,76,96,.4);}
.cy-accordion details:last-child{border-bottom:none;}
.cy-accordion summary{list-style:none; cursor:pointer; padding:11px 14px; font-family:var(--cy-disp);
  font-weight:600; font-size:12px; color:var(--cy-text); display:flex; align-items:center; gap:8px;}
.cy-accordion summary::-webkit-details-marker{display:none;}
.cy-accordion summary::before{content:&quot;+&quot;; color:var(--cy-cyan); font-family:var(--cy-mono);}
.cy-accordion details[open] summary::before{content:&quot;−&quot;;}
.cy-accordion summary:hover{background:rgba(42,212,255,.06);}
.cy-accordion__bd{padding:2px 16px 14px 30px; font-family:var(--cy-mono); font-size:11px; color:var(--cy-dim); line-height:1.7;}

/* ----- 31. 侧边抽屉 cy-drawer ----- */
.cy-drawer-mask{position:fixed; inset:0; background:rgba(3,5,12,.6); z-index:110; opacity:0; pointer-events:none; transition:.2s;}
.cy-drawer-mask.open{opacity:1; pointer-events:auto;}
.cy-drawer{position:fixed; top:0; right:0; bottom:0; width:min(300px,86vw); z-index:120;
  background:linear-gradient(180deg,rgba(16,30,50,.96),rgba(8,14,26,.98)); border-left:1px solid var(--cy-cyan);
  box-shadow:-8px 0 30px rgba(0,0,0,.6),-2px 0 16px rgba(42,212,255,.2); transform:translateX(100%);
  transition:.22s cubic-bezier(.3,.8,.3,1); display:flex; flex-direction:column;}
.cy-drawer.open{transform:translateX(0);}
.cy-drawer__hd{font-family:var(--cy-disp); font-weight:700; letter-spacing:.1em; font-size:14px; color:var(--cy-cyan-lt);
  padding:16px; border-bottom:1px solid var(--cy-line); display:flex; align-items:center; justify-content:space-between;
  text-shadow:var(--cy-glow-cy);}
.cy-drawer__hd span{cursor:pointer; color:var(--cy-mag);}
.cy-drawer__bd{padding:12px; overflow-y:auto;}

/* ----- 32. 数据表格 cy-table ----- */
.cy-table{width:100%; border-collapse:collapse; font-family:var(--cy-mono); font-size:12px; border:1px solid var(--cy-line);}
.cy-table thead th{font-family:var(--cy-disp); font-weight:700; font-size:10px; letter-spacing:.08em; color:var(--cy-cyan-lt);
  text-align:left; padding:9px 12px; background:rgba(42,212,255,.08); border-bottom:1px solid var(--cy-line);}
.cy-table tbody td{padding:9px 12px; color:var(--cy-text); border-bottom:1px solid rgba(28,76,96,.3);}
.cy-table tbody tr:last-child td{border-bottom:none;}
.cy-table tbody tr:nth-child(even){background:rgba(42,212,255,.04);}
.cy-table tbody tr:hover{background:rgba(42,212,255,.1);}
.cy-table__rank{color:var(--cy-mag); font-family:var(--cy-disp); font-weight:700;}

/* ----- 33. 分页器 cy-pagination ----- */
.cy-pagination{display:inline-flex; gap:4px;}
.cy-pagination__pg{min-width:30px; height:30px; padding:0 6px; display:grid; place-items:center; cursor:pointer;
  font-family:var(--cy-disp); font-weight:600; font-size:12px; color:var(--cy-dim);
  background:rgba(20,40,60,.5); border:1px solid var(--cy-line); transition:.1s;
  clip-path:polygon(5px 0,100% 0,100% 100%,0 100%,0 5px);}
.cy-pagination__pg:hover{color:var(--cy-text); border-color:var(--cy-cyan);}
.cy-pagination__pg--active{color:var(--cy-ink); background:var(--cy-cyan); border-color:var(--cy-cyan);
  box-shadow:0 0 10px rgba(42,212,255,.5);}
.cy-pagination__pg--dis{opacity:.35; cursor:not-allowed;}

/* ----- 34. 时间轴 cy-timeline ----- */
.cy-timeline{position:relative; padding-left:26px;}
.cy-timeline::before{content:&quot;&quot;; position:absolute; left:6px; top:6px; bottom:6px; width:1px;
  background:linear-gradient(180deg,var(--cy-cyan),var(--cy-mag));}
.cy-timeline__item{position:relative; padding-bottom:16px;}
.cy-timeline__item:last-child{padding-bottom:0;}
.cy-timeline__item::before{content:&quot;&quot;; position:absolute; left:-24px; top:3px; width:11px; height:11px;
  background:var(--cy-cyan); box-shadow:0 0 8px rgba(42,212,255,.6);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.cy-timeline__item--done::before{background:var(--cy-green); box-shadow:0 0 8px rgba(57,255,136,.6);}
.cy-timeline__t{font-family:var(--cy-disp); font-weight:600; font-size:12px; color:var(--cy-text);}
.cy-timeline__d{font-family:var(--cy-mono); font-size:10px; color:var(--cy-dim); margin-top:2px;}

/* ----- 35. 树形菜单 cy-tree ----- */
.cy-tree{font-family:var(--cy-mono); font-size:13px;}
.cy-tree details{margin-left:4px;}
.cy-tree summary{list-style:none; cursor:pointer; padding:5px 0; color:var(--cy-text); display:flex; align-items:center; gap:6px;}
.cy-tree summary::-webkit-details-marker{display:none;}
.cy-tree summary::before{content:&quot;▸&quot;; color:var(--cy-cyan); font-size:10px; transition:.15s;}
.cy-tree details[open] > summary::before{transform:rotate(90deg);}
.cy-tree summary:hover{color:var(--cy-cyan-lt);}
.cy-tree__leaf{padding:5px 0 5px 20px; color:var(--cy-dim); cursor:pointer;}
.cy-tree__leaf:hover{color:var(--cy-text);}
.cy-tree details > *:not(summary){margin-left:14px; border-left:1px solid rgba(28,76,96,.4); padding-left:6px;}

/* ----- 36. 能量条倒计时 cy-energy ----- */
.cy-energy{display:flex; align-items:center; gap:10px;}
.cy-energy__orb{width:28px; height:28px; display:grid; place-items:center; font-size:14px; flex:none; color:var(--cy-yellow);
  background:linear-gradient(180deg,rgba(60,50,10,.6),rgba(20,16,4,.6)); border:1px solid var(--cy-yellow);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); box-shadow:0 0 10px rgba(255,225,74,.4);}
.cy-energy__body{flex:1;}
.cy-energy__top{display:flex; justify-content:space-between; font-family:var(--cy-mono); font-size:10px; color:var(--cy-dim); margin-bottom:3px;}
.cy-energy__timer{color:var(--cy-yellow); font-variant-numeric:tabular-nums;}

/* ----- 37. 签到日历 cy-calendar ----- */
.cy-calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cy-calendar__day{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  font-family:var(--cy-mono); font-size:10px; color:var(--cy-dim); background:rgba(8,16,26,.6); border:1px solid var(--cy-line);
  position:relative; clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
.cy-calendar__day .r{font-size:15px;}
.cy-calendar__day--done{color:var(--cy-text); border-color:var(--cy-cyan-dk);}
.cy-calendar__day--done::after{content:&quot;✓&quot;; position:absolute; inset:0; display:grid; place-items:center;
  background:rgba(8,16,26,.75); color:var(--cy-green); font-size:18px;}
.cy-calendar__day--today{border-color:var(--cy-cyan); box-shadow:0 0 12px rgba(42,212,255,.4); background:rgba(42,212,255,.1);}

/* ----- 38. 任务链 cy-questchain ----- */
.cy-questchain{display:flex; align-items:center;}
.cy-questchain__node{width:40px; height:40px; display:grid; place-items:center; font-size:17px; flex:none; z-index:2;
  background:rgba(20,40,60,.6); border:1px solid var(--cy-line);
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}
.cy-questchain__node--done{border-color:var(--cy-green); box-shadow:0 0 10px rgba(57,255,136,.4);}
.cy-questchain__node--now{border-color:var(--cy-cyan); box-shadow:0 0 12px rgba(42,212,255,.6);}
.cy-questchain__link{height:2px; flex:1; min-width:16px; background:repeating-linear-gradient(90deg,var(--cy-line) 0 4px,transparent 4px 8px);}
.cy-questchain__link--done{background:var(--cy-cyan);}

/* ----- 39. 成就解锁 cy-achievement ----- */
.cy-achievement{display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:linear-gradient(180deg,rgba(16,30,50,.9),rgba(8,14,26,.92)); border:1px solid var(--cy-cyan);
  clip-path:var(--cy-clip); box-shadow:0 0 16px rgba(42,212,255,.2);}
.cy-achievement__medal{width:50px; height:50px; display:grid; place-items:center; font-size:24px; flex:none; color:var(--cy-ink);
  background:var(--cy-cyan); box-shadow:0 0 14px rgba(42,212,255,.6);
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}
.cy-achievement__tx b{font-family:var(--cy-disp); font-weight:700; font-size:13px; color:var(--cy-cyan-lt); display:block; letter-spacing:.05em;}
.cy-achievement__tx small{font-family:var(--cy-mono); font-size:10px; color:var(--cy-dim);}
.cy-achievement--locked{border-color:var(--cy-line); box-shadow:none; filter:grayscale(.7); opacity:.65;}
.cy-achievement--locked .cy-achievement__medal{background:var(--cy-dim); box-shadow:none;}

/* ----- 40. 翻牌 cy-flipcard ----- */
.cy-flipcard{width:120px; height:168px; perspective:800px; cursor:pointer;}
.cy-flipcard__inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s;}
.cy-flipcard.flipped .cy-flipcard__inner{transform:rotateY(180deg);}
.cy-flipcard__face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border:1px solid var(--cy-line); display:grid; place-items:center; overflow:hidden; clip-path:var(--cy-clip);}
.cy-flipcard__back{background:repeating-linear-gradient(45deg,rgba(42,212,255,.08) 0 6px,rgba(8,14,26,.9) 6px 12px);
  color:var(--cy-cyan); font-size:30px; text-shadow:var(--cy-glow-cy);}
.cy-flipcard__front{transform:rotateY(180deg); background:radial-gradient(circle at 50% 30%,rgba(255,60,168,.15),rgba(8,14,26,.95));
  flex-direction:column; border-color:var(--cy-mag); box-shadow:inset 0 0 20px rgba(255,60,168,.2);}
.cy-flipcard__front .em{font-size:44px; filter:drop-shadow(0 0 10px rgba(255,60,168,.5));}
.cy-flipcard__front .nm{font-family:var(--cy-disp); font-weight:600; font-size:11px; color:var(--cy-mag-lt); margin-top:6px;}

/* ----- 41. 解密缓存 cy-chest ----- */
.cy-chest{width:130px; text-align:center; cursor:pointer; user-select:none;}
.cy-chest__box{font-size:60px; transition:.2s; filter:drop-shadow(0 0 12px rgba(42,212,255,.4));}
.cy-chest:hover .cy-chest__box{transform:scale(1.05);}
.cy-chest.opened .cy-chest__box{animation:cy-chest-pop .5s ease;}
@keyframes cy-chest-pop{0%{transform:scale(1)}40%{transform:scale(1.3);filter:drop-shadow(0 0 24px rgba(42,212,255,.9))}100%{transform:scale(1)}}
.cy-chest__glow{height:0; overflow:hidden; opacity:0; transition:.3s;}
.cy-chest.opened .cy-chest__glow{height:auto; opacity:1; padding-top:6px;}
.cy-chest__label{font-family:var(--cy-mono); font-size:11px; color:var(--cy-cyan-lt); margin-top:4px; letter-spacing:.1em;}

/* ----- 42. 背包网格 cy-invgrid ----- */
.cy-invgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:5px; padding:8px; background:rgba(8,16,26,.6);
  border:1px solid var(--cy-line); width:max-content;}
.cy-invgrid__cell{width:44px; height:44px; display:grid; place-items:center; font-size:22px; position:relative;
  background:rgba(20,40,60,.4); border:1px solid rgba(28,76,96,.5);
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
.cy-invgrid__cell:hover{border-color:var(--cy-cyan);}
.cy-invgrid__cell--rare{border-color:var(--cy-cyan); box-shadow:inset 0 0 8px rgba(42,212,255,.3);}
.cy-invgrid__cell--legend{border-color:var(--cy-mag); box-shadow:inset 0 0 8px rgba(255,60,168,.3);}
.cy-invgrid__cell--empty{background:rgba(8,16,26,.4);}
.cy-invgrid__qty{position:absolute; bottom:1px; right:3px; font-family:var(--cy-disp); font-weight:700; font-size:9px;
  color:var(--cy-cyan-lt);}

/* ----- 43. 装备对比 cy-compare ----- */
.cy-compare{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center;
  background:rgba(8,16,26,.5); border:1px solid var(--cy-line); padding:14px; clip-path:var(--cy-clip);}
.cy-compare__side{text-align:center;}
.cy-compare__side .cy-icon{margin:0 auto 8px;}
.cy-compare__nm{font-family:var(--cy-disp); font-weight:600; font-size:11px; color:var(--cy-text); margin-bottom:8px; letter-spacing:.05em;}
.cy-compare__stat{display:flex; justify-content:space-between; font-family:var(--cy-mono); font-size:11px;
  padding:3px 0; border-bottom:1px solid rgba(28,76,96,.3);}
.cy-compare__stat span:first-child{color:var(--cy-dim);}
.cy-compare__up{color:var(--cy-green);} .cy-compare__down{color:var(--cy-red);}
.cy-compare__vs{font-family:var(--cy-disp); font-weight:900; font-size:15px; color:var(--cy-mag); text-shadow:var(--cy-glow-mg);}

@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important;}}
</style>

    </div>
    <div class=&quot;classline&quot;><b>cy-card</b> &amp;gt; <b>cy-card__art</b> ( <b>cy-card__tag</b> ) + <b>cy-card__name</b> + <b>cy-card__foot</b></div>
  </div>
